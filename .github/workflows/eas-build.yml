name: Hone Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Node dependencies
        working-directory: mobile
        run: npm ci

      - name: Inject auto-incrementing versionCode (= github.run_number)
        working-directory: mobile
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            j.expo.android = j.expo.android || {};
            j.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(j, null, 2) + '
');
            console.log('versionCode set to', j.expo.android.versionCode);
          "
          grep -E '"version"|versionCode' app.json

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Run expo prebuild (generates Android native project)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Generate CI signing keystore
        # Release builds require signing. We generate a throwaway keystore on
        # the fly — this is only for sideload testing, NOT the Play Store key.
        run: |
          keytool -genkey -v \
            -keystore /tmp/ci-release.jks \
            -alias ci-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass cipassword \
            -keypass cipassword \
            -dname "CN=Hone CI, OU=CI, O=Hone, L=Sydney, ST=NSW, C=AU"

      - name: Build standalone release APK
        # Release builds ALWAYS embed the JS bundle — no Metro server needed.
        # We sign with the CI keystore so Android accepts the install.
        working-directory: mobile/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/ci-release.jks \
            -Pandroid.injected.signing.store.password=cipassword \
            -Pandroid.injected.signing.key.alias=ci-key \
            -Pandroid.injected.signing.key.password=cipassword \
            --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          echo "Gradle exit: ${PIPESTATUS[0]}"

      - name: Verify APK
        run: |
          APK=$(find mobile/android -name "*.apk" | grep release | head -1)
          echo "APK: $APK"
          ls -lah "$APK"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hone-release.apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-log
          path: /tmp/gradle-output.txt
          retention-days: 7
