name: Hone Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Node dependencies
        working-directory: mobile
        run: npm ci

      - name: Inject auto-incrementing versionCode
        working-directory: mobile
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('app.json','utf8')); j.expo.android=j.expo.android||{}; j.expo.android.versionCode=Number(process.env.RUN_NUMBER); fs.writeFileSync('app.json', JSON.stringify(j, null, 2)+'\n'); console.log('versionCode =', j.expo.android.versionCode);"

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Run expo prebuild (generates Android native project)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Restore signing keystore from secret
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.jks
          ls -lah /tmp/release.jks

      - name: Build standalone release APK
        working-directory: mobile/android
        env:
          KEYSTORE_PATH: /tmp/release.jks
          KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
          KEY_ALIAS:     ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASS:      ${{ secrets.RELEASE_KEY_PASS }}
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS" \
            --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          echo "Gradle exit: ${PIPESTATUS[0]}"

      - name: Verify APK
        run: |
          APK=$(find mobile/android -name "*.apk" | grep release | head -1)
          echo "APK: $APK"
          ls -lah "$APK"

      - name: Compute APK filename
        id: apk_name
        working-directory: mobile
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('app.json','utf8')).expo.version)")
          NAME="hone-v${VERSION}-build${{ github.run_number }}"
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Computed filename: $NAME.apk"

      - name: Stage versioned APK
        run: |
          OUT_DIR=mobile/android/app/build/outputs/apk
          APK=$(find $OUT_DIR -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then echo "::error::No APK found"; exit 1; fi
          cp "$APK" "${{ steps.apk_name.outputs.name }}.apk"
          ls -la *.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_name.outputs.name }}
          path: ${{ steps.apk_name.outputs.name }}.apk
          retention-days: 90

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-log
          path: /tmp/gradle-output.txt
