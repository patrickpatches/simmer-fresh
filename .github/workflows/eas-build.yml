name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set up EAS CLI
        run: npm install -g eas-cli

      - name: Run expo prebuild
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Bundle JS into APK (makes it standalone — no dev server needed)
        working-directory: mobile/android
        run: echo "bundleInDebug=true" >> gradle.properties

      - name: Build Android Debug APK (no signing required)
        working-directory: mobile/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          echo "Gradle exit: ${PIPESTATUS[0]}"

      - name: Verify APK exists
        run: |
          find mobile/android -name "*.apk" 2>/dev/null
          ls -la mobile/android/app/build/outputs/apk/ 2>/dev/null || echo "No APK output dir"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hone-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-log
          path: /tmp/gradle-output.txt
