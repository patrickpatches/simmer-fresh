// UNITS + SCALING
// ============================================================================
const MASS_UNITS = { g: 1, kg: 1000 };
const VOLUME_UNITS = { ml: 1, l: 1000, tsp: 5, tbsp: 15, cup: 240, "fl oz": 30 };

const getUnitGroup = (unit) => {
  if (!unit) return "count";
  const u = unit.toLowerCase().trim();
  if (MASS_UNITS[u] !== undefined) return "mass";
  if (VOLUME_UNITS[u] !== undefined) return "volume";
  if (u === "to taste" || u === "as needed") return "taste";
  return "count";
};
const toBase = (amount, unit) => {
  const u = (unit || "").toLowerCase().trim();
  const group = getUnitGroup(u);
  if (group === "mass") return { value: amount * MASS_UNITS[u], group };
  if (group === "volume") return { value: amount * VOLUME_UNITS[u], group };
  return { value: amount, group };
};
const fromBase = (value, group) => {
  if (group === "mass") {
    if (value >= 1000) return { amount: value / 1000, unit: "kg" };
    return { amount: value, unit: "g" };
  }
  if (group === "volume") {
    if (value >= 1000) return { amount: value / 1000, unit: "l" };
    if (value >= 15 && value % 15 === 0) return { amount: value / 15, unit: "tbsp" };
    if (value >= 5 && value % 5 === 0 && value < 45) return { amount: value / 5, unit: "tsp" };
    return { amount: value, unit: "ml" };
  }
  return { amount: value, unit: null };
};

function formatAmount(value) {
  if (value === 0) return "0";
  if (value < 0.1) return value.toFixed(2);
  if (value < 1) {
    const fr = [[0.125,"⅛"],[0.25,"¼"],[0.333,"⅓"],[0.5,"½"],[0.667,"⅔"],[0.75,"¾"]];
    let best = fr[0], bestD = Math.abs(value - fr[0][0]);
    for (const f of fr) { const d = Math.abs(value - f[0]); if (d < bestD) { bestD = d; best = f; } }
    if (bestD < 0.08) return best[1];
    return value.toFixed(2);
  }
  if (value < 10) {
    const w = Math.floor(value), f = value - w;
    if (f < 0.1) return `${w}`;
    if (Math.abs(f - 0.5) < 0.1) return `${w}½`;
    if (Math.abs(f - 0.25) < 0.08) return `${w}¼`;
    if (Math.abs(f - 0.75) < 0.08) return `${w}¾`;
    return value.toFixed(1);
  }
  if (value < 100) return (Math.round(value * 2) / 2).toString();
  return Math.round(value / 5) * 5 + "";
}

// ============================================================================
// SEARCH — fuzzy + ranked with match highlighting
// ============================================================================
function fuzzyMatch(query, target) {
  if (!query || !target) return 0;
  const q = query.toLowerCase().trim();
  const t = target.toLowerCase();
  if (!q) return 0;
  if (t.includes(q)) {
    const idx = t.indexOf(q);
    const atWordStart = idx === 0 || /\s/.test(t[idx - 1]);
    return atWordStart ? 100 : 80;
  }
  let qi = 0;
  for (let i = 0; i < t.length && qi < q.length; i++) {
    if (t[i] === q[qi]) qi++;
  }
  if (qi === q.length) return 30;
  return 0;
}

function searchRecipe(recipe, queries) {
  if (!queries.length) return { score: 1, matches: [] };
  let totalScore = 0;
  const matches = [];
  for (const query of queries) {
    let bestFieldScore = 0;
    let bestField = null;
    const titleScore = fuzzyMatch(query, recipe.title) * 5;
    if (titleScore > bestFieldScore) { bestFieldScore = titleScore; bestField = { field: "title", value: recipe.title }; }
    const chefScore = fuzzyMatch(query, recipe.inspiration) * 3;
    if (chefScore > bestFieldScore) { bestFieldScore = chefScore; bestField = { field: "chef", value: recipe.inspiration }; }
    for (const tag of (recipe.tags || [])) {
      const s = fuzzyMatch(query, tag) * 2;
      if (s > bestFieldScore) { bestFieldScore = s; bestField = { field: "tag", value: tag }; }
    }
    const taglineScore = fuzzyMatch(query, recipe.tagline) * 1.5;
    if (taglineScore > bestFieldScore) { bestFieldScore = taglineScore; bestField = { field: "tagline", value: recipe.tagline }; }
    for (const ing of recipe.ingredients) {
      const s = fuzzyMatch(query, ing.name);
      if (s > bestFieldScore) { bestFieldScore = s; bestField = { field: "ingredient", value: ing.name }; }
    }
    if (bestFieldScore === 0) return { score: 0, matches: [] };
    totalScore += bestFieldScore;
    if (bestField) matches.push(bestField);
  }
  return { score: totalScore, matches };
}

function highlight(text, queries) {
  if (!queries.length || !text) return text;
  let result = text;
  for (const q of queries) {
    if (!q) continue;
    const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  }
  return result;
}

// ============================================================================
// PANTRY MATCHING — match user's ingredients against recipe ingredients
// ============================================================================
// Normalise an ingredient string to a rough keyword (remove descriptors, units, etc.)
function normaliseIngredient(text) {
  if (!text) return "";
  return text.toLowerCase()
    .replace(/\([^)]*\)/g, "") // remove parenthetical
    .replace(/,.*$/, "") // remove everything after first comma (", diced" etc.)
    .replace(/\b(fresh|dried|ground|whole|chopped|minced|sliced|grated|crushed|toasted|cold|warm|hot|large|small|medium|light|dark|good|plain|full-fat|extra virgin|tinned|optional|to serve|to finish|for frying|for grilling|for cooking|stale|raw|boneless|skinless|unsalted|salted|dry|thin)\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// Does a pantry item "match" a recipe ingredient?
function pantryItemMatches(pantryItem, ingredientName) {
  const p = normaliseIngredient(pantryItem);
  const i = normaliseIngredient(ingredientName);
  if (!p || !i) return false;
  // Check substring both ways (e.g. "onion" matches "red onion" and vice versa)
  if (i.includes(p) || p.includes(i)) return true;
  // Check individual words for exact match on stems
  const pWords = p.split(/\s+/).filter(w => w.length > 2);
  const iWords = i.split(/\s+/).filter(w => w.length > 2);
  for (const pw of pWords) {
    for (const iw of iWords) {
      if (pw === iw) return true;
      if (pw.length >= 4 && iw.length >= 4 && (pw.startsWith(iw) || iw.startsWith(pw))) return true;
    }
  }
  return false;
}

function rankRecipesByPantry(recipes, pantryItems) {
  if (!pantryItems.length) return [];
  return recipes.map(recipe => {
    const matched = [];
    const missing = [];
    for (const ing of recipe.ingredients) {
      // Skip "to taste" / "as needed" — assume the user has salt, pepper, oil etc.
      if (ing.unit === "to taste" || ing.unit === "as needed") continue;
      let matchedBy = null;
      for (const p of pantryItems) {
        if (pantryItemMatches(p, ing.name)) { matchedBy = p; break; }
      }
      if (matchedBy) matched.push({ ingredient: ing, pantryItem: matchedBy });
      else missing.push(ing);
    }
    const total = matched.length + missing.length;
    const pct = total > 0 ? matched.length / total : 0;
    return { recipe, matched, missing, total, pct, matchCount: matched.length };
  })
  .filter(r => r.matchCount >= 2) // need at least 2 matches to be interesting
  .sort((a, b) => {
    // Prioritise % then absolute count
    if (Math.abs(b.pct - a.pct) > 0.05) return b.pct - a.pct;
    return b.matchCount - a.matchCount;
  });
}

// ============================================================================
// ANTHROPIC API — substitution
// ============================================================================
async function suggestSubstitution(recipe, missingIng) {
  const otherIngs = recipe.ingredients.filter(i => i.name !== missingIng.name).map(i => i.name).slice(0, 15).join(", ");
  const prompt = `You are an experienced cook helping adapt a recipe. They are making "${recipe.title}" (${recipe.tagline}) in the style of ${recipe.inspiration}.

Missing: ${missingIng.amount} ${missingIng.unit || ""} ${missingIng.name}.
Other ingredients they have: ${otherIngs}.

Use Australian English terminology and spelling (prawns not shrimp, capsicum not bell pepper, cornflour not cornstarch, thickened cream not heavy cream, yoghurt not yogurt, coriander not cilantro).

Respond ONLY with valid JSON, no preamble or fences:
{
  "severity": "minor" | "moderate" | "critical",
  "impact": "One honest sentence about the effect on the final dish",
  "substitutions": [{"name": "substitute name", "amount": number, "unit": "g/ml/tbsp/etc", "note": "brief reason"}],
  "canSkip": true | false,
  "skipNote": "what to do if skipping, or empty string"
}

Be honest. If a substitute compromises the dish, say so. Give 1-3 realistic swaps.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
  });
  if (!response.ok) throw new Error(`API error ${response.status}`);
  const data = await response.json();
  const text = data.content.map(c => c.text || "").join("");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

// ============================================================================
async function inventRecipeFromPantry(pantryItems, cuisinePreference) {
  const cuisineLine = cuisinePreference
    ? `They'd like something ${cuisinePreference.toLowerCase()} if possible, but use judgement — only suggest that cuisine if the ingredients support it.`
    : `Use your judgement to decide what style of dish fits best.`;
  const prompt = `You are an experienced cook helping someone use up ingredients they already have. They have: ${pantryItems.join(", ")}.

${cuisineLine}

Suggest ONE realistic, delicious recipe they can make. Use Australian English terminology and spelling throughout (prawns not shrimp, capsicum not bell pepper, cornflour not cornstarch, thickened cream not heavy cream, yoghurt not yogurt, coriander not cilantro, mince not ground beef, plain flour not all-purpose flour, tinned not canned).

Be HONEST:
- If they'd need to buy 1-2 extra pantry staples (salt, oil, pepper, garlic, onion), that's fine — mention them naturally.
- If the recipe genuinely needs a crucial ingredient they don't have, mention it clearly in the "note" field.
- Don't invent a bad recipe just to use everything. Better to say what else they'd need.
- Include stage-by-stage "what to look for" descriptions — this is how beginners actually learn to cook.

Respond ONLY with valid JSON, no preamble or code fences:
{
  "title": "Recipe name",
  "tagline": "One evocative line",
  "note": "Honest note: what's great about this combo, what you'd need to buy if anything, any caveats",
  "emoji": "single food emoji",
  "timeMin": number,
  "difficulty": "Easy" | "Intermediate" | "Hard",
  "baseServings": number,
  "tags": ["cuisine tag", "type tag", "key ingredient tag"],
  "ingredients": [{"name": "ingredient", "amount": number, "unit": "g|kg|ml|l|tsp|tbsp|cup|cloves|to taste|as needed"}],
  "steps": [{"title": "Step name", "body": "What to do in 2-3 sentences", "stage": "What it should look/smell/feel like", "timer": seconds_as_number_or_null}]
}

Use 4-8 steps. Every step must have a stage description. Use timers for any step involving waiting.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 3000, messages: [{ role: "user", content: prompt }] }),
  });
  if (!response.ok) throw new Error(`API error ${response.status}`);
  const data = await response.json();
  const text = data.content.map(c => c.text || "").join("");
  const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
  // Fill in missing fields
  parsed.id = `claude-${Date.now()}`;
  parsed.inspiration = "Claude (invented from your pantry)";
  parsed.inspirationUrl = "";
  parsed.hero = null;
  parsed.heroFallback = [T.paprika, T.ochre, T.sage];
  parsed.generatedByClaude = true;
  parsed.userAdded = true;
  if (!parsed.emoji) parsed.emoji = "🍽️";
  if (!parsed.tags) parsed.tags = ["Yours"];
  return parsed;
}

function InlineTimer({ seconds }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (running && remaining > 0) {
      ref.current = setInterval(() => {
        setRemaining(r => {
          if (r <= 1) { clearInterval(ref.current); setRunning(false); setDone(true); return 0; }
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [running, remaining]);
  const mins = Math.floor(remaining / 60), secs = remaining % 60;
  const progress = seconds > 0 ? 1 - remaining / seconds : 0;
  if (!expanded) {
    return (
      <button onClick={() => { setExpanded(true); setRunning(true); }} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold" style={{ background: T.bgDeep, color: T.paprika, border: `1px solid ${T.line}` }}>
        <Icon name="clock" size={12} /> Start {Math.round(seconds / 60)} min timer
      </button>
    );
  }
  return (
    <div className="rounded-xl p-3 flex items-center gap-3 mt-2" style={{ background: done ? T.sage : T.cream, border: `1px solid ${done ? T.sage : T.line}` }}>
      <button onClick={() => { if (done) { setRemaining(seconds); setDone(false); setRunning(false); } else { setRunning(!running); } }} className="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: done ? T.cream : running ? T.paprikaDeep : T.paprika, color: done ? T.sage : T.cream }}>
        {done ? <Icon name="refresh" size={16} /> : running ? <Icon name="pause" size={16} /> : <Icon name="play" size={16} style={{ marginLeft: 2 }} />}
      </button>
      <div className="flex-1">
        <div className="text-2xl font-bold tabular-nums" style={{ color: done ? T.cream : T.ink, fontFamily: "Fraunces, serif" }}>
          {mins}:{secs.toString().padStart(2, "0")}
        </div>
        <div className="mt-1 h-1 rounded-full overflow-hidden" style={{ background: done ? 'rgba(255,255,255,0.3)' : T.bgDeep }}>
          <div className="h-full transition-all" style={{ width: `${progress * 100}%`, background: done ? T.cream : T.paprika }} />
        </div>
      </div>
      <button onClick={() => { setExpanded(false); setRunning(false); setRemaining(seconds); setDone(false); }} className="w-8 h-8 rounded-full flex items-center justify-center" style={{ color: done ? T.cream : T.muted }}>
        <Icon name="x" size={14} />
      </button>
    </div>
  );
}

  const fetchSuggestion = useCallback(async () => {
    setLoading(true); setError(null);
    try { setSuggestion(await suggestSubstitution(recipe, ingredient)); }
    catch (e) { setError(e.message || "Couldn't reach the assistant."); }
    finally { setLoading(false); }
  }, [recipe, ingredient]);
  useEffect(() => { if (!currentAdjustment) fetchSuggestion(); }, [fetchSuggestion, currentAdjustment]);
  const sevColor = { minor: T.sage, moderate: T.warn, critical: T.paprikaDeep }[suggestion?.severity] || T.muted;

  return (
    <div className="fixed inset-0 z-50 flex items-end" style={{ background: 'rgba(26,22,18,0.5)' }} onClick={onClose}>

        <div className="px-5 pb-8">

              <div className="text-sm mb-3" style={{ color: T.inkSoft }}>

              <div className="flex items-center gap-2 mb-2"><Icon name="alert" size={16} color={T.paprikaDeep} /><div className="text-sm font-bold" style={{ color: T.ink }}>Couldn't load smart suggestions</div></div>

          {suggestion && !loading && (

                  <div className="text-sm" style={{ color: T.inkSoft }}>This ingredient is essential — no good swap exists.</div>
                </div>

        </div>
      </div>
    </div>
  );

  const [subSheet, setSubSheet] = useState(null);
  const option = LEFTOVER_OPTIONS.find(o => o.id === leftoverKey);
  const totalPortions = people * option.multiplier;
  const factor = totalPortions / recipe.baseServings;
  const adjustmentsForRecipe = adjustments[recipe.id] || {};
  const stepProgress = cooking ? Object.values(checkedSteps).filter(Boolean).length / recipe.steps.length : 0;

  const handleApplyAdjustment = (adj) => {
    const next = { ...adjustments, [recipe.id]: { ...(adjustments[recipe.id] || {}), [subSheet.ingredient.name]: adj } };

    setSubSheet(null);
  };
  const handleClearAdjustment = () => {
    const recipeAdj = { ...(adjustments[recipe.id] || {}) };

    setSubSheet(null);

  return (

              <span style={{ color: T.ochre }}>COOKING</span> · {Object.values(checkedSteps).filter(Boolean).length} of {recipe.steps.length} steps done
            </div>
            <button onClick={() => { setCooking(false); setCheckedSteps({}); setCheckedIngredients({}); }} className="text-xs font-bold" style={{ color: T.ochre }}>End session</button>
          </div>
          <div className="h-1" style={{ background: T.inkSoft }}>
            <div className="h-full transition-all" style={{ width: `${stepProgress * 100}%`, background: T.paprika }} />
          </div>
        </div>
      )}

      {!cooking && (
        <div className="relative">
          <HeroImage recipe={recipe} height="h-72" />
          <div className="absolute inset-0" style={{ background: 'linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 40%, rgba(26,22,18,0.6) 100%)' }} />
          <button onClick={onBack} className="absolute top-4 left-4 w-11 h-11 rounded-full flex items-center justify-center" style={{ background: 'rgba(250,246,238,0.95)', backdropFilter: 'blur(8px)' }}><Icon name="arrowLeft" size={20} color={T.ink} /></button>
          <div className="absolute top-4 right-4 flex gap-2">
            <button onClick={() => onToggleFavorite(recipe.id)} className="w-11 h-11 rounded-full flex items-center justify-center" style={{ background: 'rgba(250,246,238,0.95)', backdropFilter: 'blur(8px)' }}>
              <Icon name="heart" size={18} fill={favorite ? T.paprika : 'none'} color={favorite ? T.paprika : T.ink} />
            </button>
            {recipe.userAdded && onDelete && (
              <button onClick={() => { if (confirm("Delete this recipe?")) onDelete(recipe.id); }} className="w-11 h-11 rounded-full flex items-center justify-center" style={{ background: 'rgba(250,246,238,0.95)', backdropFilter: 'blur(8px)' }}><Icon name="trash" size={18} color={T.paprikaDeep} /></button>
            )}
          </div>
        </div>
      )}

      <div className="px-5 relative z-10" style={{ marginTop: cooking ? '1rem' : '-2rem' }}>
        <div className="rounded-3xl p-5" style={{ background: T.cream, boxShadow: cooking ? 'none' : '0 -2px 20px rgba(0,0,0,0.08)' }}>
          <div className="text-xs uppercase tracking-widest mb-2" style={{ color: T.paprika }}>
            {recipe.generatedByClaude ? <><Icon name="sparkles" size={10} style={{display:'inline', marginRight:4}} />Invented from your pantry</> : `Inspired by ${recipe.inspiration}`}
          </div>
          <h1 className="text-3xl font-bold leading-tight mb-2" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>{recipe.title}</h1>
          <p className="text-base italic mb-4" style={{ color: T.inkSoft, fontFamily: "Fraunces, serif" }}>{recipe.tagline}</p>
          <div className="flex items-center gap-4 text-sm mb-4" style={{ color: T.inkSoft }}>
            <span className="flex items-center gap-1.5"><Icon name="clock" size={14} />{recipe.timeMin} min</span>
            <span className="flex items-center gap-1.5"><Icon name="flame" size={14} />{recipe.difficulty}</span>
          </div>
          {recipe.note && (<div className="p-3 rounded-xl mb-4 text-sm" style={{ background: T.bgDeep, color: T.inkSoft }}><span className="font-semibold" style={{ color: T.ink }}>A note: </span>{recipe.note}</div>)}
          {recipe.inspirationUrl && !recipe.userAdded && (
            <a href={recipe.inspirationUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 text-sm font-semibold" style={{ color: T.paprika }}>Watch / read the original <Icon name="external" size={14} /></a>
          )}
          {recipe.generatedByClaude && onSaveGenerated && !recipe.savedByUser && (
            <button onClick={() => onSaveGenerated(recipe)} className="w-full mt-3 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2" style={{ background: T.ink, color: T.cream }}>
              <Icon name="heart" size={16} /> Save to my recipes
            </button>
          )}
        </div>
      </div>

      <div className="px-5 mt-5">
        <ServingsSelector people={people} setPeople={setPeople} leftoverKey={leftoverKey} setLeftoverKey={setLeftoverKey} baseServings={recipe.baseServings} />
      </div>

      <div className="px-5 mt-6">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-2xl font-bold" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>Ingredients</h2>
          {cooking && <div className="text-xs" style={{ color: T.muted }}>Tap to check off</div>}
        </div>
        <div className="rounded-2xl overflow-hidden" style={{ background: T.cream, border: `1px solid ${T.line}` }}>
          {recipe.ingredients.map((ing, idx) => {
            const adjustment = adjustmentsForRecipe[ing.name];
            const skipped = adjustment?.action === "skip";
            const substituted = adjustment?.action === "substitute";
            const displayAmount = substituted ? adjustment.substitute.amount * factor : ing.amount * factor;
            const displayUnit = substituted ? adjustment.substitute.unit : ing.unit;
            const displayName = substituted ? adjustment.substitute.name : ing.name;
            const checked = checkedIngredients[idx];
            return (
              <div key={idx} className="flex items-center gap-2 px-3 py-3" style={{ borderBottom: idx < recipe.ingredients.length - 1 ? `1px solid ${T.line}` : 'none' }}>
                {cooking && (
                  <button onClick={() => setCheckedIngredients({ ...checkedIngredients, [idx]: !checked })} className="w-6 h-6 rounded-md flex-shrink-0 flex items-center justify-center" style={{ background: checked ? T.sage : 'transparent', border: `1.5px solid ${checked ? T.sage : T.muted}` }}>
                    {checked && <Icon name="check" size={14} color={T.cream} />}
                  </button>
                )}
                <div className="flex-1 text-sm" style={{ color: skipped ? T.muted : checked ? T.muted : T.ink, textDecoration: skipped || checked ? 'line-through' : 'none' }}>
                  <span className="font-bold tabular-nums">{formatAmount(displayAmount)}</span>
                  {displayUnit && displayUnit !== "to taste" && displayUnit !== "as needed" && (<span className="font-semibold"> {displayUnit}</span>)}
                  <span> {displayName}</span>
                  {(displayUnit === "to taste" || displayUnit === "as needed") && (<span className="italic" style={{ color: T.muted }}> — {displayUnit}</span>)}
                  {substituted && (<div className="text-[11px] mt-0.5 italic" style={{ color: T.sage }}>swapped from {ing.name}</div>)}
                  {skipped && (<div className="text-[11px] mt-0.5 italic" style={{ color: T.muted }}>skipped — {adjustment.note}</div>)}
                </div>
                <button onClick={() => setSubSheet({ ingredient: ing, index: idx })} className="w-8 h-8 rounded-full flex items-center justify-center" style={{ color: adjustment ? T.paprika : T.muted }}>
                  {adjustment ? <Icon name="sparkles" size={16} /> : <Icon name="dots" size={16} />}
                </button>
              </div>
            );
          })}
        </div>
      </div>

      <div className="px-5 mt-6">
        <div className="flex items-center justify-between mb-3">
          <h2 className="text-2xl font-bold" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>Method</h2>
          {cooking && <div className="text-xs" style={{ color: T.muted }}>Tap number to mark done</div>}
        </div>
        <div className="space-y-3">
          {recipe.steps.map((step, idx) => {
            const done = checkedSteps[idx];
            return (
              <div key={idx} className="rounded-2xl p-4 transition-all" style={{ background: T.cream, border: `1px solid ${T.line}`, opacity: done ? 0.55 : 1 }}>
                <div className="flex items-start gap-3">
                  <button onClick={() => cooking && setCheckedSteps({ ...checkedSteps, [idx]: !done })} className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-bold transition-all" style={{ background: done ? T.sage : T.ink, color: T.cream, fontFamily: "Fraunces, serif" }}>
                    {done ? <Icon name="check" size={14} /> : idx + 1}
                  </button>
                  <div className="flex-1">
                    <div className="font-bold mb-1" style={{ color: T.ink, textDecoration: done ? 'line-through' : 'none' }}>{step.title}</div>
                    <div className="text-sm leading-relaxed" style={{ color: T.inkSoft }}>{step.body}</div>
                    {step.stage && (
                      <div className="mt-3 p-3 rounded-xl text-xs" style={{ background: T.bgDeep, color: T.inkSoft }}>
                        <span className="uppercase tracking-widest font-bold text-[10px]" style={{ color: T.paprika }}>Look for</span>
                        <div className="mt-1 italic" style={{ fontFamily: "Fraunces, serif" }}>{step.stage}</div>
                      </div>
                    )}
                    {step.timer && cooking && (<div className="mt-2"><InlineTimer seconds={step.timer} /></div>)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="fixed bottom-0 left-0 right-0 p-4 pb-6 z-20" style={{ background: `linear-gradient(180deg, transparent 0%, ${T.bg} 30%)` }}>
        {!cooking ? (
          <button onClick={() => setCooking(true)} className="w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2" style={{ background: T.paprika, color: T.cream, boxShadow: '0 8px 24px rgba(196,69,54,0.35)' }}>
            <Icon name="chef" size={20} /> I'm cooking this now
          </button>
        ) : stepProgress === 1 ? (
          <button onClick={() => { setCooking(false); setCheckedSteps({}); setCheckedIngredients({}); }} className="w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2" style={{ background: T.sage, color: T.cream, boxShadow: '0 8px 24px rgba(91,107,71,0.35)' }}>
            <Icon name="check" size={20} /> Done — eat well
          </button>
        ) : null}
      </div>

      {subSheet && (
        <SubstitutionSheet recipe={recipe} ingredient={subSheet.ingredient} currentAdjustment={adjustmentsForRecipe[subSheet.ingredient.name]} onClose={() => setSubSheet(null)} onApply={handleApplyAdjustment} onClear={handleClearAdjustment} />
      )}
    </div>
  );
}

// ============================================================================
// PLAN & SHOP
// ============================================================================
function PlanAndShop({ recipes, userRecipes, mealPlan, setMealPlan, adjustments, updateAdjustments, onBack }) {
  const allRecipes = [...userRecipes, ...recipes];
  const selectedIds = Object.keys(mealPlan);
  const [tab, setTab] = useState(selectedIds.length > 0 ? "list" : "pick");
  const [checked, setChecked] = useState({});
  const [subSheet, setSubSheet] = useState(null);

  const toggleSelect = (id) => {
    const next = { ...mealPlan };
    if (next[id]) delete next[id];
    else { const r = allRecipes.find(x => x.id === id); next[id] = { people: r?.baseServings || 2, leftoverKey: "tonight" }; }
    setMealPlan(next);
  };
  const updatePlanEntry = (id, updates) => setMealPlan({ ...mealPlan, [id]: { ...mealPlan[id], ...updates } });

  const consolidated = useMemo(() => {
    const groups = {};
    for (const [recipeId, entry] of Object.entries(mealPlan)) {
      const recipe = allRecipes.find(r => r.id === recipeId);
      if (!recipe) continue;
      const option = LEFTOVER_OPTIONS.find(o => o.id === entry.leftoverKey);
      const factor = (entry.people * option.multiplier) / recipe.baseServings;
      const recipeAdj = adjustments[recipe.id] || {};
      for (const ing of recipe.ingredients) {
        const adj = recipeAdj[ing.name];
        if (adj?.action === "skip") continue;
        const effectiveIng = adj?.action === "substitute"
          ? { name: adj.substitute.name, amount: adj.substitute.amount, unit: adj.substitute.unit }
          : ing;
        const key = effectiveIng.name.toLowerCase().trim();
        if (!groups[key]) groups[key] = { displayName: effectiveIng.name, entries: [] };
        groups[key].entries.push({ recipe, originalIngredient: ing, ingredient: effectiveIng, factor, adjustment: adj });
      }
    }
    return Object.entries(groups).map(([key, g]) => {
      const baseGroup = getUnitGroup(g.entries[0].ingredient.unit);
      const allSameGroup = g.entries.every(e => getUnitGroup(e.ingredient.unit) === baseGroup);
      if (allSameGroup && (baseGroup === "mass" || baseGroup === "volume")) {
        const totalBase = g.entries.reduce((s, e) => s + toBase(e.ingredient.amount * e.factor, e.ingredient.unit).value, 0);
        const nice = fromBase(totalBase, baseGroup);
        return { key, name: g.displayName, amount: nice.amount, unit: nice.unit, entries: g.entries, summable: true };
      }
      if (allSameGroup && baseGroup === "count") {
        const sameUnit = g.entries.every(e => e.ingredient.unit === g.entries[0].ingredient.unit);
        if (sameUnit) {
          const total = g.entries.reduce((s, e) => s + e.ingredient.amount * e.factor, 0);
          return { key, name: g.displayName, amount: total, unit: g.entries[0].ingredient.unit, entries: g.entries, summable: true };
        }
      }
      return { key, name: g.displayName, amount: null, unit: null, entries: g.entries, summable: false };
    }).sort((a, b) => a.name.localeCompare(b.name));
  }, [mealPlan, adjustments, allRecipes]);

  const handleApplyAdjustment = (adj) => {
    const { recipe, ingredient } = subSheet;
    updateAdjustments({ ...adjustments, [recipe.id]: { ...(adjustments[recipe.id] || {}), [ingredient.name]: adj } });
    setSubSheet(null);
  };
  const handleClearAdjustment = () => {
    const { recipe, ingredient } = subSheet;
    const recipeAdj = { ...(adjustments[recipe.id] || {}) };
    delete recipeAdj[ingredient.name];
    updateAdjustments({ ...adjustments, [recipe.id]: recipeAdj });
    setSubSheet(null);
  };

  const clearChecked = () => setChecked({});

  return (
    <div className="min-h-screen pb-32" style={{ background: T.bg }}>
      <header className="px-5 pt-6 pb-0 sticky top-0 z-10" style={{ background: T.bg }}>
        <button onClick={onBack} className="flex items-center gap-2 text-sm font-semibold mb-3" style={{ color: T.inkSoft }}><Icon name="arrowLeft" size={16} /> Kitchen</button>
        <div className="text-xs uppercase tracking-widest mb-1" style={{ color: T.paprika }}>Plan & shop</div>
        <h1 className="text-3xl font-bold leading-none mb-4" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>
          {selectedIds.length === 0 ? (<>Let's <span style={{ fontStyle: 'italic' }}>plan</span> some meals</>)
            : (<><span style={{ fontStyle: 'italic' }}>{selectedIds.length} meal{selectedIds.length > 1 ? 's' : ''}</span> planned</>)}
        </h1>

        {selectedIds.length > 0 && (
          <div className="flex gap-1 p-1 rounded-full mb-3" style={{ background: T.bgDeep }}>
            <button onClick={() => setTab("list")} className="flex-1 py-2 rounded-full text-xs font-bold flex items-center justify-center gap-1.5" style={{ background: tab === "list" ? T.ink : 'transparent', color: tab === "list" ? T.cream : T.inkSoft }}>
              <Icon name="cart" size={13} /> Shopping
              <span className="ml-1 px-1.5 rounded-full text-[10px] font-bold" style={{ background: tab === "list" ? T.paprika : T.line, color: tab === "list" ? T.cream : T.inkSoft }}>{consolidated.length}</span>
            </button>
            <button onClick={() => setTab("meals")} className="flex-1 py-2 rounded-full text-xs font-bold flex items-center justify-center gap-1.5" style={{ background: tab === "meals" ? T.ink : 'transparent', color: tab === "meals" ? T.cream : T.inkSoft }}>
              <Icon name="chef" size={13} /> Meals
            </button>
            <button onClick={() => setTab("pick")} className="flex-1 py-2 rounded-full text-xs font-bold flex items-center justify-center gap-1.5" style={{ background: tab === "pick" ? T.ink : 'transparent', color: tab === "pick" ? T.cream : T.inkSoft }}>
              <Icon name="plus" size={13} /> Add
            </button>
          </div>
        )}
      </header>

      {selectedIds.length > 0 && tab === "list" && (
        <div className="px-5 pt-3">
          {consolidated.length === 0 ? (
            <div className="text-center py-12">
              <div className="text-5xl mb-3">🛒</div>
              <div className="text-sm" style={{ color: T.muted }}>No ingredients yet</div>
            </div>
          ) : (
            <>
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs" style={{ color: T.muted }}>{Object.values(checked).filter(Boolean).length} of {consolidated.length} got</div>
                {Object.values(checked).some(Boolean) && (<button onClick={clearChecked} className="text-xs font-bold" style={{ color: T.paprika }}>Clear ticks</button>)}
              </div>
              <div className="rounded-2xl overflow-hidden" style={{ background: T.cream, border: `1px solid ${T.line}` }}>
                {consolidated.map((item, idx) => {
                  const itemChecked = checked[item.key];
                  const anyAdjusted = item.entries.some(e => e.adjustment);
                  return (
                    <div key={item.key} className="px-3 py-3 flex items-start gap-3" style={{ borderBottom: idx < consolidated.length - 1 ? `1px solid ${T.line}` : 'none' }}>
                      <button onClick={() => setChecked({ ...checked, [item.key]: !itemChecked })} className="w-7 h-7 rounded-md flex-shrink-0 flex items-center justify-center mt-0.5" style={{ background: itemChecked ? T.sage : 'transparent', border: `1.5px solid ${itemChecked ? T.sage : T.muted}` }}>
                        {itemChecked && <Icon name="check" size={16} color={T.cream} />}
                      </button>
                      <div className="flex-1 text-sm" style={{ color: itemChecked ? T.muted : T.ink, textDecoration: itemChecked ? 'line-through' : 'none' }}>
                        {item.summable ? (
                          <>
                            <span className="font-bold tabular-nums">{formatAmount(item.amount)}</span>
                            {item.unit && item.unit !== "to taste" && item.unit !== "as needed" && <span className="font-semibold"> {item.unit}</span>}
                            <span> {item.name}</span>
                          </>
                        ) : (
                          <>
                            <span className="font-semibold">{item.name}</span>
                            <div className="text-[11px] mt-0.5" style={{ color: T.muted }}>
                              {item.entries.map((e, i) => (<span key={i}>{i > 0 && " + "}{formatAmount(e.ingredient.amount * e.factor)} {e.ingredient.unit}</span>))}
                            </div>
                          </>
                        )}
                        <div className="text-[10px] mt-1 flex flex-wrap gap-1">
                          {item.entries.map((e, i) => (<span key={i} className="px-1.5 py-0.5 rounded-full" style={{ background: T.bgDeep, color: T.muted }}>{e.recipe.title}</span>))}
                        </div>
                      </div>
                      <button onClick={() => { const first = item.entries[0]; setSubSheet({ recipe: first.recipe, ingredient: first.originalIngredient }); }} className="w-8 h-8 rounded-full flex items-center justify-center mt-0.5" style={{ color: anyAdjusted ? T.paprika : T.muted }}>
                        {anyAdjusted ? <Icon name="sparkles" size={16} /> : <Icon name="dots" size={16} />}
                      </button>
                    </div>
                  );
                })}
              </div>
              <div className="mt-5 rounded-2xl p-4" style={{ background: T.bgDeep }}>
                <div className="text-[10px] uppercase tracking-widest font-bold mb-1" style={{ color: T.muted }}>Tip</div>
                <div className="text-xs leading-relaxed" style={{ color: T.inkSoft }}>Missing something at the shop? Tap the ⋯ next to any ingredient — Claude suggests honest substitutes or tells you if it's essential.</div>
              </div>
            </>
          )}
        </div>
      )}

      {selectedIds.length > 0 && tab === "meals" && (
        <div className="px-5 pt-3">
          <div className="text-xs mb-3" style={{ color: T.muted }}>Adjust servings per meal. Shopping list updates live.</div>
          <div className="space-y-3">
            {selectedIds.map(id => {
              const recipe = allRecipes.find(r => r.id === id); if (!recipe) return null;
              const entry = mealPlan[id];
              const option = LEFTOVER_OPTIONS.find(o => o.id === entry.leftoverKey);
              const totalPortions = entry.people * option.multiplier;
              return (
                <div key={id} className="rounded-2xl overflow-hidden" style={{ background: T.cream, border: `1.5px solid ${T.paprika}` }}>
                  <div className="flex items-center gap-3 p-3">
                    <div className="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0"><HeroImage recipe={recipe} height="h-14" /></div>
                    <div className="flex-1 min-w-0">
                      <div className="font-bold text-sm truncate" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>{recipe.title}</div>
                      <div className="text-[11px]" style={{ color: T.muted }}>Makes {totalPortions} portions</div>
                    </div>
                    <button onClick={() => toggleSelect(id)} className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: T.bgDeep }}><Icon name="xCircle" size={18} color={T.paprikaDeep} /></button>
                  </div>
                  <div className="px-3 pb-3 flex gap-2">
                    <div className="flex items-center gap-1 rounded-full px-2 py-1" style={{ background: T.bgDeep }}>
                      <button onClick={() => updatePlanEntry(id, { people: Math.max(1, entry.people - 1) })} className="w-6 h-6 flex items-center justify-center"><Icon name="minus" size={12} color={T.ink} /></button>
                      <div className="text-sm font-bold tabular-nums min-w-[20px] text-center">{entry.people}</div>
                      <button onClick={() => updatePlanEntry(id, { people: Math.min(20, entry.people + 1) })} className="w-6 h-6 flex items-center justify-center"><Icon name="plus" size={12} color={T.ink} /></button>
                    </div>
                    <select value={entry.leftoverKey} onChange={(e) => updatePlanEntry(id, { leftoverKey: e.target.value })} className="flex-1 text-xs font-semibold rounded-full px-3 py-1 appearance-none" style={{ background: T.bgDeep, color: T.ink, border: 'none' }}>
                      {LEFTOVER_OPTIONS.map(o => <option key={o.id} value={o.id}>{o.label}</option>)}
                    </select>
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={() => setTab("pick")} className="w-full mt-4 py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2" style={{ background: 'transparent', color: T.paprika, border: `1.5px dashed ${T.paprika}` }}>
            <Icon name="plus" size={16} /> Add another meal
          </button>
        </div>
      )}

      {(selectedIds.length === 0 || tab === "pick") && (
        <div className="px-5 pt-3">
          {selectedIds.length === 0 && (
            <div className="text-sm mb-4" style={{ color: T.muted }}>
              Tap any recipe to add it. Your shopping list builds as you go — no extra steps.
            </div>
          )}
          <div className="space-y-3">
            {allRecipes.filter(r => !mealPlan[r.id]).map(r => (
              <RecipeCard key={r.id} recipe={r} onClick={() => { toggleSelect(r.id); if (selectedIds.length === 0) setTab("list"); }} selected={false} onToggleSelect={(id) => { toggleSelect(id); if (selectedIds.length === 0) setTab("list"); }} />
            ))}
            {allRecipes.filter(r => !mealPlan[r.id]).length === 0 && (<div className="text-center py-8"><div className="text-sm" style={{ color: T.muted }}>All recipes are in your plan!</div></div>)}
          </div>
        </div>
      )}

      {subSheet && (<SubstitutionSheet recipe={subSheet.recipe} ingredient={subSheet.ingredient} currentAdjustment={(adjustments[subSheet.recipe.id] || {})[subSheet.ingredient.name]} onClose={() => setSubSheet(null)} onApply={handleApplyAdjustment} onClear={handleClearAdjustment} />)}
    </div>
  );
}

// ============================================================================
// ADD RECIPE FORM
// ============================================================================
function AddRecipeForm({ onSave, onCancel }) {
  const [title, setTitle] = useState("");
  const [tagline, setTagline] = useState("");
  const [inspiration, setInspiration] = useState("");
  const [hero, setHero] = useState("");
  const [baseServings, setBaseServings] = useState(4);
  const [timeMin, setTimeMin] = useState(30);
  const [difficulty, setDifficulty] = useState("Easy");
  const [emoji, setEmoji] = useState("🍽️");
  const [ingredients, setIngredients] = useState([{ name: "", amount: 1, unit: "" }]);
  const [steps, setSteps] = useState([{ title: "", body: "", stage: "", timer: "" }]);

          </div>
          <div className="space-y-2">
            {ingredients.map((ing, i) => (
              <div key={i} className="flex gap-2 items-center">
                <input type="number" value={ing.amount} onChange={(e) => { const c = [...ingredients]; c[i].amount = e.target.value; setIngredients(c); }} className="w-16 px-2 py-2.5 rounded-lg text-sm" style={inputStyle} />

            ))}

        </div>
        <div>

const CUISINE_HINTS = ["Any", "Italian", "Asian", "Mexican", "Middle Eastern", "Indian", "French", "Thai", "Greek", "Comfort food"];

function Pantry({ allRecipes, pantryItems, setPantryItems, onOpenRecipe, onSaveGeneratedRecipe, recentlyGenerated, setRecentlyGenerated }) {
  const [typedItem, setTypedItem] = useState("");
  const [cuisineHint, setCuisineHint] = useState("Any");
  const [generating, setGenerating] = useState(false);
  const [genError, setGenError] = useState(null);

  const addItem = (item) => {
    const clean = item.trim().toLowerCase();
    if (!clean) return;
    if (pantryItems.some(p => p.toLowerCase() === clean)) return; // already added
    setPantryItems([...pantryItems, clean]);
    setTypedItem("");
  };
  const removeItem = (item) => setPantryItems(pantryItems.filter(p => p !== item));
  const clearAll = () => setPantryItems([]);

  const matches = useMemo(() => rankRecipesByPantry(allRecipes, pantryItems), [allRecipes, pantryItems]);

  const handleInvent = async () => {
    if (pantryItems.length < 2) {
      alert("Add a couple of ingredients first");
      return;
    }
    setGenerating(true);
    setGenError(null);
    try {
      const recipe = await inventRecipeFromPantry(pantryItems, cuisineHint === "Any" ? null : cuisineHint);
      setRecentlyGenerated([recipe, ...recentlyGenerated].slice(0, 5));
    } catch (e) {
      setGenError(e.message || "Couldn't invent a recipe just now. Try again in a moment.");
    } finally {
      setGenerating(false);
    }
  };

  const availableQuickAdds = COMMON_PANTRY.filter(q => !pantryItems.some(p => p.toLowerCase() === q.name.toLowerCase()));

  return (
    <div className="min-h-screen pb-32" style={{ background: T.bg }}>

        <div className="text-xs uppercase tracking-widest mb-1" style={{ color: T.paprika }}>Pantry</div>
        <h1 className="text-4xl font-bold leading-none" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>What's in your<br/><span style={{ fontStyle: 'italic' }}>kitchen</span>?</h1>
        <p className="mt-3 text-sm leading-relaxed" style={{ color: T.inkSoft }}>Add what you've got. I'll match recipes from the collection, or invent something fresh just for you.</p>
      </header>

      {/* Input */}
      <div className="px-5 mb-4">
        <div className="flex gap-2">
          <div className="flex items-center gap-2 px-4 py-3 rounded-2xl flex-1" style={{ background: T.cream, border: `1px solid ${T.line}` }}>
            <Icon name="search" size={18} color={T.muted} />
            <input
              value={typedItem}
              onChange={(e) => setTypedItem(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') addItem(typedItem); }}
              placeholder="Type an ingredient..."
              className="flex-1 bg-transparent outline-none text-sm"
              style={{ color: T.ink }}
            />
          </div>
          <button onClick={() => addItem(typedItem)} className="px-5 py-3 rounded-2xl font-bold text-sm" style={{ background: T.paprika, color: T.cream }} disabled={!typedItem.trim()}>
            Add
          </button>
        </div>
      </div>

      {/* Quick adds */}
      {availableQuickAdds.length > 0 && (
        <div className="px-5 mb-5">
          <div className="text-[10px] uppercase tracking-widest font-bold mb-2" style={{ color: T.muted }}>Quick add</div>
          <div className="flex flex-wrap gap-2">
            {availableQuickAdds.map(q => (
              <button key={q.name} onClick={() => addItem(q.name)} className="flex items-center gap-1.5 px-3 py-2 rounded-full text-xs font-semibold" style={{ background: T.cream, color: T.ink, border: `1px solid ${T.line}` }}>
                <span>{q.emoji}</span>
                <span>{q.name}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Active pantry */}
      {pantryItems.length > 0 && (
        <div className="px-5 mb-6">
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] uppercase tracking-widest font-bold" style={{ color: T.paprika }}>Your pantry — {pantryItems.length} {pantryItems.length === 1 ? "item" : "items"}</div>
            <button onClick={clearAll} className="text-xs font-bold" style={{ color: T.paprika }}>Clear all</button>
          </div>
          <div className="flex flex-wrap gap-2">
            {pantryItems.map(item => (
              <div key={item} className="flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-semibold" style={{ background: T.ink, color: T.cream }}>
                <span>{item}</span>
                <button onClick={() => removeItem(item)} className="flex items-center justify-center" style={{ color: T.ochre }}><Icon name="x" size={14} /></button>
              </div>

            <div className="p-5">
              <div className="flex items-start gap-3 mb-3">

                  <Icon name="sparkles" size={20} color={T.cream} />
                </div>
                <div className="flex-1">
                  <div className="text-base font-bold" style={{ color: T.cream, fontFamily: "Fraunces, serif" }}>Invent a recipe from scratch</div>
                  <div className="text-xs mt-0.5" style={{ color: 'rgba(250,246,238,0.85)' }}>Claude designs something using what you've got — honest about what's missing.</div>
                </div>
              </div>
              <div className="mb-3">
                <div className="text-[10px] uppercase tracking-widest font-bold mb-1.5" style={{ color: 'rgba(250,246,238,0.7)' }}>Style (optional)</div>
                <div className="flex gap-1.5 overflow-x-auto scrollbar-hide pb-1">
                  {CUISINE_HINTS.map(c => (
                    <button key={c} onClick={() => setCuisineHint(c)} className="px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap" style={{ background: cuisineHint === c ? T.cream : 'rgba(250,246,238,0.15)', color: cuisineHint === c ? T.paprika : T.cream }}>
                      {c}
                    </button>
                  ))}
                </div>
              </div>
              <button
                onClick={handleInvent}
                disabled={generating}
                className="w-full py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2"
                style={{ background: T.cream, color: T.paprikaDeep, opacity: generating ? 0.7 : 1 }}
              >
                {generating ? (<><Icon name="loader" size={16} className="animate-spin" /> Inventing...</>) : (<><Icon name="sparkles" size={16} /> Invent a recipe</>)}
              </button>
              {genError && (
                <div className="mt-3 px-3 py-2 rounded-lg text-xs" style={{ background: 'rgba(26,22,18,0.3)', color: T.cream }}>
                  {genError}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Recently generated */}
      {recentlyGenerated.length > 0 && (
        <div className="px-5 mb-6">
          <div className="flex items-center gap-2 mb-3">
            <Icon name="sparkles" size={14} color={T.paprika} />
            <h2 className="text-lg font-bold" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>Just invented for you</h2>
          </div>
          <div className="space-y-3">
            {recentlyGenerated.map(r => (
              <RecipeCard key={r.id} recipe={r} onClick={() => onOpenRecipe(r)} />
            ))}
          </div>
        </div>
      )}

      {/* Matching recipes */}
      {pantryItems.length >= 2 && matches.length > 0 && (
        <div className="px-5">
          <div className="flex items-center gap-2 mb-1">
            <Icon name="chef" size={14} color={T.sage} />
            <h2 className="text-lg font-bold" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>From the collection</h2>
          </div>
          <p className="text-xs mb-3" style={{ color: T.muted }}>{matches.length} recipe{matches.length === 1 ? "" : "s"} use at least 2 of your ingredients — ranked by how much you've already got.</p>
          <div className="space-y-3">
            {matches.slice(0, 15).map(m => (
              <RecipeCard key={m.recipe.id} recipe={m.recipe} onClick={() => onOpenRecipe(m.recipe)} pantryMatch={m} />
            ))}
          </div>
        </div>
      )}

      {pantryItems.length >= 2 && matches.length === 0 && (
        <div className="px-5 py-8 text-center rounded-2xl mx-5" style={{ background: T.bgDeep }}>
          <div className="text-5xl mb-3">🤔</div>
          <div className="text-sm font-bold mb-1" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>No matches from the collection</div>
          <div className="text-xs" style={{ color: T.muted }}>But you can still invent something new — tap the button above.</div>
        </div>
      )}
    </div>
  );
}

function Home({ recipes, userRecipes, favorites, mealPlan, onOpenRecipe, onToggleFavorite, onOpenShopping, onOpenPantry, pantryItems }) {
  const allRecipes = [...userRecipes, ...recipes];
  const [search, setSearch] = useState("");
  const [activeCategory, setActiveCategory] = useState(null);
  const [activeMood, setActiveMood] = useState("All");
  const planCount = Object.keys(mealPlan).length;
  const searchQueries = search.trim().toLowerCase().split(/\s+/).filter(Boolean);

  // Count recipes per category
  const categoryCounts = useMemo(() => {
    const counts = {};
    for (const cat of CATEGORIES) {
      counts[cat.id] = allRecipes.filter(r => recipeMatchesCategory(r, cat)).length;
    }
    return counts;
  }, [allRecipes]);

  // Apply all filters (mood + category + search) with ranking
  const results = useMemo(() => {
    const scored = allRecipes.map(r => {
      // Mood filter
      if (activeMood === "Quick" && r.timeMin > 25) return null;
      if (activeMood === "Weekend" && r.timeMin < 60) return null;
      if (activeMood === "Yours" && !r.userAdded) return null;
      if (activeMood === "Favourites" && !favorites.includes(r.id)) return null;
      // Category filter
      if (activeCategory) {
        const cat = CATEGORIES.find(c => c.id === activeCategory);
        if (cat && !recipeMatchesCategory(r, cat)) return null;
      }
      // Search
      if (searchQueries.length > 0) {
        const { score, matches } = searchRecipe(r, searchQueries);
        if (score === 0) return null;
        return { recipe: r, score, matches };
      }
      return { recipe: r, score: 0, matches: [] };
    }).filter(Boolean);
    if (searchQueries.length > 0) scored.sort((a, b) => b.score - a.score);
    return scored;
  }, [allRecipes, activeMood, activeCategory, searchQueries.join("|"), favorites]);

  const moodFilters = ["All", "Quick", "Weekend", "Favourites", "Yours"];
  const cuisineCategories = CATEGORIES.filter(c => c.kind === "cuisine" && categoryCounts[c.id] > 0);
  const typeCategories = CATEGORIES.filter(c => c.kind === "type" && categoryCounts[c.id] > 0);

  const activeCatObj = activeCategory ? CATEGORIES.find(c => c.id === activeCategory) : null;

  return (
    <div className="min-h-screen pb-28" style={{ background: T.bg }}>
      {/* Hero */}
      <header className="px-5 pt-8 pb-4">
        <div className="text-xs uppercase tracking-widest mb-1" style={{ color: T.paprika }}>A cooking companion</div>

        <div className="mt-2 text-xs" style={{ color: T.muted }}>{allRecipes.length} recipes · chef-inspired, honestly adapted</div>
      </header>

      {/* Active meal plan strip */}
      {planCount > 0 && (
        <div className="px-5 mb-4">
          <button onClick={onOpenShopping} className="w-full flex items-center justify-between p-4 rounded-2xl" style={{ background: T.ink, color: T.cream }}>
            <div className="flex items-center gap-3">
              <Icon name="cart" size={18} />
              <div className="text-left">
                <div className="text-sm font-bold">{planCount} meal{planCount > 1 ? 's' : ''} in your plan</div>
                <div className="text-xs" style={{ color: T.ochre }}>Tap to see shopping list</div>
              </div>
            </div>
            <Icon name="arrowLeft" size={16} style={{ transform: 'rotate(180deg)' }} />
          </button>
        </div>
      )}

      {/* Cook with what you have — prominent CTA */}
      <div className="px-5 mb-5">
        <button onClick={onOpenPantry} className="w-full text-left rounded-2xl overflow-hidden relative" style={{ background: `linear-gradient(135deg, ${T.sage} 0%, ${T.ink} 100%)`, boxShadow: '0 8px 24px rgba(91,107,71,0.25)' }}>
          <div className="p-5 flex items-center gap-4">
            <div className="w-14 h-14 rounded-full flex items-center justify-center flex-shrink-0 text-3xl" style={{ background: 'rgba(250,246,238,0.15)' }}>
              🧺
            </div>
            <div className="flex-1">
              <div className="text-xs uppercase tracking-widest font-bold mb-0.5" style={{ color: T.ochre }}>Cook with what you have</div>
              <div className="text-lg font-bold leading-tight" style={{ color: T.cream, fontFamily: "Fraunces, serif" }}>
                {pantryItems.length > 0 ? `${pantryItems.length} ingredient${pantryItems.length > 1 ? "s" : ""} in your pantry` : "Got stuff to use up?"}
              </div>
              <div className="text-xs mt-0.5" style={{ color: 'rgba(250,246,238,0.75)' }}>Find recipes or let Claude invent one</div>
            </div>
            <Icon name="arrowLeft" size={20} color={T.cream} style={{ transform: 'rotate(180deg)' }} />
          </div>
        </button>
      </div>

      {/* Search */}
      <div className="px-5 mb-4">
        <div className="flex items-center gap-2 px-4 py-3 rounded-2xl" style={{ background: T.cream, border: `1px solid ${T.line}` }}>
          <Icon name="search" size={18} color={T.muted} />
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search recipes, chefs, ingredients..." className="flex-1 bg-transparent outline-none text-sm" style={{ color: T.ink }} />
          {search && <button onClick={() => setSearch("")}><Icon name="x" size={16} color={T.muted} /></button>}
        </div>
        {searchQueries.length > 0 && (
          <div className="mt-2 text-[11px]" style={{ color: T.muted }}>
            {results.length} {results.length === 1 ? 'match' : 'matches'} — ranked by relevance
          </div>
        )}
      </div>

      {/* Cuisines */}
      <div className="mb-5">
        <div className="px-5 mb-2 flex items-center justify-between">
          <div className="text-[10px] uppercase tracking-widest font-bold" style={{ color: T.muted }}>Browse by cuisine</div>
          {activeCategory && (
            <button onClick={() => setActiveCategory(null)} className="text-[11px] font-bold flex items-center gap-1" style={{ color: T.paprika }}>
              Clear <Icon name="x" size={10} />
            </button>
          )}
        </div>
        <div className="px-5 flex gap-2 overflow-x-auto scrollbar-hide pb-1">
          {cuisineCategories.map(cat => {
            const active = activeCategory === cat.id;
            return (
              <button
                key={cat.id}
                onClick={() => setActiveCategory(active ? null : cat.id)}
                className="flex-shrink-0 rounded-2xl overflow-hidden transition-all"
                style={{
                  background: active ? T.ink : T.cream,
                  border: `1.5px solid ${active ? T.ink : T.line}`,
                  width: "100px",
                }}
              >
                <div className="py-3 px-2 text-center">
                  <div className="text-3xl mb-1">{cat.emoji}</div>
                  <div className="text-xs font-bold leading-tight" style={{ color: active ? T.cream : T.ink }}>{cat.label}</div>
                  <div className="text-[10px] mt-0.5" style={{ color: active ? T.ochre : T.muted }}>{categoryCounts[cat.id]}</div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Types */}
      {typeCategories.length > 0 && (
        <div className="mb-5">
          <div className="px-5 mb-2 text-[10px] uppercase tracking-widest font-bold" style={{ color: T.muted }}>Browse by type</div>
          <div className="px-5 flex gap-2 overflow-x-auto scrollbar-hide pb-1">
            {typeCategories.map(cat => {
              const active = activeCategory === cat.id;
              return (
                <button
                  key={cat.id}
                  onClick={() => setActiveCategory(active ? null : cat.id)}
                  className="flex-shrink-0 px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex items-center gap-2"
                  style={{
                    background: active ? T.ink : 'transparent',
                    color: active ? T.cream : T.inkSoft,
                    border: `1.5px solid ${active ? T.ink : T.line}`,
                  }}
                >
                  <span>{cat.emoji}</span>
                  <span>{cat.label}</span>
                  <span className="text-[10px] opacity-60">{categoryCounts[cat.id]}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Mood filters */}
      <div className="px-5 mb-5 flex gap-2 overflow-x-auto scrollbar-hide pb-1">
        {moodFilters.map(f => (
          <button key={f} onClick={() => setActiveMood(f)} className="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap" style={{ background: activeMood === f ? T.paprika : 'transparent', color: activeMood === f ? T.cream : T.inkSoft, border: `1.5px solid ${activeMood === f ? T.paprika : T.line}` }}>{f}</button>
        ))}
      </div>

      {/* Active filter summary */}
      {(activeCategory || activeMood !== "All" || searchQueries.length > 0) && (
        <div className="px-5 mb-3 text-xs" style={{ color: T.muted }}>
          Showing {results.length} recipe{results.length === 1 ? "" : "s"}
          {activeCatObj ? <> in <span style={{ color: T.paprika, fontWeight: 700 }}>{activeCatObj.label}</span></> : null}
          {activeMood !== "All" ? <> · {activeMood}</> : null}
        </div>
      )}

      {/* Recipe grid */}
      {results.length === 0 ? (
        <div className="px-5 py-16 text-center">
          <div className="text-5xl mb-3">🍽️</div>
          <div className="text-lg font-bold mb-1" style={{ color: T.ink, fontFamily: "Fraunces, serif" }}>Nothing matches</div>
          <div className="text-sm" style={{ color: T.muted }}>
            {activeMood === "Yours" ? "Tap + to add your first recipe" : "Try clearing a filter or searching differently"}
          </div>
          {(activeCategory || activeMood !== "All" || searchQueries.length > 0) && (
            <button onClick={() => { setActiveCategory(null); setActiveMood("All"); setSearch(""); }} className="mt-4 px-4 py-2 rounded-full text-sm font-bold" style={{ background: T.ink, color: T.cream }}>
              Clear all filters
            </button>
          )}
        </div>
      ) : (
        <div className="px-5 grid grid-cols-1 gap-4">
          {results.map(({ recipe, matches }) => (
            <RecipeCard
              key={recipe.id}
              recipe={recipe}
              onClick={() => onOpenRecipe(recipe)}
              favorite={favorites.includes(recipe.id)}
              onToggleFavorite={onToggleFavorite}
              matchInfo={searchQueries.length > 0 ? matches : null}
              highlightQueries={searchQueries}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [view, setView] = useState("home");
  const [activeRecipe, setActiveRecipe] = useState(null);
  const [userRecipes, setUserRecipes] = useState([]);
  const [favorites, setFavorites] = useState([]);
  const [adjustments, setAdjustments] = useState({});
  const [mealPlan, setMealPlan] = useState({});
  const [pantryItems, setPantryItems] = useState([]);
  const [recentlyGenerated, setRecentlyGenerated] = useState([]);

  useEffect(() => {
    setUserRecipes(loadStorage(SK.userRecipes, []) || []);
    setFavorites(loadStorage(SK.favorites, []) || []);
    setAdjustments(loadStorage(SK.adjustments, {}) || {});
    setMealPlan(loadStorage(SK.mealPlan, {}) || {});
    setPantryItems(loadStorage(SK.pantry, []) || []);
    setRecentlyGenerated(loadStorage(SK.generatedRecipes, []) || []);
  }, []);

  const handleSaveRecipe = (recipe) => {
    const next = [recipe, ...userRecipes];
    setUserRecipes(next);
    saveStorage(SK.userRecipes, next);
    setView("home");
  };
  const handleDeleteRecipe = (id) => {
    const next = userRecipes.filter(r => r.id !== id);
    setUserRecipes(next);
    saveStorage(SK.userRecipes, next);
    setView("home");
  };
  const handleToggleFavorite = (id) => {
    const next = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
    setFavorites(next);
    saveStorage(SK.favorites, next);
  };
  const handleUpdateAdjustments = (next) => {
    setAdjustments(next);
    saveStorage(SK.adjustments, next);
  };
  const handleUpdateMealPlan = (next) => {
    setMealPlan(next);
    saveStorage(SK.mealPlan, next);
  };
  const handleUpdatePantry = (next) => {
    setPantryItems(next);
    saveStorage(SK.pantry, next);
  };
  const handleUpdateGenerated = (next) => {
    setRecentlyGenerated(next);
    saveStorage(SK.generatedRecipes, next);
  };
  const handleSaveGenerated = (recipe) => {
    // Mark as saved and add to userRecipes
    const savedRecipe = { ...recipe, savedByUser: true, userAdded: true };
    const next = [savedRecipe, ...userRecipes];
    setUserRecipes(next);
    saveStorage(SK.userRecipes, next);
    // Update in recentlyGenerated too
    const nextGen = recentlyGenerated.map(r => r.id === recipe.id ? savedRecipe : r);
    setRecentlyGenerated(nextGen);
    saveStorage(SK.generatedRecipes, nextGen);
    // Update the active recipe too
    if (activeRecipe?.id === recipe.id) setActiveRecipe(savedRecipe);
  };

  const showNav = view === "home" || view === "pantry" || view === "shop" || view === "add";
  const planCount = Object.keys(mealPlan).length;
  // Pool all recipes for lookup (includes generated)
  const allLookupRecipes = [...userRecipes, ...recentlyGenerated.filter(g => !userRecipes.find(u => u.id === g.id)), ...ALL_SEED_RECIPES];

  return (
    <>
      {view === "home" && (
        <Home
          recipes={ALL_SEED_RECIPES}
          userRecipes={userRecipes}
          favorites={favorites}
          mealPlan={mealPlan}
          onOpenRecipe={(r) => { setActiveRecipe(r); setView("detail"); }}
          onToggleFavorite={handleToggleFavorite}
          onOpenShopping={() => setView("shop")}
          onOpenPantry={() => setView("pantry")}
          pantryItems={pantryItems}
        />
      )}
      {view === "pantry" && (
        <Pantry
          allRecipes={[...userRecipes, ...ALL_SEED_RECIPES]}
          pantryItems={pantryItems}
          setPantryItems={handleUpdatePantry}
          onOpenRecipe={(r) => { setActiveRecipe(r); setView("detail"); }}
          onSaveGeneratedRecipe={handleSaveGenerated}
          recentlyGenerated={recentlyGenerated}
          setRecentlyGenerated={handleUpdateGenerated}
        />
      )}
      {view === "detail" && activeRecipe && (
        <RecipeDetail
          recipe={activeRecipe}
          onBack={() => setView(activeRecipe.generatedByClaude ? "pantry" : "home")}
          favorite={favorites.includes(activeRecipe.id)}
          onToggleFavorite={handleToggleFavorite}
          onDelete={handleDeleteRecipe}
          adjustments={adjustments}
          updateAdjustments={handleUpdateAdjustments}
          onSaveGenerated={handleSaveGenerated}
        />
      )}
      {view === "shop" && (
        <PlanAndShop
          recipes={ALL_SEED_RECIPES}
          userRecipes={userRecipes}
          mealPlan={mealPlan}
          setMealPlan={handleUpdateMealPlan}
          adjustments={adjustments}
          updateAdjustments={handleUpdateAdjustments}
          onBack={() => setView("home")}
        />
      )}
      {view === "add" && <AddRecipeForm onSave={handleSaveRecipe} onCancel={() => setView("home")} />}

      {showNav && (
        <nav className="fixed bottom-0 left-0 right-0 px-3 pb-3 pt-2 z-20" style={{ background: `linear-gradient(180deg, transparent 0%, ${T.bg} 40%)` }}>
          <div className="rounded-full p-1 flex items-center justify-around max-w-md mx-auto" style={{ background: T.ink, boxShadow: '0 8px 24px rgba(26,22,18,0.25)' }}>
            <button onClick={() => setView("home")} className="flex-1 py-2.5 rounded-full flex flex-col items-center justify-center gap-0.5" style={{ background: view === "home" ? T.paprika : 'transparent', color: T.cream }}>
              <Icon name="home" size={16} />
              <span className="text-[10px] font-semibold">Kitchen</span>
            </button>
            <button onClick={() => setView("pantry")} className="flex-1 py-2.5 rounded-full flex flex-col items-center justify-center gap-0.5 relative" style={{ background: view === "pantry" ? T.paprika : 'transparent', color: T.cream }}>
              <span className="text-base leading-none">🧺</span>
              <span className="text-[10px] font-semibold">Pantry</span>
              {pantryItems.length > 0 && (<span className="absolute top-1 right-3 min-w-[16px] h-4 rounded-full text-[9px] font-bold flex items-center justify-center px-1" style={{ background: T.ochre, color: T.ink }}>{pantryItems.length}</span>)}
            </button>
            <button onClick={() => setView("shop")} className="flex-1 py-2.5 rounded-full flex flex-col items-center justify-center gap-0.5 relative" style={{ background: view === "shop" ? T.paprika : 'transparent', color: T.cream }}>
              <Icon name="cart" size={16} />
              <span className="text-[10px] font-semibold">Plan</span>
              {planCount > 0 && (<span className="absolute top-1 right-3 min-w-[16px] h-4 rounded-full text-[9px] font-bold flex items-center justify-center px-1" style={{ background: T.ochre, color: T.ink }}>{planCount}</span>)}
            </button>
            <button onClick={() => setView("add")} className="flex-1 py-2.5 rounded-full flex flex-col items-center justify-center gap-0.5" style={{ background: view === "add" ? T.paprika : 'transparent', color: T.cream }}>
              <Icon name="plus" size={16} />
              <span className="text-[10px] font-semibold">Add</span>
            </button>
          </div>
        </nav>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
