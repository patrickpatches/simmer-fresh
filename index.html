<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overscroll-behavior:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:'Manrope',system-ui,sans-serif;background:#F7F2EA;color:#1C1712;font-feature-settings:"kern","liga","calt"}
#root{min-height:100vh}
input,textarea,button,select{font-family:inherit}
.serif{font-family:'Fraunces',Georgia,serif;font-feature-settings:"kern","liga","dlig","ss01"}
.serif-it{font-family:'Fraunces',Georgia,serif;font-style:italic;font-feature-settings:"kern","liga","dlig"}
.lc1{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.lc2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lc3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.scrollbar-hide::-webkit-scrollbar{display:none}
.scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}

/* ─── Press & focus micro-interactions ─── */
.press{transition:transform .12s cubic-bezier(.2,.9,.3,1.2),box-shadow .18s ease,background-color .2s ease,border-color .2s ease,opacity .15s ease}
.press:active{transform:scale(0.975)}
button:focus{outline:none}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid #C4422A;outline-offset:2px;border-radius:12px}

/* ─── Animations ─── */
.fade-in{animation:fadeIn .28s cubic-bezier(.2,.9,.3,1.1) both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .35s cubic-bezier(.16,1,.3,1) both}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slide-right{animation:slideRight .34s cubic-bezier(.2,.85,.25,1) both}
@keyframes slideRight{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
.check-bounce{animation:checkBounce .22s cubic-bezier(.68,-.55,.27,1.55) both}
@keyframes checkBounce{0%{transform:scale(0.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.pulse-once{animation:pulseOnce .7s ease-out both}
@keyframes pulseOnce{0%{box-shadow:0 0 0 0 rgba(196,66,42,.4)}100%{box-shadow:0 0 0 14px rgba(196,66,42,0)}}
.timer-breath{animation:timerBreath 2.2s ease-in-out infinite}
@keyframes timerBreath{0%,100%{opacity:.85}50%{opacity:1}}

/* ─── Image shimmer while loading ─── */
.img-skeleton{position:relative;overflow:hidden;background:#EDE3D3}
.img-skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(253,250,246,.55) 50%,transparent 70%);animation:shimmer 1.4s ease-in-out infinite;transform:translateX(-100%)}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.img-fade{opacity:0;transition:opacity .4s ease}
.img-fade.loaded{opacity:1}

/* ─── Selected text & highlight ─── */
mark{background:linear-gradient(180deg,transparent 55%,#F5D77A 55%);border-radius:0;padding:0 1px;color:inherit}
::selection{background:#C4422A;color:#FDF9F3}

/* ─── Typography accents ─── */
.eyebrow{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:#8C7B6E}
.num-tnum{font-variant-numeric:tabular-nums}

/* ─── Safe area ─── */
.pb-nav{padding-bottom:calc(88px + env(safe-area-inset-bottom,0px))}
.pt-safe{padding-top:env(safe-area-inset-top,0px)}

/* ─── Respect reduced motion ─── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>
</head>

{
  id:'smash-burger',
  title:'Smash Burger',
  tagline:'The crispy-edged diner classic',
  category:'beef',
  time:20,
  difficulty:'easy',
  baseServings:2,
  inspiration:'Andy Cooks',
  sourceUrl:'https://www.youtube.com/@AndyCooks',
  heroEmoji:'🍔',
  heroColor:'#8B4513',
  heroImg:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Beef mince (80/20 fat)',amount:200,unit:'g',scales:'linear',notes:'Fat ratio is non-negotiable — leaner beef steams instead of crisping'},
    {id:'i2',name:'Burger buns (brioche)',amount:1,unit:'',scales:'linear'},
    {id:'i3',name:'American cheese slices',amount:2,unit:'',scales:'linear'},
    {id:'i4',name:'White onion, finely diced',amount:30,unit:'g',scales:'linear'},
    {id:'i5',name:'Dill pickles',amount:4,unit:'slices',scales:'linear'},
    {id:'i6',name:'Burger sauce (mayo + ketchup + mustard)',amount:2,unit:'tbsp',scales:'fixed'},
    {id:'i7',name:'Salt',amount:0.5,unit:'tsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Ball and season',content:'Divide the beef into 100g balls per patty — don\'t pack them tightly. Season only the outside with salt right before cooking. Salting early draws moisture and stops the crust forming.',timer:null,why:'Pre-salting denatures proteins and pulls water to the surface, which steams instead of browning. You want a dry surface hitting that hot iron.'},
    {id:'s2',title:'Get the pan screaming',content:'Cast iron or heavy steel pan on highest heat for at least 3 minutes. No oil — the beef fat does the work. It should be starting to smoke.',timer:180,why:'Maillard browning needs metal above 180°C. A warm pan just steams the meat. Three minutes on max heat gets cast iron where it needs to be.'},
    {id:'s3',title:'Smash hard and hold',content:'Place a ball on the pan, put a piece of baking paper on top, and press down with a flat spatula as hard as you can. Hold for 10 full seconds. The patty should be 1cm thin.',timer:10,why:'The smash maximises surface contact with hot metal. More contact = more Maillard = more crust. The paper stops the spatula sticking.'},
    {id:'s4',title:'Cook and cheese',content:'Cook 90 seconds without touching — you want a deep brown crust forming. Flip once, immediately add the cheese slice. Cook 45 more seconds. The cheese melts from the residual heat.',timer:90,why:'Single flip. Moving the patty cools the surface and breaks the crust formation. Cheese goes on right after the flip so it has the full second side cook time to melt properly.'},
    {id:'s5',title:'Toast the bun',content:'While the patty finishes, toast the bun cut-side down in the same pan. 30–45 seconds until golden. The beef fat left in the pan flavours it.',timer:30,why:'A toasted bun won\'t go soggy when sauces and steam hit it. The fat residue adds flavour that plain toasting misses.'},
    {id:'s6',title:'Stack and serve',content:'Sauce on the bottom bun, pickles, onion, patty (cheese-side up), top bun. Eat immediately — smash burgers do not improve with waiting.',timer:null,why:'Order matters: sauce on bottom bun protects it from moisture. Onion under the patty gets slightly warmed by the meat. Eat within 2 minutes before the crust softens.'},
  ],
  tags:['beef','quick','crowd-pleaser'],
},
{
  id:'chicken-adobo',
  title:'Chicken Adobo',
  tagline:'Filipino vinegar braise — deeply savoury',
  category:'chicken',
  time:50,
  difficulty:'easy',
  baseServings:4,
  inspiration:'Anthony Bourdain / No Reservations',
  sourceUrl:'https://www.youtube.com/@Parts-Unknown',
  heroEmoji:'🍗',
  heroColor:'#5C3317',
  heroImg:'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Chicken thighs, bone-in',amount:800,unit:'g',scales:'linear'},
    {id:'i2',name:'White cane vinegar',amount:120,unit:'ml',scales:'linear',notes:'Filipino cane vinegar if you can find it — white wine vinegar works'},
    {id:'i3',name:'Soy sauce',amount:80,unit:'ml',scales:'linear'},
    {id:'i4',name:'Garlic cloves, crushed',amount:8,unit:'',scales:'linear'},
    {id:'i5',name:'Bay leaves',amount:4,unit:'',scales:'fixed'},
    {id:'i6',name:'Black peppercorns, whole',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Neutral oil',amount:1,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Brown the chicken',content:'Heat oil in a wide pan over high heat. Brown chicken thighs skin-side down for 5 minutes without moving. They should release when the skin is properly crisp. Flip, 2 more minutes.',timer:300,why:'The browning creates complex flavour compounds (Maillard) that the braising liquid will carry throughout the dish. Skipping this makes adobo flat and grey.'},
    {id:'s2',title:'Add everything and braise',content:'Add vinegar, soy sauce, garlic, bay leaves, and peppercorns. Bring to a boil, then reduce to a low simmer. Cover and cook 25 minutes.',timer:1500,why:'The acid in the vinegar breaks down collagen in the thighs to gelatin — that\'s what gives adobo its silky, clingy sauce. Low heat keeps the muscle fibres from seizing up.'},
    {id:'s3',title:'Reduce the sauce',content:'Remove the lid, turn heat up to medium. Cook 10–15 minutes until the sauce reduces by half and turns glossy and mahogany-coloured.',timer:600,why:'Reducing concentrates the sugar and amino acids into a glaze. The colour change from light brown to mahogany is your signal — it\'s Maillard happening in the liquid.'},
    {id:'s4',title:'Serve over rice',content:'Serve immediately over steamed white rice. The sauce is the point — make sure every plate gets a generous spoonful.',timer:null,why:null},
  ],
  tags:['chicken','asian','braise','meal-prep'],
},
{
  id:'pasta-carbonara',
  title:'Pasta Carbonara',
  tagline:'The Roman original — no cream, ever',

  time:25,
  difficulty:'medium',
  baseServings:2,
  inspiration:'Gordon Ramsay',
  sourceUrl:'https://www.youtube.com/@GordonRamsay',
  heroEmoji:'🍝',
  heroColor:'#C8963C',
  heroImg:'https://images.unsplash.com/photo-1612874742237-6526221588e3?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Spaghetti or rigatoni',amount:160,unit:'g',scales:'linear'},
    {id:'i2',name:'Guanciale (or pancetta)',amount:100,unit:'g',scales:'linear'},
    {id:'i3',name:'Egg yolks',amount:3,unit:'',scales:'linear'},
    {id:'i4',name:'Whole egg',amount:1,unit:'',scales:'fixed'},
    {id:'i5',name:'Pecorino Romano, finely grated',amount:60,unit:'g',scales:'linear'},
    {id:'i6',name:'Black pepper, freshly cracked',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Salt (for pasta water)',amount:1,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Mix the sauce off-heat',content:'Whisk yolks, whole egg, and pecorino into a thick paste. Add cracked pepper. This is your sauce — make it before anything else.',timer:null,why:'Cold eggs mixed with cold cheese form a stable emulsion. Mixing it warm causes the eggs to start cooking before they hit the pasta, and you\'ll get scrambled eggs instead of silk.'},
    {id:'s2',title:'Render the guanciale',content:'Cook guanciale cubes in a cold, dry pan over medium heat. The fat renders slowly and the meat crisps without burning. Remove and leave the fat in the pan.',timer:480,why:'Starting cold renders the fat gradually — starting hot burns the outside before the inside renders. The rendered fat is your cooking medium for the whole dish.'},
    {id:'s3',title:'Cook pasta in well-salted water',content:'Salt your pasta water until it tastes like the sea. Cook pasta 2 minutes short of package time — it finishes cooking in the sauce. Reserve 200ml of pasta water before draining.',timer:null,why:'Pasta water is starch and salt. It\'s the only liquid that can loosen carbonara sauce without breaking it. Plain water dilutes and ruins it.'},
    {id:'s4',title:'Combine off heat — this is the critical step',content:'Add drained pasta to the guanciale pan. Take the pan completely off heat. Add egg mixture, toss constantly, adding pasta water a splash at a time until you have a creamy sauce that coats every strand. If it seizes, add more water.',timer:null,why:'Eggs scramble above 70°C. Off heat, the pasta\'s residual heat (around 65°C) is exactly right to cook the eggs without curdling. Adding water regulates the temperature and creates the emulsion. This is why carbonara has a reputation — the temperature window is narrow.'},
    {id:'s5',title:'Serve immediately',content:'Plate immediately, top with extra pecorino and more black pepper. Carbonara does not wait — it thickens rapidly as it cools.',timer:null,why:null},
  ],
  tags:['pasta','italian','quick','eggs'],
},
{
  id:'beef-stew',
  title:'Classic Beef Stew',
  tagline:'Low and slow, built for winter',
  category:'beef',
  time:180,
  difficulty:'easy',
  baseServings:4,
  inspiration:'Jacques Pépin',
  sourceUrl:'https://www.youtube.com/@jacquespepin',
  heroEmoji:'🥘',
  heroColor:'#6B3A2A',
  heroImg:'https://images.unsplash.com/photo-1548943487-a2e4e43b4853?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Beef chuck, 4cm cubes',amount:700,unit:'g',scales:'linear'},
    {id:'i2',name:'Carrots, cut in chunks',amount:300,unit:'g',scales:'linear'},
    {id:'i3',name:'Potatoes, cut in chunks',amount:400,unit:'g',scales:'linear'},
    {id:'i4',name:'Onion, roughly chopped',amount:200,unit:'g',scales:'linear'},
    {id:'i5',name:'Tomato paste',amount:2,unit:'tbsp',scales:'fixed'},
    {id:'i6',name:'Red wine',amount:200,unit:'ml',scales:'linear'},
    {id:'i7',name:'Beef stock',amount:500,unit:'ml',scales:'linear'},
    {id:'i8',name:'Thyme sprigs',amount:4,unit:'',scales:'fixed'},
    {id:'i9',name:'Bay leaves',amount:2,unit:'',scales:'fixed'},
    {id:'i10',name:'Plain flour',amount:2,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Season and sear in batches',content:'Season beef generously. Sear in hot oil in batches — never crowd the pan. Each piece needs 2 minutes undisturbed on each side until deeply browned. Set aside.',timer:null,why:'Crowding drops the pan temperature below 120°C and the meat steams instead of browns. Steam = grey, flavourless exterior. Batch searing keeps the pan hot.'},
    {id:'s2',title:'Build the base',content:'In the same pot, soften onion 5 minutes. Add tomato paste, stir 2 minutes until it darkens. This is caramelising the paste — it loses its raw tin taste and becomes nutty.',timer:300,why:'Raw tomato paste tastes acidic and one-dimensional. Cooking it in fat triggers the Maillard reaction, converting the sugars and developing complex savoury notes.'},
    {id:'s3',title:'Flour and deglaze',content:'Return the beef. Sprinkle flour over everything and stir to coat. Add wine, scraping up every browned bit from the bottom. Those bits are pure flavour.',timer:null,why:'The flour coats the meat in a thin layer that thickens the stew as it cooks. The fond (browned bits) contains concentrated Maillard compounds — deglazing recovers them.'},
    {id:'s4',title:'Braise low and slow',content:'Add stock, thyme, bay leaves. Liquid should just cover the meat. Bring to a bare simmer — not a boil. Cover and cook 1.5 hours.',timer:5400,why:'Collagen in chuck converts to gelatin between 70–80°C over extended time — this is what makes stew silky. Boiling instead of simmering makes the meat tough and stringy.'},
    {id:'s5',title:'Add veg and finish',content:'Add carrots and potatoes. Continue simmering, uncovered, 30–40 minutes until vegetables are tender and sauce has thickened.',timer:1800,why:'Vegetables added early turn to mush. Added in the last 30–40 minutes they cook through without disintegrating. Removing the lid lets steam escape and the sauce reduce and concentrate.'},
  ],
  tags:['beef','braise','winter','batch-cook'],
},
{
  id:'roast-chicken',
  title:'Perfect Roast Chicken',
  tagline:'Crisp skin, juicy thighs, every time',
  category:'chicken',
  time:90,
  difficulty:'easy',
  baseServings:4,
  inspiration:'Thomas Keller / Bouchon',
  sourceUrl:'https://www.youtube.com/@thomaskeller',
  heroEmoji:'🐔',
  heroColor:'#B8721A',
  heroImg:'https://images.unsplash.com/photo-1598103442097-8b74394b95c8?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Whole chicken',amount:1.8,unit:'kg',scales:'fixed',notes:'One chicken feeds 4 — buy a bigger bird for more people, not more chickens'},
    {id:'i2',name:'Unsalted butter, softened',amount:60,unit:'g',scales:'fixed'},
    {id:'i3',name:'Garlic cloves',amount:4,unit:'',scales:'fixed'},
    {id:'i4',name:'Fresh thyme',amount:6,unit:'sprigs',scales:'fixed'},
    {id:'i5',name:'Lemon',amount:1,unit:'',scales:'fixed'},
    {id:'i6',name:'Flaky salt',amount:1,unit:'tbsp',scales:'fixed'},
    {id:'i7',name:'Black pepper',amount:1,unit:'tsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Dry brine the day before',content:'Pat the chicken completely dry. Rub salt all over, including inside the cavity. Refrigerate uncovered overnight — at minimum 2 hours.',timer:null,why:'Dry brining draws moisture to the surface via osmosis, then the salt dissolves back in. The resulting brine penetrates the meat. The uncovered fridge also dries the skin — dry skin crisps, wet skin steams.'},
    {id:'s2',title:'Bring to room temp and preheat',content:'Take chicken out of fridge 45 minutes before cooking. Preheat oven to 230°C (fan 210°C).',timer:2700,why:'Cold meat hitting a hot oven creates a large gradient — the outside overcooks before the inside is done. Room temp meat cooks more evenly. 230°C is high enough to blister the skin before reducing.'},
    {id:'s3',title:'Butter under and over the skin',content:'Mix softened butter with crushed garlic and thyme leaves. Carefully separate the skin from the breast meat with your fingers and push butter under it. Rub remaining butter over the outside.',timer:null,why:'Butter under the skin bastes the breast meat directly as it melts. Butter on the outside browns the skin through the Maillard reaction. The breast is the first part to dry out — this solves that.'},
    {id:'s4',title:'Roast high then reduce',content:'Place chicken breast-side up in a roasting pan. Roast at 230°C for 15 minutes, then reduce to 190°C. Continue for 50–60 minutes until the thigh juices run clear.',timer:900,why:'The initial high heat blisters and crisps the skin. Reducing heat prevents the skin burning before the interior is cooked. The breast-side-up position means the thighs — which take longer — face the heat from below and the reflected heat from the sides.'},
    {id:'s5',title:'Rest properly',content:'Transfer to a board, loosely tent with foil. Rest 15 minutes before carving. This is not optional.',timer:900,why:'Muscle fibres that contracted during cooking relax during resting, and the juices redistribute evenly. Cutting early releases all those juices onto the board. 15 minutes for a whole chicken — 5 minutes is not enough.'},
  ],
  tags:['chicken','roast','sunday','classic'],
},
{
  id:'musakhan',
  title:'Musakhan',
  tagline:'Palestinian roasted chicken with sumac and onions',
  category:'levantine',
  time:90,
  difficulty:'medium',
  baseServings:4,
  inspiration:'Reem Kassis / The Palestinian Table',
  sourceUrl:'https://www.youtube.com/@reemkassis',
  heroEmoji:'🍗',
  heroColor:'#8B3A1A',
  heroImg:'https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Whole chicken, jointed into 8 pieces',amount:1.6,unit:'kg',scales:'linear'},
    {id:'i2',name:'Yellow onions, thinly sliced',amount:1,unit:'kg',scales:'linear',notes:'The onions are half the dish — do not reduce them'},
    {id:'i3',name:'Sumac',amount:5,unit:'tbsp',scales:'linear',notes:'Sumac is the defining flavour. Use a fresh, vivid-red one — stale sumac tastes of nothing'},
    {id:'i4',name:'Extra virgin olive oil',amount:120,unit:'ml',scales:'linear',notes:'Palestinian olive oil if you can find it'},
    {id:'i5',name:'Ground allspice',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i6',name:'Ground cinnamon',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Ground cardamom',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Flatbread or taboon (or thick pittas)',amount:4,unit:'large',scales:'linear',notes:'Taboon is traditional — the bread soaks up the onion and chicken juices underneath'},
    {id:'i9',name:'Pine nuts, toasted',amount:60,unit:'g',scales:'linear'},
  ],
  steps:[
    {id:'s1',title:'Spice-rub and roast the chicken',content:'Mix half the sumac with allspice, cinnamon, cardamom, salt, and 3 tbsp olive oil. Rub all over chicken pieces. Roast at 200°C for 35–40 minutes until skin is deep golden and juices run clear.',timer:2100,why:'The spice rub forms a crust that carries sumac\'s tartness directly on the skin. The acid in sumac also slightly tenderises the surface proteins. Roasting at 200°C gets the skin crisp before the inside overcooks.'},
    {id:'s2',title:'Caramelise the onions with sumac',content:'While the chicken roasts, cook onions in remaining olive oil over medium-low heat for 30–35 minutes until deep golden and jammy. Add the remaining sumac, stir through. The onions should be sweet, sour, and slightly sticky.',timer:1800,why:'Slow-caramelised onions lose their harsh bite and develop sweetness through Maillard and caramelisation reactions. The sumac added at the end retains its bright tartness — adding it too early dulls it and loses the acid contrast.'},
    {id:'s3',title:'Build on the bread',content:'Lay flatbreads on a baking tray. Spread the sumac onions generously over them. Place the roasted chicken pieces on top. Drizzle with the roasting pan juices.',timer:null,why:'The bread is not a side — it is structural. The onion-soaked, juice-drenched bread underneath the chicken is the best part of musakhan. It is meant to go soft and flavour-saturated, not stay crisp.'},
    {id:'s4',title:'Final oven blast and finish',content:'Put the assembled dish back in the oven at 200°C for 8–10 minutes until the edges of the bread crisp and the chicken skin re-crisps. Scatter toasted pine nuts and serve immediately.',timer:480,why:'The second oven blast revives the chicken skin that softened on top of the moist onions. Pine nuts add texture contrast — toast them until golden-brown, not pale, or they taste of nothing.'},

  tags:['chicken','levantine','palestinian','slow'],

    {id:'i5',name:'Ground cinnamon',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i6',name:'Ground cumin',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Chilli flakes',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Salt',amount:1,unit:'tsp',scales:'fixed'},

  steps:[
    {id:'s1',title:'Mix thoroughly with cold hands',content:'Combine mince, grated onion (squeeze out some juice first), parsley, and all spices. Mix aggressively with cold hands for 3–4 minutes until the mixture becomes slightly sticky and uniform.',timer:null,why:'The extended mixing develops the myosin proteins in the meat, which act like glue. This is what lets kafta hold its shape on a skewer over fire without falling apart. Under-mixed kafta crumbles. Cold hands prevent the fat from melting and going greasy.'},
    {id:'s2',title:'Rest in the fridge',content:'Cover and refrigerate at least 30 minutes, up to overnight.',timer:1800,why:'Resting allows the salt to draw moisture from the onion into the meat, which then reabsorbs. The mixture firms up and the spices bloom into the fat. Kafta cooked straight after mixing is softer and harder to skewer.'},
    {id:'s3',title:'Shape onto skewers',content:'Wet your hands. Take a handful of the mix (about 80–90g) and press firmly around a flat metal skewer, forming a flat sausage shape about 15cm long. Squeeze hard at the ends to seal.',timer:null,why:'Flat skewers grip the meat — round skewers spin and the kafta can rotate off. Wetting hands prevents sticking. The hard squeeze at the ends is critical: that\'s the join that breaks first over heat.'},
    {id:'s4',title:'Grill hard and fast',content:'Grill over the highest heat possible — charcoal is traditional and makes a genuine difference. 3–4 minutes per side. You want char marks and juicy interior. Do not overcook lamb kafta.',timer:240,why:'Lamb fat renders fast and then burns. The window between perfectly charred and dried-out is narrow — under 8 minutes total at high heat. Low heat slowly grey-stews the outside instead of charring it.'},
    {id:'s5',title:'Serve in flatbread with sumac onions',content:'Slide the kafta off the skewer into a warm pitta. Add thinly sliced raw onion tossed with sumac and a squeeze of lemon. Serve immediately.',timer:null,why:null},
  ],

},
{
  id:'hummus',
  title:'Hummus from Scratch',
  tagline:'Palestinian hummus — dried chickpeas only',
  category:'levantine',
  time:720,
  difficulty:'easy',
  baseServings:6,
  inspiration:'Reem Kassis / The Palestinian Table',
  sourceUrl:'https://www.youtube.com/@reemkassis',
  heroEmoji:'🫘',
  heroColor:'#C4A04A',
  heroImg:'https://images.unsplash.com/photo-1577805947697-89e18249d767?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Dried chickpeas',amount:250,unit:'g',scales:'linear',notes:'Tinned chickpeas make edible hummus. They do not make good hummus.'},
    {id:'i2',name:'Good tahini (Palestinian or Lebanese)',amount:120,unit:'ml',scales:'linear',notes:'Brand matters enormously. Bitter or thin tahini ruins hummus. Taste it raw first — it should be nutty, not bitter.'},
    {id:'i3',name:'Lemon juice, freshly squeezed',amount:60,unit:'ml',scales:'linear'},
    {id:'i4',name:'Garlic cloves',amount:2,unit:'',scales:'fixed'},
    {id:'i5',name:'Ice-cold water',amount:60,unit:'ml',scales:'custom'},
    {id:'i6',name:'Bicarbonate of soda',amount:0.5,unit:'tsp',scales:'fixed',notes:'Added to the cooking water — it softens the chickpea skins and lets them blend ultra-smooth'},
    {id:'i7',name:'Salt',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Extra virgin olive oil, to serve',amount:2,unit:'tbsp',scales:'fixed'},
    {id:'i9',name:'Paprika and whole chickpeas, to garnish',amount:1,unit:'pinch',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Soak overnight',content:'Cover dried chickpeas with cold water — at least 3× their volume. Soak 12 hours minimum, 24 is better. They will roughly double in size.',timer:null,why:'Soaking rehydrates the chickpeas so they cook evenly. Unsoaked chickpeas have a hard, grainy centre even after long cooking. The soak water goes slightly acidic and breaks down oligosaccharides that cause gas — discard it.'},
    {id:'s2',title:'Cook very soft with bicarbonate',content:'Drain and rinse. Cover with fresh cold water, add bicarbonate of soda. Bring to boil, skim foam. Simmer 1.5–2 hours until completely, utterly soft — they should crush between two fingers with almost no pressure.',timer:5400,why:'Bicarbonate of soda raises the pH of the cooking water. In alkaline conditions, pectin in the chickpea cell walls breaks down faster, resulting in a softer, creamier texture. Under-cooked chickpeas give you grainy hummus no matter how long you blend.'},
    {id:'s3',title:'Blend tahini and lemon first',content:'In a food processor, blend tahini, lemon juice, and garlic for 1 minute until completely smooth and light-coloured. The mixture will seize and go thick — this is correct.',timer:60,why:'Blending tahini before adding chickpeas creates a stable emulsion base. The lemon acid causes the tahini proteins to reorganise into a smoother, fluffier texture. Adding chickpeas to unblended tahini gives a coarser result.'},
    {id:'s4',title:'Add chickpeas and blend until completely smooth',content:'Drain chickpeas but save the cooking water. Add hot chickpeas to the tahini mixture. Blend 4–5 minutes straight. Add ice-cold water gradually to achieve a silky, dropping consistency. Season with salt.',timer:300,why:'Hot chickpeas blend smoother than cold ones — temperature helps break down the starch. The ice-cold water creates a thermal contrast that makes the emulsion fluffier (the same principle as cold butter in mantecatura). Blending 4–5 minutes isn\'t optional — 1–2 minutes produces gritty hummus.'},
    {id:'s5',title:'Rest and serve warm',content:'Let the hummus rest 30 minutes before serving — flavours integrate. To serve, spread in a shallow bowl making a well in the centre, fill with olive oil, scatter chickpeas, sprinkle paprika.',timer:1800,why:'Freshly blended hummus tastes flat and slightly metallic. The rest allows the lemon, garlic, and tahini flavours to fully integrate. Hummus is at its best at room temperature or slightly warm — cold hummus is firm and mutes the flavour.'},
  ],
  tags:['levantine','palestinian','vegetarian','vegan'],
},
{

  steps:[
    {id:'s1',title:'Fry the bread until shatteringly crisp',content:'Tear pitta into rough pieces. Shallow-fry in olive oil over medium-high heat until deep golden and rigid. Drain on paper. Season with salt immediately.',timer:null,why:'The fried bread needs to stay crunchy even after dressing — this only works with stale pitta fried in enough oil at high enough heat. Baked croutons go soft faster. Season while hot because salt sticks to hot, oily surfaces.'},
    {id:'s2',title:'Make the sumac dressing',content:'Whisk together lemon juice, olive oil, sumac, pomegranate molasses if using, and salt. Taste: it should be assertively sour and salty.',timer:null,why:'Sumac is water and fat-soluble — whisking it into both lemon juice and oil distributes it through the whole dressing. Fattoush dressing is intentionally sharp: it needs to cut through the oil-soaked bread.'},
    {id:'s3',title:'Toss and serve immediately',content:'Combine all vegetables and herbs in a large bowl. Add the fried bread. Pour over the dressing and toss. Serve within 5 minutes — the bread should still have some crunch.',timer:null,why:'Fattoush is a race against the bread going soft. The acid in the dressing starts breaking down the crisp surfaces the moment it touches them. Dress and serve; do not let it sit.'},

  steps:[
    {id:'s1',title:'Char the pineapple',content:'Slice pineapple into rings or planks. Cook in a dry pan over high heat, no oil, 2–3 minutes per side until charred and caramelised. Cool slightly, dice into small cubes.',timer:180,why:'Dry heat caramelises the pineapple\'s natural sugars (55g per 100ml in ripe pineapple) through direct Maillard reaction on the surface. The char adds slight bitterness that balances the sweetness. Oil would steam it instead of charring.'},
    {id:'s2',title:'Make the pineapple salsa',content:'Combine charred pineapple, red onion, jalapeño, coriander, and the juice of 1 lime. Season. Taste — it should be sweet, sour, and have some heat.',timer:null,why:null},
    {id:'s3',title:'Make chipotle crema',content:'Mix soured cream with chipotle in adobo, juice of half a lime, and a pinch of salt. Start with 1 tsp chipotle and add more to your heat preference.',timer:null,why:'Chipotle in adobo is smoked jalapeño in a vinegary tomato sauce. The smokiness is the point — it bridges the char on the pineapple and the spice on the prawns. Making it ahead lets the flavours integrate.'},
    {id:'s4',title:'Season and cook the prawns fast',content:'Toss prawns in ancho chilli, paprika, cumin, garlic powder, salt, and olive oil. Cook in a screaming hot pan or griddle — 90 seconds maximum per side. They\'re done when they turn pink and curl into a C shape.',timer:90,why:'Prawns overcook almost instantly. The window between translucent (raw) and a C shape (perfect) and an O shape (overcooked rubber) is about 30 seconds. The pan needs to be scorching — a warm pan steams prawns grey instead of searing them.'},
    {id:'s5',title:'Char the tortillas and build',content:'Char tortillas directly on a gas flame or dry hot pan, 20–30 seconds per side. Build: chipotle crema, 3–4 prawns, pineapple salsa, squeeze of lime.',timer:null,why:'Cold tortillas crack. Charring adds flavour from the corn and makes them pliable. Build in this order so the crema acts as a moisture barrier between the warm tortilla and the juicy salsa.'},

{
  id:'sourdough-maintenance',
  title:'Sourdough Starter — Maintenance Guide',
  tagline:'Keep your starter alive and ready to bake',
  category:'bread',
  time:15,
  difficulty:'easy',
  baseServings:1,
  inspiration:'Chad Robertson / Tartine Bakery',
  sourceUrl:'https://www.youtube.com/@TartineBread',
  heroEmoji:'🍞',
  heroColor:'#8B6914',
  heroImg:'https://images.unsplash.com/photo-1585478259715-1c195ae2b568?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Existing starter',amount:50,unit:'g',scales:'fixed',notes:'The "seed" — this is what you keep from each feeding'},
    {id:'i2',name:'Strong white flour (or 50/50 white/wholemeal)',amount:50,unit:'g',scales:'fixed',notes:'Wholemeal contains more wild yeast and bacteria — feeds the culture better than white alone'},
    {id:'i3',name:'Water (room temperature, unchlorinated)',amount:50,unit:'g',scales:'fixed',notes:'Tap water is fine if left out 30 minutes for chlorine to off-gas. Chlorine kills the bacteria you are trying to feed.'},
  ],
  steps:[
    {id:'s1',title:'What a healthy starter looks like',content:'A healthy starter at peak activity is bubbly throughout — not just on top — and has roughly doubled in volume. It smells pleasantly sour and slightly yeasty, like yoghurt or beer. It should pass the float test: drop a small piece in water — it floats if full of gas. A healthy starter that has been refrigerated looks flat, smells more sharply acidic, and may have a grey liquid on top (hooch — just stir it in or pour it off, it\'s harmless alcohol).',timer:null,why:'The bubbles are CO2 produced by wild yeast fermenting the flour. Peak activity (maximum bubble volume) is the window when your starter has the most leavening power — this is when to use it for baking. Hooch is ethanol produced when yeast runs out of food — it means the starter is hungry but not dead.'},
    {id:'s2',title:'Regular feeding (counter / daily baking)',content:'Discard all but 50g of your starter. Add 50g flour and 50g room-temperature water (1:1:1 ratio by weight). Stir vigorously — you want to incorporate air. Leave covered at room temperature. It will peak in 4–8 hours depending on temperature.',timer:null,why:'Discarding is not waste — it keeps the starter manageable in size and prevents acid build-up that would eventually suppress the yeast. The 1:1:1 ratio gives the culture enough food without overfeeding it, which dilutes the yeast population. Vigorous stirring oxygenates the culture, which yeast prefers in early fermentation.'},
    {id:'s3',title:'Refrigerator maintenance (baking weekly)',content:'After feeding, let it sit at room temperature 2–4 hours until bubbly, then put it in the fridge. Feed once a week. To use from cold: take it out the night before, feed it, leave at room temperature overnight, use at peak the next morning.',timer:null,why:'Cold (4°C) dramatically slows fermentation — the culture stays dormant but alive. Weekly feeding is enough to keep the yeast population healthy. Taking it out 12 hours before baking gives it time to warm up and go through a full rise cycle so it has maximum strength when it goes into your dough.'},
    {id:'s4',title:'Reviving a neglected starter',content:'If it has been in the fridge for months: pour off the hooch and any discoloured liquid. It may smell very sharp or like acetone. Feed daily for 3–5 days at room temperature, discarding before each feed, until it doubles consistently within 6–8 hours.',timer:null,why:'Long neglect allows acetic acid bacteria to dominate over yeast (bacteria tolerate acidity better than yeast). Repeated feedings restore the balance by introducing fresh food and removing accumulated acid. Doubling consistently within 6–8 hours is the signal that the yeast population is strong enough for baking.'},
    {id:'s5',title:'Signs something is wrong',content:'Mould is the only true emergency — pink, orange, or fuzzy growth means discard the whole thing and start fresh. Black streaks or liquid are usually just over-fermentation. A consistently flat, non-rising starter after 5 days of daily feeding in a warm kitchen likely means the flour or water is inhibiting microbial activity — try bottled water and wholemeal flour.',timer:null,why:'Mould is a contaminant from the air and wins when acidity drops too low to protect the culture. Once mould is visible on the surface, it has almost certainly penetrated deeper — stirring it away does not fix it. Every other problem short of mould is recoverable with patience and consistent feeding.'},
  ],
  tags:['bread','technique','fermentation'],
},
{
  id:'sourdough-loaf',
  title:'Sourdough Country Loaf',
  tagline:'Open crumb, blistered crust — 24-hour process',
  category:'bread',
  time:1440,
  difficulty:'hard',
  baseServings:8,
  inspiration:'Chad Robertson / Tartine Bakery',
  sourceUrl:'https://www.youtube.com/@TartineBread',
  heroEmoji:'🍞',
  heroColor:'#6B4A14',
  heroImg:'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Bread flour (strong white)',amount:450,unit:'g',scales:'linear'},
    {id:'i2',name:'Wholemeal or spelt flour',amount:50,unit:'g',scales:'linear',notes:'10% wholemeal adds flavour and enzymes — more than this starts making the crumb dense'},
    {id:'i3',name:'Water (warm, 30°C)',amount:375,unit:'g',scales:'custom',notes:'This is 75% hydration — high but manageable for an open crumb. Drop to 70% (350g) for your first loaf.'},
    {id:'i4',name:'Active sourdough starter (at peak)',amount:100,unit:'g',scales:'fixed',notes:'Must be at peak — bubbly, doubled, passes the float test. Cold starter = no rise.'},
    {id:'i5',name:'Fine sea salt',amount:10,unit:'g',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Autolyse',content:'Mix flours and 350g of the water (hold back 25g). Stir until no dry flour remains — no kneading yet. Cover and rest 30–60 minutes.',timer:1800,why:'Autolyse lets the flour fully hydrate before adding starter and salt. During this rest, enzymes begin breaking down proteins and the gluten network starts forming on its own. Dough after autolyse is smoother and more extensible and develops better structure with less kneading.'},
    {id:'s2',title:'Add starter and salt',content:'Add starter to the dough. Dissolve salt in the reserved 25g water, add that too. Squeeze the dough through your fingers until fully incorporated — it will feel slimy then come back together.',timer:null,why:'Salt is added after starter because salt inhibits yeast. Adding them separately prevents the salt from directly contacting the starter culture. The squeeze method distributes the starter throughout without deflating the gluten structure built during autolyse.'},
    {id:'s3',title:'Bulk fermentation with stretch and folds',content:'Leave covered at room temperature (24–26°C ideal) for 4–5 hours total. In the first 2 hours: every 30 minutes, perform a set of stretch-and-folds (pull one side up and fold over, rotate 90°, repeat 4 times). That\'s 4 sets of folds. After that, leave undisturbed.',timer:14400,why:'Bulk fermentation is where most flavour development and structure building happens. Stretch-and-folds replace kneading — they align the gluten network without degassing it. The dough is ready when it has grown 50–75% in volume, feels airy and jiggly, and you can see bubbles on the sides of the container.'},
    {id:'s4',title:'Shape and cold proof',content:'Gently turn dough onto an unfloured surface. Pre-shape into a rough ball, rest 20 minutes. Final shape: fold the edges in toward the centre, flip over, drag toward you on the unfloured surface to build tension. Place seam-side up in a floured banneton or bowl lined with a floured cloth. Refrigerate 10–16 hours (overnight).',timer:600,why:'Cold proofing slows fermentation and develops more complex acid flavour. It also firms up the dough so it holds its shape when scored and going into a hot oven. The tension built during shaping is what allows the loaf to spring dramatically in the oven — insufficient tension and it spreads flat.'},
    {id:'s5',title:'Bake in a covered pot at maximum heat',content:'Preheat oven to 250°C (as hot as it goes) with a Dutch oven inside for 1 hour. Score the cold loaf with a sharp razor or lame. Put it straight from the fridge into the scorching Dutch oven. Cover and bake 20 minutes. Remove lid, bake 20–25 more minutes until deep mahogany.',timer:2400,why:'The covered Dutch oven traps steam released by the cold dough in the first 20 minutes. This steam keeps the crust supple enough to expand fully (oven spring). At 20 minutes, the crust has set — removing the lid now allows the Maillard reaction on the crust surface and the deep caramelisation that makes sourdough crust flavour. Internal temperature should hit 96°C. Rest 1 hour before cutting — the crumb continues cooking via carry-over heat.'},
  ],
  tags:['bread','sourdough','technique','advanced'],
},
{
  id:'risotto',
  title:'Mushroom Risotto',
  tagline:'The slow stir pays off',
  category:'vegetarian',
  time:40,
  difficulty:'medium',
  baseServings:2,
  inspiration:'Marcella Hazan',
  sourceUrl:'https://www.youtube.com/@MarcellaCooking',
  heroEmoji:'🍚',
  heroColor:'#8B7355',
  heroImg:'https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Arborio rice',amount:160,unit:'g',scales:'linear'},
    {id:'i2',name:'Mixed mushrooms, sliced',amount:300,unit:'g',scales:'linear'},
    {id:'i3',name:'Dry white wine',amount:100,unit:'ml',scales:'linear'},
    {id:'i4',name:'Vegetable stock, hot',amount:800,unit:'ml',scales:'custom',notes:'Add up to 200ml more if needed — exact amount varies with heat'},
    {id:'i5',name:'Shallots, finely diced',amount:2,unit:'',scales:'linear'},
    {id:'i6',name:'Garlic cloves',amount:2,unit:'',scales:'fixed'},
    {id:'i7',name:'Parmesan, grated',amount:60,unit:'g',scales:'linear'},
    {id:'i8',name:'Unsalted butter, cold',amount:40,unit:'g',scales:'linear'},
    {id:'i9',name:'Olive oil',amount:2,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Sauté mushrooms separately',content:'Sauté mushrooms in oil over high heat until golden — 5 minutes without stirring. Season. Set aside. Do this in the same pan you\'ll use for the risotto.',timer:300,why:'Mushrooms release water when heated. Crowding or stirring keeps them wet and they steam instead of browning. High heat and patience gives you golden, meaty mushrooms — not grey rubber.'},
    {id:'s2',title:'Soften shallots in butter',content:'Reduce heat. Add butter, soften shallots and garlic 3–4 minutes until translucent. They should not colour.',timer:240,why:'Shallots cook faster than onions and have a milder, sweeter flavour for risotto. Translucent, not browned — browning adds bitterness that fights the delicate mushroom and wine notes.'},
    {id:'s3',title:'Toast the rice',content:'Add rice, stir to coat in fat. Toast 2 minutes until the edges turn translucent. Then add wine — it will sizzle aggressively.',timer:120,why:'Toasting the rice seals the exterior of each grain in fat, slowing starch release. This is what creates the slow, controlled creaminess of proper risotto. Skip this and you get gluey porridge.'},
    {id:'s4',title:'Add stock gradually',content:'Add hot stock one ladleful at a time, stirring frequently. Add the next ladle when the pan looks almost dry. Keep heat at a steady medium — active simmer, not a boil.',timer:null,why:'Gradual addition forces each grain to absorb liquid slowly, releasing surface starch incrementally. That starch is the "cream" of risotto — there is no cream in the recipe. Hot stock maintains temperature; cold stock stalls cooking.'},
    {id:'s5',title:'Mantecatura — the final butter',content:'When rice is al dente (it should have a firm but not chalky centre — taste it), remove from heat. Add cold butter in pieces and stir vigorously for 1 minute. Add mushrooms back in.',timer:null,why:'Mantecatura means "creaming". Cold butter emulsifies into the hot starch, creating a glossy, rich finish. Hot butter separates. Off heat prevents further starch release, which would make it gluey.'},
  ],
  tags:['vegetarian','rice','italian','dinner-party'],
},

  steps:[
    {id:'s1',title:'Make the chipotle crema',content:'Mix crema or soured cream with minced chipotle. Squeeze in half a lime. Taste — it should be smoky, creamy, with a gentle heat.',timer:null,why:'Making the sauce first lets the flavours meld while you cook the fish. Chipotle needs a few minutes to bloom in the cream.'},
    {id:'s2',title:'Make batter and prep cabbage',content:'Whisk flour with cold beer and a pinch of salt until just combined — lumps are fine. Toss cabbage with juice of half a lime and salt.',timer:null,why:'Cold beer creates carbonation that makes the batter light. Overmixing develops gluten and makes it tough. The cabbage acid-wilts slightly while you cook — intentional texture shift.'},
    {id:'s3',title:'Fry the fish',content:'Heat oil to 180°C in a deep pan. Cut fish into strips, dip in batter, lower gently into oil. Cook 3–4 minutes until deep golden. Drain on paper.',timer:180,why:'180°C is the sweet spot — lower and the batter absorbs oil and goes greasy; higher and it browns before the fish cooks through. Use a thermometer. Sound also tells you: a steady active sizzle means correct temperature.'},
    {id:'s4',title:'Warm tortillas and assemble',content:'Char tortillas directly on a gas flame or dry pan — 30 seconds per side. Stack fish, cabbage, crema, coriander, squeeze lime over the top.',timer:null,why:'Cold, raw tortillas taste of nothing and tear. Charring activates the corn flavour and makes them pliable enough to fold without cracking.'},
  ],
  tags:['fish','mexican','quick','weeknight'],
},

  ingredients:[

  steps:[
    {id:'s1',title:'Fry the paste',content:'Heat oil in a wok over high heat. Add curry paste and stir fry 2 minutes until fragrant and separated — it will spit.',timer:120,why:'Frying the paste in oil cooks out the raw galangal and lemongrass notes and develops a caramelised base flavour. Adding it directly to liquid makes a flat, raw-tasting curry.'},
    {id:'s2',title:'Add coconut cream first',content:'Add just the thick cream from the top of the can (don\'t shake it). Stir with the paste 2–3 minutes until the oil separates — "cracking" the coconut.',timer:180,why:'"Cracking" means the coconut cream\'s emulsion breaks and the fat separates. This fat then carries the fat-soluble flavour compounds from the paste throughout the dish. You\'ll see the oil visibly pool — this is correct.'},
    {id:'s3',title:'Cook the chicken',content:'Add chicken, stir to coat in the paste-cream. Cook 3–4 minutes until sealed.',timer:240,why:null},
    {id:'s4',title:'Add remaining coconut milk and simmer',content:'Pour in the rest of the coconut milk and the thin liquid from the can. Add kaffir lime leaves, fish sauce, sugar, vegetables. Simmer 12 minutes.',timer:720,why:'The balance of fish sauce (salt + umami), sugar (sweetness), and lime leaf (citrus-floral) is the holy trinity of Thai cooking. Taste and adjust — the exact amounts depend on your brand of paste and fish sauce.'},
    {id:'s5',title:'Finish with basil',content:'Remove from heat. Stir in Thai basil leaves — they\'ll wilt from the residual heat. Serve with jasmine rice.',timer:null,why:'Thai basil loses its anise-clove aroma with prolonged heat. Adding off heat preserves the volatile compounds. Italian basil is a poor substitute — different flavour profile entirely.'},

{

  ingredients:[
    {id:'i1',name:'Yellow onions, thinly sliced',amount:1.5,unit:'kg',scales:'linear',notes:'They cook down to a quarter of their volume — this amount is correct'},

    {id:'i4',name:'Dry white wine or vermouth',amount:150,unit:'ml',scales:'linear'},
    {id:'i5',name:'Good beef stock',amount:1.2,unit:'L',scales:'linear'},
    {id:'i6',name:'Gruyère, grated',amount:200,unit:'g',scales:'linear'},

    {id:'i8',name:'Fresh thyme',amount:4,unit:'sprigs',scales:'fixed'},
    {id:'i9',name:'Bay leaves',amount:2,unit:'',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Caramelise — the long game',content:'Melt butter and oil in a heavy pot over medium-low heat. Add all the onions and salt lightly. Cook 60–75 minutes, stirring every 5–10 minutes, until deep amber-brown. If they stick, add a splash of water.',timer:3600,why:'True caramelisation requires the Maillard reaction and sugar caramelisation, which only happen when the water has fully evaporated from the onions and the temperature rises above 120°C. This takes a real 60 minutes on low heat — 20-minute versions are cheating and taste like it.'},
    {id:'s2',title:'Deglaze and build the soup',content:'Add wine, scraping the bottom. Cook until evaporated. Add stock, thyme, bay leaves. Bring to a simmer, cook 30 minutes.',timer:1800,why:'Deglazing with wine recovers the fond (caramelised sugars stuck to the pot) — that\'s where half the flavour is. The subsequent simmer melds the stock with the onion base.'},
    {id:'s3',title:'Toast the bread',content:'Toast sourdough slices until very firm — they need to stay rigid under the cheese and soup. Rub with a cut garlic clove while hot.',timer:null,why:'Soft bread sinks and disintegrates into the soup. Toast until dry and hard so it floats on top and stays there. The garlic rubbing penetrates the surface of hot bread in a way it never would on cold bread.'},

{

  steps:[
    {id:'s1',title:'Soak noodles, mix sauce',content:'Soak noodles in cold water 20 minutes until pliable but not cooked. Mix tamarind, fish sauce, sugar — taste it. Should be sour, salty, subtly sweet in that order.',timer:1200,why:'Cold soak (not boiling) means the noodles still have structural integrity when they hit the wok. Boiled noodles finish as mush. The sauce ratio defines pad Thai — get it right off the heat where you can taste clearly.'},
    {id:'s2',title:'High heat wok',content:'Wok on the highest flame you have for 3 minutes. Add oil — it should smoke immediately. This is the right temperature.',timer:180,why:'Wok hei — the smoky breath of the wok — only happens above 200°C on a dry wok. Restaurant woks run on industrial flames; home woks need maximum time to accumulate heat. A warm wok makes pad Thai soggy and grey.'},
    {id:'s3',title:'Protein, then egg',content:'Add protein to the wok edge, cook 2 minutes. Push to the side. Crack eggs into the hot centre, scramble until almost set, then push to the side with the protein.',timer:120,why:'Cooking protein and egg separately in zones keeps both from overcooking while you deal with the noodles. Mixed too early and you end up with one overcooked, broken mess.'},
    {id:'s4',title:'Noodles and sauce',content:'Add drained noodles, pour sauce over. Toss everything together using tongs. Cook 2 minutes — the sauce should evaporate and caramelise into the noodles.',timer:120,why:'Two minutes of high-heat contact lets the tamarind-sugar mixture caramelise onto the noodles. This creates the characteristic stickiness and complex flavour. Remove from heat the moment it looks slightly dry — residual heat finishes it.'},
    {id:'s5',title:'Serve immediately',content:'Top with bean sprouts, spring onions, peanuts. Serve with lime wedge, extra fish sauce, sugar, and chilli flakes on the side for adjusting.',timer:null,why:'Pad Thai cools fast and goes sticky cold. Serve immediately. The condiment table is traditional — every diner adjusts their own bowl.'},

{
  id:'braised-short-ribs',
  title:'Red Wine Braised Short Ribs',

  ingredients:[
    {id:'i1',name:'Beef short ribs, bone-in',amount:1.2,unit:'kg',scales:'linear'},

    {id:'i9',name:'Fresh rosemary and thyme',amount:4,unit:'sprigs each',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Preheat and season',content:'Preheat oven to 160°C. Season ribs aggressively — they need more salt than you think. Let them sit 10 minutes.',timer:600,why:'Short ribs are thick cuts with a lot of collagen and fat. Heavy seasoning on the outside is needed because the interior is self-seasoning via osmosis only in the hours of braising.'},
    {id:'s2',title:'Sear every side',content:'In a heavy oven-safe pan, sear ribs on all sides — including the ends — in batches, until very dark brown. Do not rush this.',timer:null,why:'Every surface that doesn\'t get browned is flavour left behind. Short ribs have six faces — sear all of them. The exterior Maillard compounds end up in the braising liquid and define the sauce.'},
    {id:'s3',title:'Build aromatics, reduce wine',content:'Remove ribs, soften vegetables in the same pan. Add tomato paste, cook 2 minutes. Add wine and reduce by half — 8–10 minutes.',timer:480,why:'Reducing wine removes harsh alcohol notes and concentrates the flavour. Full bottle of wine added direct gives you a boozy, raw-wine sauce. Reduced wine gives depth without the sharpness.'},
    {id:'s4',title:'Braise 3 hours',content:'Return ribs, add stock until liquid comes halfway up the ribs. Add herbs. Cover tightly and braise in oven at 160°C for 3 hours.',timer:10800,why:'160°C oven heat is even on all sides, unlike stovetop braising which hot-spots at the bottom. Three hours converts the collagen in short rib connective tissue to gelatin — that\'s what makes the meat fall apart and the sauce sticky.'},
    {id:'s5',title:'Rest and reduce sauce',content:'Remove ribs, rest 15 minutes. Strain the braising liquid, skim fat, reduce in a pan over high heat to a glossy sauce.',timer:900,why:'Straining removes the now-exhausted vegetables. Skimming removes fat that would make the sauce greasy. Reducing concentrates into a glaze — pour it over the ribs and it should coat a spoon.'},

  steps:[
    {id:'s1',title:'Soft-boil the eggs',content:'Bring water to a rolling boil. Lower eggs in gently. Cook exactly 6.5 minutes. Transfer immediately to iced water for 5 minutes. Peel carefully.',timer:390,why:'6.5 minutes gives a fully set white with a just-jammy yolk — the ramen standard. Below 6 minutes is too runny, above 7 is too hard. The ice bath stops residual cooking immediately.'},
    {id:'s2',title:'Make the tare',content:'Mix soy sauce and mirin in a small pan. Bring to a simmer 2 minutes to cook off the alcohol. This is your seasoning base.',timer:120,why:'Tare is ramen\'s seasoning concentrate. Making it separately means you can adjust the saltiness of each bowl individually by adding more or less — rather than trying to season 800ml of stock accurately.'},
    {id:'s3',title:'Heat the broth',content:'Heat stock to a rolling boil. Add sesame oil. Taste — it should be rich but slightly under-seasoned (the tare finishes it).',timer:null,why:'The stock provides body; the tare provides the seasoning signature. Separating them is the Japanese technique that makes ramen adjustable. Pre-seasoning the stock makes every bowl identical — not necessarily wrong, but less flexible.'},
    {id:'s4',title:'Cook noodles separately',content:'Cook noodles in a separate pan of unsalted water — not in the broth. Fresh: 1–2 minutes. Dried: follow package. Drain and rinse briefly.',timer:90,why:'Ramen noodles cook in unsalted water because the broth does all the seasoning. Cooking them in the broth clouds it and makes the bowl starchy. Rinsing removes excess surface starch.'},
    {id:'s5',title:'Assemble properly',content:'Tare in the bowl first. Noodles. Hot broth ladled over. Then toppings in distinct sections: halved egg, pork, nori, spring onion, bamboo. Each topping should be visually distinct.',timer:null,why:'Adding tare first ensures it distributes through the broth as it\'s poured. Keeping toppings visually separate isn\'t just aesthetic — it lets you eat each element alone or in combination at your own pace.'},

  steps:[

    {id:'s4',title:'Wrap in pastry',content:'Preheat oven to 220°C. Unwrap, roll in pastry, seal edges with egg wash. Brush all over with egg yolk. Score lightly. Chill 10 minutes.',timer:600,why:'A second chill after pastry wrapping helps the pastry hold its shape and means the butter in the pastry is cold when it hits the oven — cold butter = steam = flaky layers.'},

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function scaleAmount(ing, factor){
  if(ing.scales==='fixed') return ing.amount;
  if(ing.scales==='custom'){
    // rice-to-water: softer curve
    if(ing.name.toLowerCase().includes('stock')||ing.name.toLowerCase().includes('water')){
      return +(ing.amount * Math.pow(factor,0.85)).toFixed(1);
    }
  }
  return +(ing.amount * factor).toFixed(1);
}
function formatAmount(n){
  if(n===Math.floor(n)) return String(n);
  if(Math.abs(n-Math.round(n*2)/2)<0.01) return n%1===0?String(n):(Math.floor(n)+' ½');
  return n.toFixed(1).replace(/\.0$/,'');
}
function fmtTime(mins){
  if(mins<60) return `${mins}m`;
  const h=Math.floor(mins/60),m=mins%60;
  return m===0?`${h}h`:`${h}h ${m}m`;
}
function highlightText(text,query){
  if(!query) return text;
  const escaped=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${escaped})`,'gi'),'<mark>$1</mark>');
}
function consolidateIngredients(meals){
  // meals: [{recipe, servings, leftovers}]
  const map={};
  for(const {recipe,servings,leftoversKey}of meals){
    const opt=LEFTOVER_OPTIONS.find(o=>o.id===leftoversKey)||LEFTOVER_OPTIONS[0];
    let total;
    if(opt.multiplier) total=opt.multiplier*recipe.baseServings;
    else total=servings+(opt.extra||0);
    const factor=total/recipe.baseServings;
    for(const ing of recipe.ingredients){
      const amt=scaleAmount(ing,factor);
      const key=`${ing.name.toLowerCase()}__${ing.unit||''}`;
      if(map[key]){
        map[key].amount+=amt;
        map[key].recipes.push(recipe.title);
      } else {
        map[key]={name:ing.name,amount:amt,unit:ing.unit||'',recipes:[recipe.title]};
      }
    }
  }
  return Object.values(map).sort((a,b)=>a.name.localeCompare(b.name));
}

// ─── TIMER HOOK ───────────────────────────────────────────────────────────────
function useTimer(seconds){
  const[remaining,setRemaining]=useState(seconds);
  const[running,setRunning]=useState(false);
  const[done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running&&remaining>0){
      ref.current=setInterval(()=>setRemaining(r=>{
        if(r<=1){clearInterval(ref.current);setRunning(false);setDone(true);return 0;}
        return r-1;
      }),1000);
    }
    return()=>clearInterval(ref.current);
  },[running]);
  const toggle=()=>{if(!done)setRunning(r=>!r)};
  const reset=()=>{clearInterval(ref.current);setRemaining(seconds);setRunning(false);setDone(false)};
  const pct=1-(remaining/seconds);
  const m=Math.floor(remaining/60),s=remaining%60;
  const display=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return{remaining,running,done,toggle,reset,display,pct};
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function useStorage(key,init){
  const[val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}
    catch{return init;}
  });
  const set=useCallback(v=>{
    const next=typeof v==='function'?v(val):v;
    setVal(next);
    try{localStorage.setItem(key,JSON.stringify(next));}catch{}
  },[key,val]);
  return[val,set];
}

// ─── SUBSTITUTION API ─────────────────────────────────────────────────────────
async function fetchSubstitution(recipe,ingredient){
  const others=recipe.ingredients.filter(i=>i.id!==ingredient.id).map(i=>i.name).slice(0,12).join(', ');
  const prompt=`You are an experienced cook. Someone is making "${recipe.title}" (${recipe.tagline}) but is missing: ${ingredient.amount} ${ingredient.unit||''} ${ingredient.name}. Other ingredients they have: ${others}. Respond ONLY with valid JSON, no markdown, no fences:\n{"severity":"minor"|"moderate"|"critical","impact":"one honest sentence about effect","substitutions":[{"name":"substitute","amount":number,"unit":"g/ml/tbsp/etc","note":"brief reason"}],"canSkip":true|false,"skipNote":"what to do if skipping, or empty"}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  const text=data.content?.find(b=>b.type==='text')?.text||'{}';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}
