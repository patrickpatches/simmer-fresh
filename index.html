  ingredients:[
    {id:'i1',name:'Chicken thighs and drumsticks, bone-in',amount:1200,unit:'g',scales:'linear'},
    {id:'i2',name:'Buttermilk',amount:300,unit:'ml',scales:'linear',notes:'To make your own: 300ml full-fat milk + 1 tbsp white vinegar, sit 10 minutes'},
    {id:'i3',name:'Plain flour',amount:250,unit:'g',scales:'fixed'},
    {id:'i4',name:'Cornflour',amount:50,unit:'g',scales:'fixed'},
    {id:'i5',name:'Garlic powder',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i6',name:'Onion powder',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Smoked paprika',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Cayenne pepper (for batter)',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i9',name:'Salt',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i10',name:'Neutral oil, for frying',amount:1,unit:'L',scales:'fixed'},
    {id:'i11',name:'Cayenne pepper (for hot oil)',amount:3,unit:'tbsp',scales:'fixed',notes:'This is the heat. Start at 2 tbsp if you want medium, go 4 tbsp if you want genuine pain'},
    {id:'i12',name:'Brown sugar',amount:1,unit:'tbsp',scales:'fixed'},
    {id:'i13',name:'Garlic powder (for hot oil)',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i14',name:'White bread, thick-sliced',amount:8,unit:'slices',scales:'linear'},
    {id:'i15',name:'Pickles (dill)',amount:40,unit:'g',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Marinate in buttermilk',content:'Season chicken with 1 tsp salt. Submerge in buttermilk with 1 tsp cayenne and garlic powder. Marinate at least 2 hours — overnight is significantly better.',timer:null,why:'Buttermilk has lactic acid that tenderises the muscle fibres without breaking them down to mush — it\'s gentler than vinegar marinades. The calcium ions in buttermilk also activate enzymes in the chicken that further tenderise the meat. This is why Nashville hot chicken has unusually juicy interior despite aggressive frying.'},
    {id:'s2',title:'Set up the dredge',content:'Mix flour, cornflour, garlic powder, onion powder, smoked paprika, remaining cayenne, and remaining salt in a deep tray. Remove chicken from buttermilk (let excess drip off), press firmly into the flour mixture, coating every surface. Double dredge: dip back in buttermilk briefly, then back in flour. Rest on a wire rack 10 minutes.',timer:600,why:'Double dredging builds a thicker crust that creates more surface area for the chilli oil to soak into. Resting the coated chicken lets the flour hydrate from the buttermilk — this is what creates the craggy, shaggy crust rather than a smooth coating.'},
    {id:'s3',title:'Fry at 175°C',content:'Heat oil to 175°C in a deep pot. Fry in batches — never crowd — for 14–16 minutes until deep golden and the internal temperature hits 74°C. Drain on a wire rack, not paper towels.',timer:900,why:'175°C is the sweet spot: hot enough to drive off moisture quickly and set a crispy crust, cool enough to cook the bone-in pieces through before the exterior burns. A wire rack keeps the bottom crust crispy — paper towels trap steam and soften it.'},
    {id:'s4',title:'Make the hot oil',content:'Carefully ladle 4 tbsp of the hot frying oil into a heatproof bowl. Add cayenne, brown sugar, and garlic powder. Stir immediately — it will sizzle violently. The sugar blooms in the hot oil.',timer:null,why:'Using the frying oil carries the chicken flavour into the hot sauce. The sugar caramelises slightly on contact with hot oil, rounding the raw heat of the cayenne. Apply immediately while both the oil and chicken are hot so it penetrates the crust.'},
    {id:'s5',title:'Apply and serve',content:'Brush hot oil generously over each piece while still hot. Serve immediately on white bread with pickles on top — the bread soaks up the dripping spiced oil and is half the point.',timer:null,why:'The bread serves a real function: it catches the pooling chilli oil so you eat it. Nashville tradition is white bread specifically because it absorbs without competing. Pickles cut the fat and reset the palate between bites.'},
  ],
  tags:['american','chicken','fried','spicy','southern'],
},
{
  id:'salmon-teriyaki',
  title:'Salmon Teriyaki',
  tagline:'Lacquered, caramelised, properly made — not the bottled version',
  category:'fish',
  cuisine:'japanese',
  type:'seafood',
  time:25,
  difficulty:'easy',
  baseServings:2,
  inspiration:'Joshua Weissman',
  sourceUrl:'https://www.youtube.com/@JoshuaWeissman',
  heroEmoji:'🐟',
  heroColor:'#E07840',
  heroImg:'https://images.unsplash.com/photo-RZV1-tNbHy4?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Salmon fillets, skin-on',amount:400,unit:'g',scales:'linear'},
    {id:'i2',name:'Soy sauce',amount:60,unit:'ml',scales:'linear'},
    {id:'i3',name:'Mirin',amount:60,unit:'ml',scales:'linear',notes:'Real mirin — not mirin-style condiment which is mostly corn syrup. Find it at Japanese or Asian grocers'},
    {id:'i4',name:'Sake',amount:60,unit:'ml',scales:'linear',notes:'Cooking sake or dry sherry as a substitute'},
    {id:'i5',name:'Honey',amount:2,unit:'tsp',scales:'fixed',notes:'Omit for traditional teriyaki — the mirin provides sweetness. Add if you prefer a sweeter glaze'},
    {id:'i6',name:'Neutral oil',amount:1,unit:'tbsp',scales:'fixed'},
    {id:'i7',name:'Steamed short-grain rice',amount:300,unit:'g',scales:'linear'},
    {id:'i8',name:'Spring onions, thinly sliced',amount:2,unit:'',scales:'linear'},
    {id:'i9',name:'Sesame seeds, toasted',amount:1,unit:'tsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Make the teriyaki sauce',content:'Combine soy sauce, mirin, sake, and honey if using in a small saucepan. Bring to a simmer and reduce for 4–5 minutes until slightly thickened and glossy. It should coat a spoon but still be pourable.',timer:300,why:'Reducing concentrates the flavour and drives off the alcohol from the sake and mirin. The sugars from mirin caramelise as it reduces — this is what gives teriyaki its characteristic gloss and burnished sweetness. Bottled teriyaki skips this reduction and uses corn syrup instead.'},
    {id:'s2',title:'Score and dry the salmon',content:'Pat salmon fillets completely dry with paper towels. Score the skin diagonally every 2cm — cutting just through the skin, not into the flesh.',timer:null,why:'Dry surface = better browning. Water on the fish causes it to steam in the pan instead of sear. Scoring the skin prevents it from curling and buckling as it cooks — the connective tissue in skin contracts faster than the flesh, warping the fillet away from the pan.'},
    {id:'s3',title:'Sear skin-side down',content:'Heat oil in a non-stick or stainless pan over medium-high. Place salmon skin-side down. Press gently for the first 30 seconds to maintain contact. Cook 4–5 minutes undisturbed — the skin should be deeply golden and crispy. Flip and cook 1–2 minutes.',timer:300,why:'Starting skin-side down in a hot pan renders the fat from the skin and crisps it before it can steam. "Undisturbed" is key — moving the fish prevents the Maillard reaction from completing and tears the skin from the fillet.'},
    {id:'s4',title:'Glaze and serve',content:'With the fish off heat or on very low, spoon the teriyaki sauce over the salmon and let it caramelise for 30–45 seconds per side. It will bubble and thicken rapidly on the hot fish. Serve over rice, topped with spring onion and sesame seeds.',timer:45,why:'The glaze goes on last because the high sugar content burns quickly — it needs a hot but not ripping pan. The sauce caramelises into a lacquer on the surface of the fish rather than just sitting wet on top.'},
  ],
  tags:['japanese','seafood','quick','weeknight'],
},
{
  id:'lamb-rack-herb',
  title:'Herb-Crusted Rack of Lamb',
  tagline:'French bistro technique — pink, herb-green, rested properly',
  category:'lamb',
  cuisine:'french',
  type:'lamb',
  time:45,
  difficulty:'medium',
  baseServings:2,
  inspiration:'Joshua Weissman',
  sourceUrl:'https://www.youtube.com/@JoshuaWeissman',
  heroEmoji:'🍖',
  heroColor:'#8B4513',
  heroImg:'https://images.unsplash.com/photo-449qWYYxEdo?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Rack of lamb, frenched (8 bones)',amount:800,unit:'g',scales:'fixed',notes:'Ask your butcher to french the rack — it just means scraping the bones clean for presentation'},
    {id:'i2',name:'Dijon mustard',amount:2,unit:'tbsp',scales:'fixed'},
    {id:'i3',name:'Fresh rosemary, leaves only',amount:3,unit:'sprigs',scales:'fixed'},
    {id:'i4',name:'Fresh thyme, leaves only',amount:4,unit:'sprigs',scales:'fixed'},
    {id:'i5',name:'Flat-leaf parsley',amount:20,unit:'g',scales:'fixed'},
    {id:'i6',name:'Garlic cloves',amount:3,unit:'',scales:'fixed'},
    {id:'i7',name:'Panko breadcrumbs',amount:50,unit:'g',scales:'fixed'},
    {id:'i8',name:'Olive oil',amount:3,unit:'tbsp',scales:'fixed'},
    {id:'i9',name:'Salt',amount:1.5,unit:'tsp',scales:'fixed'},
    {id:'i10',name:'Black pepper, cracked',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i11',name:'Unsalted butter',amount:30,unit:'g',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Season and bring to room temperature',content:'Season the rack generously with salt and pepper on all sides — including the bones. Leave at room temperature for 30 minutes before cooking.',timer:1800,why:'Cold meat hitting a hot pan drops the pan temperature significantly, causing uneven cooking. Room temperature meat takes the sear more evenly. Seasoning well in advance lets the salt draw moisture out and back in — dry-brining effect that improves crust formation.'},
    {id:'s2',title:'Sear all surfaces',content:'Heat a heavy oven-safe pan over high heat. Add oil. Sear the rack fat-side down for 3–4 minutes until the fat cap renders and turns golden. Sear the meat side for 2 minutes. Sear the ends briefly. You want colour on every surface.',timer:360,why:'A proper sear develops the crust and builds the Maillard flavour compounds that the herb crust will complement. The fat cap needs the most time because you\'re rendering fat, not just browning protein.'},
    {id:'s3',title:'Make the herb crust',content:'While the rack sears, blend rosemary, thyme, parsley, garlic, breadcrumbs, and 2 tbsp olive oil until you have a coarse green paste. Season with salt.',timer:null,why:'Fresh herbs blended with oil coat the breadcrumbs in chlorophyll and volatile aromatics. The breadcrumbs give the crust structure and crunch — without them, the herbs slide off the mustard. Make it just before applying so the aromatics don\'t oxidise.'},
    {id:'s4',title:'Apply mustard and crust',content:'Remove pan from heat. Brush the meat side generously with Dijon. Press the herb breadcrumb mixture firmly onto the mustard — it should stick in an even layer. Drizzle remaining olive oil over the crust.',timer:null,why:'Mustard acts as the adhesive — its emulsifying properties grip both the lamb fat and the breadcrumbs. It also adds heat and acid that complement the richness of lamb. Press firmly so the crust compacts and won\'t fall off when sliced.'},
    {id:'s5',title:'Roast to medium-rare',content:'Roast at 220°C for 12–15 minutes until internal temperature reads 57°C (medium-rare). Rest on a wire rack for 8 minutes before slicing. Slice between the bones into individual cutlets.',timer:840,why:'57°C is medium-rare for lamb — the fibres are tender and the meat is pink throughout. Resting is critical: the internal temperature rises 2–3°C while resting (carryover cooking) and the juices redistribute. Cut before resting and they all pool on the board.'},
  ],
  tags:['french','lamb','roast','dinner-party'],
},
{
  id:'beef-rendang',
  title:'Malaysian Beef Rendang',
  tagline:'Slow-cooked until the sauce becomes the crust — the real thing',
  category:'beef',
  cuisine:'malaysian',
  type:'beef',
  time:210,
  difficulty:'medium',
  baseServings:6,
  inspiration:'Andy Cooks',
  sourceUrl:'https://www.youtube.com/@andy_cooks',
  heroEmoji:'🥘',
  heroColor:'#5C2A0A',
  heroImg:'https://images.unsplash.com/photo-PwjaasXRuk4?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Beef chuck or shin, large chunks',amount:1000,unit:'g',scales:'linear'},
    {id:'i2',name:'Full-fat coconut milk',amount:800,unit:'ml',scales:'linear'},
    {id:'i3',name:'Dried red chillies',amount:8,unit:'',scales:'fixed'},
    {id:'i4',name:'Fresh red chillies',amount:4,unit:'',scales:'fixed'},
    {id:'i5',name:'Lemongrass stalks',amount:3,unit:'',scales:'fixed'},
    {id:'i6',name:'Fresh galangal, sliced',amount:40,unit:'g',scales:'fixed'},
    {id:'i7',name:'Fresh turmeric or ground turmeric',amount:20,unit:'g',scales:'fixed'},
    {id:'i8',name:'Shallots',amount:8,unit:'',scales:'linear'},
    {id:'i9',name:'Garlic cloves',amount:6,unit:'',scales:'linear'},
    {id:'i10',name:'Kaffir lime leaves',amount:6,unit:'',scales:'fixed',notes:'Fresh or frozen — find at Asian grocers. Dried are a poor substitute'},
    {id:'i11',name:'Toasted desiccated coconut (kerisik)',amount:60,unit:'g',scales:'fixed',notes:'Toast desiccated coconut in a dry pan until golden brown and aromatic, then pound or blend to a paste — this is kerisik'},
    {id:'i12',name:'Palm sugar or brown sugar',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i13',name:'Salt',amount:1.5,unit:'tsp',scales:'fixed'},
    {id:'i14',name:'Neutral oil',amount:3,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Make the rempah (spice paste)',content:'Soak dried chillies in boiling water 10 minutes until soft. Blend soaked chillies, fresh chillies, lemongrass (white part only), galangal, turmeric, shallots, and garlic into a fine paste. Add water sparingly.',timer:600,why:'Rempah is the aromatic foundation of every Malaysian curry and rendang. Blending smooth ensures even distribution of flavour and prevents bitter raw aromatics in the finished dish. The dried and fresh chillies serve different purposes — dried for depth and earthiness, fresh for brightness and colour.'},
    {id:'s2',title:'Fry the rempah',content:'Heat oil in a large heavy pot over medium heat. Add rempah and fry, stirring constantly, for 12–15 minutes until it darkens, smells deeply fragrant, and the oil separates and pools around the edges.',timer:840,why:'This is the most important step in Malaysian cooking — undercooked rempah makes the finished dish taste raw and flat. The oil separating signals that all water has cooked off and the paste is frying in oil rather than steaming. This takes patience; rushing it on high heat burns the outside while leaving the inside raw.'},
    {id:'s3',title:'Add beef and coconut milk',content:'Add beef chunks and stir to coat with the paste. Add coconut milk, kaffir lime leaves, and salt. Bring to a boil, then reduce to a medium simmer uncovered. This will cook for 90 minutes.',timer:5400,why:'Rendang is unique — it cooks dry. Unlike a curry, all the coconut milk evaporates during the long cook. The fat from the coconut milk fries the beef and rempah in the last stage, creating a deeply caramelised crust rather than a sauce. This takes 90–120 minutes of patient simmering.'},
    {id:'s4',title:'Add kerisik and reduce to dry',content:'When the sauce has reduced by two-thirds and is thick, add kerisik and palm sugar. Continue cooking, now stirring frequently, until the sauce completely evaporates and the beef fries in the remaining coconut fat. The beef should turn deep brown and the paste clings as a crust.',timer:2400,why:'Kerisik (toasted coconut paste) adds fat, texture, and intensified coconut flavour. It also helps the sauce reduce to a dry coating. The final stage — when all liquid is gone and the beef is frying in its own fat — is what makes rendang different from any other braise. You will smell it before you see it: the toasted coconut aroma changes completely.'},
    {id:'s5',title:'Rest and serve',content:'Rendang improves dramatically with time — it\'s better the next day as the spices penetrate fully. Serve with steamed rice. Traditionally served at room temperature, but hot is also correct.',timer:null,why:'The spice-to-meat ratio in rendang is intense when freshly made. Resting overnight allows the flavour compounds to equilibrate — the initial sharp heat mellows and the aromatics integrate. This is why rendang is traditional Malaysian festival food — it\'s made days ahead.'},
  ],
  tags:['malaysian','beef','braise','weekend','meal-prep'],
},
{
  id:'weekday-bolognese',
  title:'The Weekday Bolognese',
  tagline:'A proper ragù without the all-day Sunday commitment',
  inspiration:'Andy Cooks',
  sourceUrl:'https://www.youtube.com/@andy_cooks',
  time:75,
  difficulty:'medium',
  baseServings:4,
  cuisine:'italian',
  type:'beef',
  heroEmoji:'🍝',
  heroColor:'#8B3A2F',
  heroImg:'https://images.unsplash.com/photo-b29Qdj7zc5g?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Olive oil',amount:2,unit:'tbsp',scales:'fixed'},
    {id:'i2',name:'Onion, fine dice',amount:1,unit:'medium',scales:'linear'},
    {id:'i3',name:'Carrot, fine dice',amount:1,unit:'medium',scales:'linear'},
    {id:'i4',name:'Celery stalk, fine dice',amount:1,unit:'stalk',scales:'linear'},
    {id:'i5',name:'Garlic cloves, minced',amount:3,unit:'cloves',scales:'fixed'},
    {id:'i6',name:'Beef mince (80/20)',amount:400,unit:'g',scales:'linear'},
    {id:'i7',name:'Pork mince',amount:200,unit:'g',scales:'linear'},
    {id:'i8',name:'Whole milk',amount:200,unit:'ml',scales:'linear'},
    {id:'i9',name:'Dry red wine',amount:200,unit:'ml',scales:'linear'},
    {id:'i10',name:'Tinned whole tomatoes',amount:400,unit:'g',scales:'linear'},
    {id:'i11',name:'Beef stock',amount:300,unit:'ml',scales:'linear'},
    {id:'i12',name:'Bay leaves',amount:2,unit:'',scales:'fixed'},
    {id:'i13',name:'Pappardelle or tagliatelle',amount:400,unit:'g',scales:'linear'},
    {id:'i14',name:'Parmigiano, grated',amount:60,unit:'g',scales:'linear'},
  ],
  steps:[
    {id:'s1',title:'Build the soffritto',content:'Warm oil over medium heat. Add onion, carrot, celery with a pinch of salt. Sweat gently for 12–15 min until soft and translucent — no colour.',timer:900,why:'This quiet step is roughly 30% of the final flavour. Rushing it with higher heat browns the outside but leaves the inside raw-tasting.'},
    {id:'s2',title:'Brown the mince',content:"Push soffritto to the side. Crank heat high. Add both minces in a single layer. Don't stir. Let them crust, then break up and brown.",timer:600,why:'The dark fond — the stuck bits — is the foundation of the sauce. Stirring too early steams the meat and nothing sticks.'},
    {id:'s3',title:'Milk first — this matters',content:'Pour in milk. Scrape up fond from the pan bottom. Simmer until nearly evaporated.',timer:420,why:"Milk tenderises the meat proteins BEFORE the acid of wine and tomato tightens them. Adding it later doesn't undo what the acid already did — it has to go first."},
    {id:'s4',title:'Wine, then tomatoes and stock',content:'Add wine, reduce by half. Then tomatoes (crushed by hand), stock, bay, and garlic. Bring to a murmur.',timer:120,why:null},
    {id:'s5',title:'The long simmer',content:'Partially cover. Simmer 45 min minimum — longer if you have it. Stir every 10. Splash of water if it tightens too much.',timer:2700,why:'Fat separating slightly at the edges means you\'re there. Taste aggressively for salt.'},
    {id:'s6',title:'Marry with pasta',content:'Cook pasta one minute shy of al dente. Transfer directly into the ragù with a ladle of pasta water. Toss over medium heat for 60 seconds. Finish with parmigiano off-heat.',timer:60,why:"Starchy pasta water emulsifies with the fat in the sauce — that's what turns a ragù from \"meat in tomato\" into something that clings to the pasta."},
  ],
  tags:['italian','beef','pasta','comfort'],
},
{
  id:'aglio-e-olio',
  title:'Spaghetti Aglio e Olio',
  tagline:'Four ingredients, one technique, no cutting corners',
  inspiration:'Simmer Fresh Kitchen',
  sourceUrl:'',
  time:15,
  difficulty:'easy',
  baseServings:2,
  cuisine:'italian',
  type:'pasta',
  heroEmoji:'🍝',
  heroColor:'#D4900A',
  heroImg:'https://images.unsplash.com/photo-1wK-sWIcRRU?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Spaghetti (bronze-die if you can find it)',amount:180,unit:'g',scales:'linear'},
    {id:'i2',name:'Garlic cloves, very thinly sliced',amount:6,unit:'',scales:'linear'},
    {id:'i3',name:'Extra virgin olive oil',amount:80,unit:'ml',scales:'linear'},
    {id:'i4',name:'Dried chilli flakes',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i5',name:'Flat-leaf parsley, finely chopped',amount:15,unit:'g',scales:'linear'},
    {id:'i6',name:'Salt for pasta water',amount:1,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Salt the water properly',content:'Bring a large pot of water to a rolling boil. Salt it until it tastes like the sea — roughly 1 tbsp per 2L. Drop the spaghetti.',timer:null,why:'There are only four flavours in this dish. Under-salted pasta water is the single most common way home cooks flatten it. The salt seasons the pasta from within — you cannot catch up with finishing salt later.'},
    {id:'s2',title:'Cold pan, cold oil, cold garlic',content:'While the pasta cooks, pour oil into a wide cold pan. Add the sliced garlic and chilli flakes. Set on medium-low heat.',timer:null,why:'Starting cold means the garlic infuses the oil gradually rather than shocking brown on contact with hot oil. This is how you get pale-golden, sweet garlic — not the acrid burnt version.'},
    {id:'s3',title:'Watch — this is the whole game',content:'Let the garlic go from raw white to pale gold. Swirl the pan gently. The moment any slice shows amber edges, pull the pan off the heat. This takes 4–6 minutes and you do not leave it.',timer:300,why:"Garlic carries over dramatically on residual pan heat — by the time you see dark gold in the pan, it will be bitter brown on the plate. Pull it early. If any slice goes truly brown, start again — one bitter slice poisons the whole dish."},
    {id:'s4',title:'Reserve water, drain shy',content:'Scoop out a mugful of pasta water. Drain the spaghetti about 90 seconds before the package time — it should still have a firm bite.',timer:null,why:"The pasta will finish cooking in the oil and absorb water from the reserve. Fully cooked pasta at this point ends up mushy by the time it's coated."},
    {id:'s5',title:'Emulsify in the pan',content:'Return the garlic pan to medium heat. Add drained pasta and a good splash of pasta water. Toss vigorously for 60–90 seconds. The oil and water should turn cloudy and coat every strand.',timer:90,why:"Starchy pasta water is what lets oil and water agree to be one sauce. Without it, the oil pools at the bottom. Keep tossing — agitation is what builds the emulsion."},
    {id:'s6',title:'Parsley off heat, serve immediately',content:'Kill the heat. Toss through parsley and a final glug of olive oil. Plate at once — this dish seizes as it cools.',timer:null,why:'Parsley off heat keeps it green and fresh-tasting. The final raw olive oil adds fragrance that cooked oil loses. Eat while the sauce is still glossy.'},
  ],
  tags:['italian','pasta','vegetarian','quick','pantry'],
},
{
  id:'mujadara',
  title:'Mujadara',
  tagline:'Lentils, rice, and deeply browned onions — the humblest Levantine classic',
  inspiration:'Simmer Fresh Kitchen',
  sourceUrl:'',
  time:70,
  difficulty:'easy',
  baseServings:4,
  cuisine:'levantine',
  type:'vegetarian',
  heroEmoji:'🍚',
  heroColor:'#6B4A14',
  heroImg:'https://images.unsplash.com/photo-u0VySR_du0I?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Green or brown lentils',amount:200,unit:'g',scales:'linear'},
    {id:'i2',name:'Long-grain white rice (basmati), rinsed',amount:200,unit:'g',scales:'linear'},
    {id:'i3',name:'Large yellow onions, thinly sliced',amount:3,unit:'large',scales:'linear'},
    {id:'i4',name:'Olive oil',amount:100,unit:'ml',scales:'linear'},
    {id:'i5',name:'Ground cumin',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i6',name:'Ground allspice',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Salt',amount:1.5,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Black pepper',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i9',name:'Plain yoghurt, to serve',amount:200,unit:'g',scales:'linear'},
  ],
  steps:[
    {id:'s1',title:'Start the lentils',content:'Rinse lentils, cover with 1L of cold water. Bring to a boil, then simmer uncovered 20 minutes until tender but still holding shape. Drain and reserve 500ml of the cooking liquid.',timer:1200,why:'Cooking the lentils alone first lets you control their texture — soft but distinct, not mushy. The lentil water is full of flavour; you are about to cook rice in it.'},
    {id:'s2',title:'Brown the onions properly — this is the dish',content:'While lentils cook, heat 70ml of olive oil in a wide pan over medium heat. Add all the onions. Cook 25–30 minutes, stirring every 3–4 minutes, until deep mahogany and crispy at the edges. They will collapse to a quarter of their volume.',timer:1800,why:"Mujadara is a Maillard dish masquerading as a rice-and-lentil dish. Pale golden onions are the biggest mistake home cooks make — you are aiming for a colour most people would call \"about to burn\". Medium heat and 30 real minutes is the right answer."},
    {id:'s3',title:'Split the onions',content:'When the onions are deep brown and crisp, scoop out roughly half onto a paper towel and season immediately with salt. Leave the other half in the pan.',timer:null,why:'The reserved crispy onions keep their crunch because they cool on paper away from the oil. The pan onions will melt into the rice and flavour the grains — that is what you want there.'},
    {id:'s4',title:'Toast rice with spices',content:'Add the drained rice, cumin, allspice, salt, and pepper to the onion pan. Stir 1 minute so every grain is coated and glossy.',timer:60,why:'Toasting the rice in spiced oil coats each grain in a flavoured fat layer, which keeps them separate and fragrant after steaming.'},
    {id:'s5',title:'Combine and steam together',content:'Add the drained lentils. Pour in 400ml of the reserved lentil water — it should sit about 1cm above the grains. Bring to a boil, then reduce to lowest heat, lid on, cook undisturbed 18 minutes.',timer:1080,why:"Absorption method — no stirring. Lifting the lid or stirring breaks the steam seal and the top layer stays hard. If the grains feel firm after 18 minutes, add 50ml more water and give it 5 more minutes off the heat."},
    {id:'s6',title:'Rest, fluff, plate',content:'Kill the heat. Leave covered 10 minutes. Fluff with a fork, tip onto a platter, crown with the reserved crispy onions. Serve with cold yoghurt on the side.',timer:600,why:'The 10-minute rest lets the steam finish the rice evenly. Cold yoghurt against the warm spiced grains is the whole point — sour, fatty, cooling — do not skip it.'},
  ],
  tags:['levantine','vegetarian','vegan','rice','batch-cook'],
},
{
  id:'sheet-pan-harissa-chicken',
  title:'Sheet-Pan Harissa Chicken with Chickpeas',
  tagline:'One tray, 45 minutes, dinner done',
  inspiration:'Simmer Fresh Kitchen',
  sourceUrl:'',
  time:55,
  difficulty:'easy',
  baseServings:4,
  cuisine:'levantine',

  heroEmoji:'🌶️',
  heroColor:'#C4422A',
  heroImg:'https://images.unsplash.com/photo-cgcteFH-azk?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Chicken thighs, bone-in skin-on',amount:800,unit:'g',scales:'linear'},
    {id:'i2',name:'Tinned chickpeas, drained and patted dry',amount:480,unit:'g',scales:'linear'},
    {id:'i3',name:'Red onion, cut in thick wedges',amount:1,unit:'large',scales:'linear'},
    {id:'i4',name:'Rose harissa paste',amount:3,unit:'tbsp',scales:'fixed'},
    {id:'i5',name:'Honey',amount:1,unit:'tbsp',scales:'fixed'},
    {id:'i6',name:'Olive oil',amount:3,unit:'tbsp',scales:'fixed'},
    {id:'i7',name:'Lemon, zested and juiced',amount:1,unit:'',scales:'fixed'},
    {id:'i8',name:'Ground cumin',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i9',name:'Garlic cloves, crushed',amount:3,unit:'',scales:'fixed'},
    {id:'i10',name:'Salt',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i11',name:'Flat-leaf parsley, chopped',amount:15,unit:'g',scales:'linear'},
    {id:'i12',name:'Plain yoghurt, to serve',amount:200,unit:'g',scales:'linear'},
  ],
  steps:[
    {id:'s1',title:'Oven on, tray going in empty',content:'Preheat oven to 220°C (fan 200°C) with a large rimmed sheet tray inside. Let it heat for 10 minutes.',timer:600,why:"A cold tray fights you — the chicken sits and steams while the tray catches up. A preheated tray sears the skin the moment the chicken lands."},
    {id:'s2',title:'Mix the marinade',content:'Whisk harissa, honey, 2 tbsp olive oil, lemon zest, cumin, garlic, and salt into a thick paste. Add chicken thighs. Turn until every piece is coated — get it under the skin where you can.',timer:null,why:'Honey and fat cling to skin. Lemon zest has the floral oils you want — the juice comes at the end where it will not burn. Getting harissa under the skin is where the real colour develops.'},
    {id:'s3',title:'Toss chickpeas and onions',content:'In a separate bowl, toss chickpeas and onion wedges with the remaining 1 tbsp olive oil and a pinch of salt.',timer:null,why:'Keeping the chickpeas out of the harissa keeps them crispy — coated in paste they steam instead of crisp.'},
    {id:'s4',title:'Everything onto the hot tray',content:'Pull the hot tray out. Scatter chickpeas and onions across it. Nestle the chicken thighs skin-side up, leaving space between pieces. It should sizzle on contact.',timer:null,why:"Crowding means steam. Every piece of chicken needs bare tray on all sides so heat circulates. If it doesn't sizzle when it hits the tray, give it 5 more minutes in the oven."},
    {id:'s5',title:'Roast and let the tray do the work',content:'Roast 30–35 minutes, unstirred, until the chicken skin is deeply charred at the edges, chickpeas are crispy, and juices run clear. Internal temperature 75°C.',timer:2100,why:"The char is the point. At 30 minutes the skin should look almost too dark. Stirring midway ruins the crust development you are waiting on."},
    {id:'s6',title:'Lemon, parsley, yoghurt',content:'Squeeze the juice of the zested lemon over the tray. Scatter parsley. Serve straight from the tray with cold yoghurt on the side.',timer:null,why:'Raw lemon juice at the end punches through the fat and harissa — the acid has to hit raw or it goes flat. Yoghurt is not optional garnish; it is the cooling element the harissa heat needs.'},
  ],
  tags:['levantine','chicken','sheet-pan','weeknight','one-pan'],
},
{
  id:'egg-fried-rice',
  title:'Proper Egg Fried Rice',
  tagline:'Day-old rice, screaming wok, everything else is details',
  inspiration:'Simmer Fresh Kitchen',
  sourceUrl:'',
  time:12,
  difficulty:'easy',
  baseServings:2,
  cuisine:'other',
  type:'eggs',
  heroEmoji:'🍳',
  heroColor:'#D4A93A',
  heroImg:'https://images.unsplash.com/photo-oT7_v-I0hHg?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Cooked long-grain rice, cold from the fridge',amount:400,unit:'g',scales:'linear'},
    {id:'i2',name:'Eggs, whisked',amount:3,unit:'',scales:'linear'},
    {id:'i3',name:'Spring onions, whites and greens separated',amount:4,unit:'',scales:'linear'},
    {id:'i4',name:'Neutral oil (sunflower or groundnut)',amount:3,unit:'tbsp',scales:'fixed'},
    {id:'i5',name:'Light soy sauce',amount:1,unit:'tbsp',scales:'fixed'},
    {id:'i6',name:'Toasted sesame oil',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'White pepper, freshly ground',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Salt',amount:0.5,unit:'tsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Break the rice up before the wok is hot',content:'Tip the cold rice into a bowl. Wet your fingers and crumble every clump into separate grains. If any block is still stuck together, it will stay stuck together in the wok.',timer:null,why:'Fried rice is a stir-fry of individual grains. Cold rice clumps because the starch has set — your job is to reverse that mechanically before the heat hits.'},
    {id:'s2',title:'Heat the wok until it smokes',content:'Dry wok on the highest flame. Wait until it is smoking — two to three minutes. Add 2 tbsp of the oil, swirl, pour out, add the remaining 1 tbsp.',timer:150,why:'The hot-wok-cold-oil trick seasons the surface so eggs do not weld to it. If there is no visible smoke, it is not hot enough. A stir-fry at low heat stews.'},
    {id:'s3',title:'Scramble the eggs aggressively',content:'Pour in the eggs. Swirl once and stir with a spatula for 15–20 seconds — they should set in soft, loose curds. Stop before they look fully cooked; residual heat finishes them.',timer:20,why:'Wok hei on egg means short contact at extreme heat — the outside coagulates while the inside stays tender. Fully cooked eggs at this stage will be rubbery by the time the dish is on the plate.'},
    {id:'s4',title:'Rice goes in, rice gets tossed',content:'Tip all the rice in on top of the eggs. Press it against the wok for 20 seconds, then toss. Repeat for 2 minutes — each toss breaks up another pocket of rice and exposes new grains to the hot metal.',timer:120,why:'Pressing is what gives fried rice its characteristic browned edges and smoky flavour (wok hei). Constant tossing without that initial press produces pale, soft rice.'},
    {id:'s5',title:'Soy, white pepper, spring onion whites',content:'Drizzle the soy sauce around the edge of the wok (not the middle — it burns onto the metal and flavours the rice). Add white pepper, salt, and the spring onion whites. Toss 30 seconds.',timer:30,why:"Soy poured on the hot metal edge caramelises into the rice rather than pooling. White pepper is the pepper in Chinese cooking — black pepper tastes too assertive here."},
    {id:'s6',title:'Sesame oil, greens, serve',content:'Off the heat. Drizzle the sesame oil, scatter the spring onion greens, toss once. Plate immediately while the rice is loose and steaming.',timer:null,why:'Toasted sesame oil is fragile — real heat destroys the volatile compounds that make it taste of sesame. Always off heat, always at the end.'},
  ],
  tags:['eggs','rice','quick','pantry','weeknight'],
},
{
  id:'lamb-shawarma',
  title:'Home Oven Lamb Shawarma',
  tagline:'Slow-roast shoulder with a spice bark — no rotisserie required',
  inspiration:'Simmer Fresh Kitchen',
  sourceUrl:'',
  time:300,
  difficulty:'medium',
  baseServings:6,
  cuisine:'levantine',
  type:'lamb',
  heroEmoji:'🥩',
  heroColor:'#6B3A2A',
  heroImg:'https://images.unsplash.com/photo-DTVXKbcLPHc?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Bone-in lamb shoulder',amount:2,unit:'kg',scales:'fixed'},
    {id:'i2',name:'Full-fat yoghurt',amount:200,unit:'g',scales:'linear'},
    {id:'i3',name:'Garlic cloves, crushed',amount:8,unit:'',scales:'linear'},
    {id:'i4',name:'Lemons, juice and zest',amount:2,unit:'',scales:'linear'},
    {id:'i5',name:'Olive oil',amount:4,unit:'tbsp',scales:'fixed'},
    {id:'i6',name:'Ground cumin',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i7',name:'Ground coriander',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i8',name:'Smoked paprika',amount:1,unit:'tbsp',scales:'fixed'},
    {id:'i9',name:'Ground cinnamon',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i10',name:'Ground cardamom',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i11',name:'Black pepper, freshly ground',amount:1,unit:'tsp',scales:'fixed'},
    {id:'i12',name:'Salt',amount:2,unit:'tsp',scales:'fixed'},
    {id:'i13',name:'Flatbreads or pitta, to serve',amount:6,unit:'large',scales:'linear'},
    {id:'i14',name:'Tahini sauce or garlic sauce, to serve',amount:150,unit:'g',scales:'linear'},
    {id:'i15',name:'Pickled turnips or amba, to serve',amount:100,unit:'g',scales:'linear'},
  ],
  steps:[
    {id:'s1',title:'Build the marinade and rub',content:'Mix yoghurt, crushed garlic, lemon zest and juice, olive oil, cumin, coriander, smoked paprika, cinnamon, cardamom, pepper, and salt into a thick paste. Smear it into every crevice of the shoulder. Cover and refrigerate overnight, or at least 6 hours.',timer:null,why:"Yoghurt's lactic acid tenderises lamb shoulder gently without turning it mushy the way a straight lemon marinade would. Overnight means the salt pulls moisture out and then back in, seasoning through the full thickness."},
    {id:'s2',title:'Out of the fridge an hour before',content:'Take the shoulder out 60 minutes before roasting. Preheat oven to 160°C (fan 140°C) in the last 20 minutes.',timer:3600,why:'Cold meat in a hot oven cooks unevenly — the outside crusts while the inside takes an hour longer to come up to temp.'},
    {id:'s3',title:'Low and slow, covered',content:'Place the shoulder in a deep roasting tray. Pour 200ml water into the tray around the lamb. Cover tightly with baking paper then foil. Roast for 4 hours. Do not peek.',timer:14400,why:"This is a braise disguised as a roast. The sealed tray traps steam. The water at the bottom becomes the most flavourful dripping you will ever taste. Opening the tray breaks the steam seal and you lose an hour of moisture in five seconds."},
    {id:'s4',title:'Rest, then crank the heat',content:'Pull the tray. Uncover it. The shoulder should be pullable with a fork. Rest uncovered 20 minutes while you crank the oven to its maximum — 240°C if it will go there.',timer:1200,why:'The rest lets the juices redistribute and gives you a dry surface to crisp. A wet-from-steam shoulder in a hot oven just steams more.'},
    {id:'s5',title:'Blast for crust',content:'Return the uncovered tray to maximum heat for 10–15 minutes. Watch it — you want the fat cap and exposed meat to catch colour and crisp at the edges.',timer:600,why:"This is your spit-roast simulation. The spice bark on the outside browns in a way it cannot under foil. Under-blast and you have a stew; over-blast and it dries in 60 seconds."},
    {id:'s6',title:'Pull, shred, wrap',content:'Shred the meat with two forks directly on the tray so every piece gets rolled in the spiced fat from the bottom. Pile into warm flatbreads with tahini sauce and pickled turnips.',timer:null,why:"The shredding-on-the-tray step re-dresses the meat in its own rendered spice-fat. Never drain that fat; it is the best bit. The pickle and tahini make the wrap balanced — fatty meat alone is one-note."},
  ],
  tags:['levantine','lamb','slow','dinner-party','batch-cook'],
},
{
  id:'nasi-lemak',
  title:'Nasi Lemak',
  tagline:'Malaysian coconut rice with all the fixings',
  inspiration:'Andy Cooks',
  sourceUrl:'https://www.youtube.com/@andy_cooks',
  time:60,
  difficulty:'medium',
  baseServings:4,
  cuisine:'malaysian',
  type:'seafood',
  heroEmoji:'🍚',
  heroColor:'#4A7C59',
  heroImg:'https://images.unsplash.com/photo-szQFiGZH8wU?w=600&q=80',
  ingredients:[
    {id:'i1',name:'Jasmine rice, rinsed',amount:400,unit:'g',scales:'linear'},
    {id:'i2',name:'Coconut milk, full-fat',amount:400,unit:'ml',scales:'linear'},
    {id:'i3',name:'Pandan leaves, knotted',amount:3,unit:'',scales:'fixed'},
    {id:'i4',name:'Lemongrass stalks, bruised',amount:2,unit:'',scales:'fixed'},
    {id:'i5',name:'Salt',amount:0.5,unit:'tsp',scales:'fixed'},
    {id:'i6',name:'Dried anchovies (ikan bilis), heads removed',amount:60,unit:'g',scales:'linear'},
    {id:'i7',name:'Roasted peanuts',amount:80,unit:'g',scales:'linear'},
    {id:'i8',name:'Eggs',amount:4,unit:'',scales:'linear'},
    {id:'i9',name:'Lebanese cucumbers, sliced',amount:2,unit:'',scales:'linear'},
    {id:'i10',name:'Vegetable oil, for frying',amount:250,unit:'ml',scales:'fixed'},
    {id:'i11',name:'Dried chillies, soaked and drained',amount:20,unit:'g',scales:'linear'},
    {id:'i12',name:'Red onion, roughly chopped',amount:1,unit:'large',scales:'linear'},
    {id:'i13',name:'Garlic cloves',amount:6,unit:'',scales:'fixed'},
    {id:'i14',name:'Belacan (shrimp paste block)',amount:20,unit:'g',scales:'fixed'},
    {id:'i15',name:'Palm sugar, grated',amount:2,unit:'tbsp',scales:'fixed'},
    {id:'i16',name:'Tamarind paste',amount:2,unit:'tbsp',scales:'fixed'},
  ],
  steps:[
    {id:'s1',title:'Make the sambal',content:'Blend soaked dried chillies, red onion, garlic, and toasted belacan until a coarse paste. Heat 3 tbsp oil in a wok on high. Fry paste, stirring constantly, 8–10 minutes until deep red-brown and oil separates — this is the matang stage. Add tamarind, palm sugar, and salt. Cook 2 more minutes. Taste: should be spicy, sweet, sour, and deeply savoury.',timer:720,why:'Frying the spice paste until the oil splits (matang) is non-negotiable. Raw shrimp paste is harsh and one-dimensional. The 8–10 minutes of frying drives off moisture and develops the Maillard reactions that give sambal its complexity.'},
    {id:'s2',title:'Cook the coconut rice',content:'Combine rinsed rice, coconut milk, 150ml water, pandan leaves, lemongrass, and salt in a heavy pot. Bring to a boil, stir once, then reduce to the lowest heat possible and cover tightly. Cook 12 minutes. Remove from heat, leave covered 10 more minutes. Fluff with a fork, remove aromatics.',timer:1320,why:'The steam-rest is where the rice finishes cooking — residual heat drives moisture evenly through every grain. Lifting the lid during the 10-minute rest releases that steam and leaves the top layer chalky.'},
    {id:'s3',title:'Fry the ikan bilis',content:'Heat oil to 180°C. Fry the dried anchovies in small batches, 2–3 minutes until golden and crispy. They go from pale to burnt fast — watch them. Drain on paper towel, season lightly with salt while hot.',timer:180,why:'Hot oil and small batches keep the temperature from dropping. Crowding the oil drops the temp, and the anchovies steam instead of fry — they go soft instead of crispy.'},
    {id:'s4',title:'Fry the eggs',content:'Pour most of the ikan bilis oil out, leaving about 2 tbsp. On high heat, fry eggs one at a time, basting with hot oil until the white is crispy at the edges but yolk is still runny. The white should puff up and blister.',timer:90,why:'The hot oil basting sets the white from above while the yolk stays soft — no need to flip. The crispy edges are textural contrast against the soft rice.'},
    {id:'s5',title:'Plate and serve',content:'Pack rice into a small bowl and invert onto each plate to form a dome. Arrange sambal, ikan bilis, peanuts, cucumber slices, and a fried egg around it. Serve immediately — the ikan bilis go soft fast.',timer:null,why:'The dome presentation is traditional and practical — it holds the accompaniments separate so each person can mix as they go.'},
  ],
  tags:['malaysian','rice','coconut','sambal'],
},

  ],
  steps:[
    {id:'s1',title:'Prawn stock from shells',content:'Peel and devein the prawns — reserve the shells. Toast prawn shells in a dry pot 3 minutes until fragrant and pink-red. Add 800ml water, bring to boil, simmer 15 minutes. Strain.',timer:1080,why:'Prawn shells contain glutamates and chitin that dissolve into an intensely savoury stock in 15 minutes. Most home cooks throw them away. This is a 15-minute investment that separates a good laksa from a great one.'},
    {id:'s2',title:'Make the laksa paste',content:'Blend lemongrass, galangal, chillies, shallots, garlic, toasted belacan, candlenuts, turmeric, and ground coriander with 3 tbsp water until smooth — 3 minutes minimum.',timer:180,why:'The paste is the heart of laksa. Over-blending doesn\'t exist here — the finer the paste, the more surface area for the frying stage.'},
    {id:'s3',title:'Fry the paste to matang',content:'Heat oil in a heavy pot on medium-high. Fry the paste 8–10 minutes, stirring constantly, until oil splits and paste is deep golden. The smell will intensify dramatically.',timer:600,why:'You are frying the spices in their own released oils until fully cooked through. Uncooked laksa paste is sharp and harsh. Cooked paste is rich, complex, and fragrant.'},
    {id:'s4',title:'Build the broth',content:'Add chicken stock and prawn stock to the fried paste. Bring to a boil, then reduce. Add coconut milk — don\'t boil after this, just maintain a gentle simmer. Season with fish sauce, palm sugar, and salt. Simmer 15 minutes.',timer:900,why:'Boiling coconut milk after it\'s been added causes it to split — it separates into greasy curds and clear liquid. A gentle simmer keeps the emulsion stable.'},
    {id:'s5',title:'Cook the prawns and tofu',content:'Add the tofu cubes and simmer 3 minutes. Add the prawns and cook exactly 2–3 minutes until just pink and curled.',timer:360,why:'Prawns go from raw to overcooked in about 90 seconds in hot broth. Pull them the moment they\'re pink.'},
    {id:'s6',title:'Bowl up',content:'Soak noodles in boiling water 5 minutes, drain. Divide between bowls, ladle over the broth with prawns and tofu. Top with bean sprouts, fresh coriander, and a lime wedge.',timer:null,why:'Assembling in bowls (not the pot) keeps the noodles from going soggy. Bean sprouts should have some crunch — add them at the last second.'},

{

  ],
  steps:[
    {id:'s1',title:'Get the wok screaming hot — this is the whole game',content:'Place your heaviest wok on the largest burner turned to maximum. Heat 3–4 minutes until it is smoking and you can see heat waves. Have all ingredients prepped and right next to the wok. Once you start, this dish takes 4 minutes total and you cannot stop.',timer:null,why:'Wok hei — the smoky, slightly charred quality of good CKT — requires surface temperatures above 200°C. The wok must be hotter than the cooking medium. A stir-fry at low heat stews.'},
    {id:'s2',title:'Fry the sausage and aromatics',content:'Add lard or oil. When it shimmers immediately, add lap cheong slices. Let them sear 30 seconds — they\'ll start rendering fat. Add garlic and fry 20 seconds, tossing constantly.',timer:60,why:'The lap cheong fat renders and flavours the oil, which then flavours everything else. Garlic goes in second — alone on a screaming-hot wok it burns in under 15 seconds.'},
    {id:'s3',title:'Add prawns, then noodles',content:'Add prawns, toss 30 seconds until just turning pink. Push everything to the side. Add noodles to the hot centre — press flat against the wok surface 20 seconds, then toss. Add soy sauce, kecap manis, fish sauce, and white pepper, tossing constantly.',timer:90,why:'The 20-second press is deliberate — you are creating direct wok contact to char the noodle surface. Constant tossing without that initial press produces pale, soft noodles.'},
    {id:'s4',title:'Scramble in the eggs',content:'Push noodles to the side. Add eggs to the empty wok centre — let them set slightly 10 seconds, then scramble loosely and toss into the noodles before fully set.',timer:20,why:'Half-scrambled eggs integrated into the noodles is the texture you want — neither a separate omelette nor invisible.'},
    {id:'s5',title:'Bean sprouts and greens, then plate',content:'Add bean sprouts and chives. Toss 15 seconds — they should still have crunch. Plate immediately on a warm dish. Serve with fresh chilli slices.',timer:15,why:'Bean sprouts wilt and release water in about 30 seconds of heat. That water steams the noodles and destroys the wok hei you just built. 15 seconds is enough.'},

  steps:[

    {id:'s2',title:'Wilt the spinach',content:'In the same pan, add a splash of water and pile in the spinach. Cover 3–4 minutes until completely wilted. Transfer to a blender and blend until smooth — or rough-blend for more texture. Set aside.',timer:240,why:'Blanching the spinach in its own steam keeps the colour vivid green. Blending is what gives saag its sauce-like consistency rather than just wilted leaves.'},
    {id:'s3',title:'Build the masala base',content:'Melt ghee in a heavy pot on medium. Add onion and cook 10–12 minutes until deep golden. Add garlic, ginger, and green chilli, fry 2 minutes. Add cumin, coriander, turmeric, and kashmiri chilli — fry 90 seconds. Add tomatoes and cook until they completely break down, 8–10 minutes.',timer:1440,why:'The golden onion provides sweetness, the tomato provides acid and body, and frying the ground spices in the fat-onion mixture (bhuna technique) develops their full flavour. Rushing this stage means flat, unintegrated spice flavour.'},
    {id:'s4',title:'Add spinach and simmer',content:'Stir the blended spinach into the masala. Simmer 5 minutes. Add the yoghurt one spoon at a time, stirring constantly. Add garam masala and lemon juice. Taste and adjust salt.',timer:300,why:'Garam masala goes in at the end — heat destroys its delicate aromatics. The yoghurt goes in slowly because a sudden temperature shock can cause it to split.'},

    {id:'s1',title:'Dry the fish thoroughly',content:'At least 30 minutes before cooking, lay the fillets skin-side up on a wire rack over a tray. Pat with paper towel. Leave uncovered in the fridge — the cold, dry air desiccates the skin surface.',timer:1800,why:'Fish skin contains a lot of moisture. That moisture vaporises when it hits the hot pan, creating steam between the skin and pan — steam is what makes skin stick and stay pale. A completely dry skin contact-fries immediately, achieving the Maillard reaction that creates the crisp you want.'},
    {id:'s2',title:'Get the pan properly hot',content:'Heat a stainless steel or cast iron pan on high for 3 minutes. Add oil and 20g butter. The butter will foam immediately — wait for the foam to subside before adding fish.',timer:210,why:'Butter foams as water evaporates. Once the foam subsides, the butter solids have started to colour — this is the exact right moment to add the fish. Add it too early (in the foam) and the skin steams.'},
    {id:'s3',title:'Sear skin-side down — resist touching it',content:'Season the skin side with salt and white pepper. Lay fillets in the pan skin-side down. Press firmly for 10 seconds with a spatula to prevent curling. Cook on high heat 5–6 minutes WITHOUT MOVING. The fish is ready to flip when the flesh is opaque about ¾ of the way up the side.',timer:360,why:'The long undisturbed sear is counterintuitive. The skin releases naturally when it\'s ready. Lifting the fish before the skin has fully rendered means it tears and sticks.'},
    {id:'s4',title:'Flip and finish briefly',content:'Flip the fillets flesh-side down. Cook 60–90 seconds only. Remove to a warm plate, skin-side up — never rest fish on the crispy side or it steams against the plate.',timer:90,why:'Barramundi is done when it just flakes at the thickest point — about 60°C internal. The flesh side needs almost no time because it\'s already 85% cooked from the skin-side sear.'},
    {id:'s5',title:'Make brown butter and plate',content:'Turn heat to medium. Add remaining 60g butter to the pan — it will foam. Add garlic slices and cook 30 seconds, then add capers. When butter turns golden-brown and smells nutty — about 90 seconds — remove from heat. Add lemon juice. It will spit. Spoon over the fish. Scatter parsley.',timer:90,why:'Beurre noisette — brown butter — has a nutty, toffee-like flavour created by Maillard reactions in the milk solids. Adding the lemon juice off-heat stops the browning instantly.'},

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function scaleAmount(ing, factor){
  if(ing.scales==='fixed') return ing.amount;
  if(ing.scales==='custom'){
    // rice-to-water: softer curve
    if(ing.name.toLowerCase().includes('stock')||ing.name.toLowerCase().includes('water')){
      return +(ing.amount * Math.pow(factor,0.85)).toFixed(1);
    }
  }
  return +(ing.amount * factor).toFixed(1);
}
function formatAmount(n){
  if(n===Math.floor(n)) return String(n);
  if(Math.abs(n-Math.round(n*2)/2)<0.01) return n%1===0?String(n):(Math.floor(n)+' ½');
  return n.toFixed(1).replace(/\.0$/,'');
}
function fmtTime(mins){
  if(mins<60) return `${mins}m`;
  const h=Math.floor(mins/60),m=mins%60;
  return m===0?`${h}h`:`${h}h ${m}m`;
}
function highlightText(text,query){
  if(!query) return text;
  const escaped=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${escaped})`,'gi'),'<mark>$1</mark>');
}
function consolidateIngredients(meals){
  // meals: [{recipe, servings, leftovers}]
  const map={};
  for(const {recipe,servings,leftoversKey}of meals){
    const opt=LEFTOVER_OPTIONS.find(o=>o.id===leftoversKey)||LEFTOVER_OPTIONS[0];
    let total;
    if(opt.multiplier) total=opt.multiplier*recipe.baseServings;
    else total=servings+(opt.extra||0);
    const factor=total/recipe.baseServings;
    for(const ing of recipe.ingredients){
      const amt=scaleAmount(ing,factor);
      const key=`${ing.name.toLowerCase()}__${ing.unit||''}`;
      if(map[key]){
        map[key].amount+=amt;
        map[key].recipes.push(recipe.title);
      } else {
        const aisle=getAisle(ing.name);
        const auFlag=getAUFlag(ing.name);
        map[key]={name:ing.name,amount:amt,unit:ing.unit||'',recipes:[recipe.title],aisle,auFlag};
      }
    }
  }
  const aisleOrder=AISLES.map(a=>a.id);
  return Object.values(map).sort((a,b)=>{
    const ai=aisleOrder.indexOf(a.aisle);
    const bi=aisleOrder.indexOf(b.aisle);
    if(ai!==bi) return ai-bi;
    return a.name.localeCompare(b.name);
  });
}

// ─── TIMER HOOK ───────────────────────────────────────────────────────────────
function useTimer(seconds){
  const[remaining,setRemaining]=useState(seconds);
  const[running,setRunning]=useState(false);
  const[done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running&&remaining>0){
      ref.current=setInterval(()=>setRemaining(r=>{
        if(r<=1){clearInterval(ref.current);setRunning(false);setDone(true);return 0;}
        return r-1;
      }),1000);
    }
    return()=>clearInterval(ref.current);
  },[running]);
  const toggle=()=>{if(!done)setRunning(r=>!r)};
  const reset=()=>{clearInterval(ref.current);setRemaining(seconds);setRunning(false);setDone(false)};
  const pct=1-(remaining/seconds);
  const m=Math.floor(remaining/60),s=remaining%60;
  const display=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return{remaining,running,done,toggle,reset,display,pct};
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function useStorage(key,init){
  const[val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}
    catch{return init;}
  });
  const set=useCallback(v=>{
    const next=typeof v==='function'?v(val):v;
    setVal(next);
    try{localStorage.setItem(key,JSON.stringify(next));}catch{}
  },[key,val]);
  return[val,set];
}

// ─── SUBSTITUTION API ─────────────────────────────────────────────────────────
async function fetchSubstitution(recipe,ingredient){
  const others=recipe.ingredients.filter(i=>i.id!==ingredient.id).map(i=>i.name).slice(0,12).join(', ');
  const prompt=`You are an experienced cook. Someone is making "${recipe.title}" (${recipe.tagline}) but is missing: ${ingredient.amount} ${ingredient.unit||''} ${ingredient.name}. Other ingredients they have: ${others}. Respond ONLY with valid JSON, no markdown, no fences:\n{"severity":"minor"|"moderate"|"critical","impact":"one honest sentence about effect","substitutions":[{"name":"substitute","amount":number,"unit":"g/ml/tbsp/etc","note":"brief reason"}],"canSkip":true|false,"skipNote":"what to do if skipping, or empty"}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const data=await res.json();
  const text=data.content?.find(b=>b.type==='text')?.text||'{}';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

          {opt.extra!=null&&opt.extra>0&&(
            <div className="mt-3 text-xs p-2.5 rounded-lg flex items-center gap-2 fade-in" style={{background:T.ochre+'18',color:T.ochre}}>
              <Icon name="info" size={13} color={T.ochre}/>

            <div className="mt-3 text-xs p-2.5 rounded-lg flex items-center gap-2 fade-in" style={{background:T.ochre+'18',color:T.ochre}}>
              <Icon name="info" size={13} color={T.ochre}/>

          )}
        </div>
        {/* Ingredients */}
        <div className="mx-4 mt-6">
          <div className="serif font-black text-[22px] mb-3 tracking-[-0.015em]" style={{color:cooking?T.cookText:T.ink}}>Ingredients</div>
          <div className="space-y-1.5">
            {recipe.ingredients.map(ing=>{
              const d=getIng(ing);
              const checked=cooking&&checkedIngs[ing.id];
              return(
                <div key={ing.id} className="flex items-start gap-3 p-3 rounded-xl transition-all duration-200" style={{background:checked?(T.sage+'2A'):(cooking?'rgba(255,255,255,0.08)':T.cardBg),border:`1px solid ${checked?T.sage+'66':(cooking?'rgba(255,255,255,0.12)':T.border)}`,opacity:d.skipped?0.45:1}}>
                  {cooking&&<button onClick={()=>setCheckedIngs(p=>({...p,[ing.id]:!p[ing.id]}))} aria-label={checked?`Untick ${d.name}`:`Tick ${d.name}`} aria-pressed={checked} className="press w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 mt-0.5" style={{background:checked?T.sage:'rgba(255,255,255,0.12)',border:`1.5px solid ${checked?T.sage:'rgba(255,255,255,0.28)'}`}}>
                    {checked&&<span className="check-bounce"><Icon name="check" size={12} color={T.cream}/></span>}
                  </button>}
                  <div className="flex-1 text-sm leading-snug" style={{color:cooking?T.cookText:T.ink}}>
                    <span className="font-bold num-tnum">{formatAmount(d.amount)}{d.unit?' '+d.unit:''}</span>
                    <span className="ml-2">{d.name}</span>
                    {d.skipped&&<span className="ml-2 text-[10.5px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded" style={{background:'rgba(255,255,255,0.1)',color:'rgba(247,242,234,0.55)'}}>skipped</span>}
                    {d.subNote&&<div className="text-[12.5px] mt-1 flex items-center gap-1" style={{color:T.sage}}><Icon name="swap" size={11} color={T.sage}/> {d.subNote}</div>}
                    {d.notes&&!d.subNote&&<div className="serif-it text-[12.5px] mt-1" style={{color:cooking?'rgba(247,242,234,0.55)':T.inkFaint}}>{d.notes}</div>}
                    {ing.scales==='fixed'&&factor>1.5&&<div className="text-[11px] mt-1 font-semibold uppercase tracking-wider" style={{color:T.ochre}}>Fixed — doesn't scale</div>}
                  </div>
                  <button onClick={()=>setShowSub(ing)} aria-label={`Substitute ${d.name}`} className="press w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{background:cooking?'rgba(255,255,255,0.09)':T.border}}>
                    <Icon name="swap" size={14} color={cooking?'rgba(247,242,234,0.65)':T.inkFaint}/>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
        {/* Steps */}
        <div className="mx-4 mt-6 mb-4">
          <div className="flex items-baseline justify-between mb-3">
            <div className="serif font-black text-[22px] tracking-[-0.015em]" style={{color:cooking?T.cookText:T.ink}}>Method</div>
            {cooking&&<div className="text-[11px] uppercase tracking-wider font-bold num-tnum" style={{color:T.ochre}}>{doneCount}/{totalSteps}</div>}
          </div>
          <div className="space-y-3">
            {recipe.steps.map((step,idx)=>{
              const done=checkedSteps[step.id];
              const expanded=expandedWhy[step.id];
              return(
                <div key={step.id} className="rounded-2xl overflow-hidden transition-all duration-300" style={{background:cooking?(done?'rgba(90,122,90,0.14)':'rgba(255,255,255,0.035)'):(done?T.sage+'14':T.cardBg),border:`1px solid ${done?T.sage+'44':cooking?'rgba(255,255,255,0.08)':T.border}`}}>
                  <div className="p-4">
                    <div className="flex items-start gap-3">
                      <button onClick={()=>setCooking(true)||setCheckedSteps(p=>({...p,[step.id]:!p[step.id]}))} aria-label={done?`Untick step ${idx+1}`:`Complete step ${idx+1}`} aria-pressed={done} className="press w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm serif num-tnum" style={{background:done?T.sage:cooking?'rgba(255,255,255,0.12)':T.parchment,color:done?T.cream:cooking?T.cream:T.ink,border:`1.5px solid ${done?T.sage:cooking?'rgba(255,255,255,0.2)':T.borderDark}`}}>
                        {done?<span className="check-bounce"><Icon name="check" size={13} color={T.cream}/></span>:idx+1}
                      </button>
                      <div className="flex-1 min-w-0">
                        <div className="serif font-bold text-[16px] leading-tight tracking-[-0.01em] mb-1.5" style={{color:cooking?T.cookText:T.ink,textDecoration:done?'line-through':'none',opacity:done?.65:1}}>{step.title}</div>
                        <div className="text-[14px] leading-relaxed" style={{color:cooking?'rgba(247,242,234,0.85)':T.inkLight}}>{step.content}</div>
                        {step.timer&&<StepTimer seconds={step.timer}/>}
                        {step.why&&(
                          <button onClick={()=>setExpandedWhy(p=>({...p,[step.id]:!p[step.id]}))} aria-expanded={expanded} className="press flex items-center gap-1.5 mt-3 text-[11.5px] font-bold uppercase tracking-wider" style={{color:cooking?'rgba(247,242,234,0.55)':T.inkFaint}}>
                            <Icon name="info" size={12}/>
                            Why?
                            <span className="transition-transform duration-300" style={{transform:expanded?'rotate(180deg)':'rotate(0)'}}><Icon name="chevDown" size={12}/></span>
                          </button>
                        )}
                        {step.why&&expanded&&(
                          <div className="mt-2 p-3 rounded-xl text-[13px] leading-relaxed fade-in" style={{background:T.ochre+'14',color:cooking?T.ochre:T.inkLight,borderLeft:`2px solid ${T.ochre}`}}>
                            <span className="serif-it" style={{color:T.ochre}}>Because — </span>{step.why}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* Plan button */}
        <div className="mx-4 mb-8">
          <button onClick={()=>onPlan(recipe)} aria-pressed={planned} className="press w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2" style={{background:planned?T.sage:T.paprika,color:T.cream,boxShadow:`0 4px 18px ${planned?'rgba(90,122,90,.28)':'rgba(196,66,42,.28)'}`}}>
            {planned?<><Icon name="check" size={18} color={T.cream}/>In your plan</>:<><Icon name="plus" size={18} color={T.cream}/>Add to plan</>}
          </button>
        </div>
      </div>
      {showSub&&<SubstitutionSheet recipe={recipe} ingredient={showSub} onClose={()=>setShowSub(null)} onApply={applyAdj}/>}
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({allRecipes,planned,favorites,onPlan,onFav,onOpen}){
  const[q,setQ]=useState('');
  const[cuisine,setCuisine]=useState(null);
  const[type,setType]=useState(null);
  const[showFavs,setShowFavs]=useState(false);
  const isSearching=q.length>0;
  const hasFilter=!!(cuisine||type||showFavs);
  const filtered=useMemo(()=>allRecipes.filter(r=>{
    if(showFavs&&!favorites[r.id]) return false;
    if(cuisine&&r.cuisine!==cuisine) return false;
    if(type&&r.type!==type) return false;
    if(q){
      const s=q.toLowerCase();
      return r.title.toLowerCase().includes(s)||
             r.tagline.toLowerCase().includes(s)||
             r.inspiration.toLowerCase().includes(s)||
             (r.ingredients||[]).some(i=>i.name.toLowerCase().includes(s))||
             (r.tags||[]).some(t=>t.includes(s));
    }
    return true;
  }),[allRecipes,showFavs,cuisine,type,q]);
  function clearAll(){setCuisine(null);setType(null);setShowFavs(false);setQ('');}
  const activeCuisineObj=CUISINES.find(c=>c.id===cuisine);
  const activeTypeObj=TYPES.find(t=>t.id===type);
  return(
    <div className="flex flex-col min-h-screen" style={{background:T.parchment}}>
      <div className="sticky top-0 z-10 px-4 pt-6 pb-3" style={{background:'rgba(247,242,234,0.92)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`}}>
        <div className="flex items-end justify-between mb-4">
          <div>
            <div className="serif font-black text-[34px] leading-none tracking-[-0.025em]" style={{color:T.ink}}>Simmer Fresh</div>
            <div className="serif-it text-[13px] mt-1.5" style={{color:T.inkLight}}>your kitchen companion</div>
          </div>
          <div className="flex items-center gap-2">
            {hasFilter&&<button onClick={clearAll} aria-label="Clear all filters" className="press flex items-center gap-1 px-3 py-2 rounded-full text-xs font-bold" style={{background:T.border,color:T.inkLight}}><Icon name="x" size={11}/>Clear</button>}
            <button onClick={()=>setShowFavs(f=>!f)} aria-label={showFavs?'Show all recipes':'Show saved only'} aria-pressed={showFavs} className="press flex items-center gap-1.5 px-3.5 py-2 rounded-full text-xs font-bold" style={{background:showFavs?T.paprika:T.cardBg,color:showFavs?T.cream:T.ink,border:`1px solid ${showFavs?T.paprika:T.border}`}}>
              <Icon name={showFavs?'heartFill':'heart'} size={13} color={showFavs?T.cream:T.ink}/>
              Saved
            </button>
          </div>
        </div>
        <div className="relative mb-3">
          <div className="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"><Icon name="search" size={16} color={T.inkFaint}/></div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search recipes, chefs, ingredients…" aria-label="Search recipes" className="press w-full pl-10 pr-10 py-3 rounded-xl text-sm outline-none" style={{background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink}}/>
          {q&&<button onClick={()=>setQ('')} aria-label="Clear search" className="press absolute right-2.5 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full flex items-center justify-center" style={{background:T.border}}><Icon name="x" size={12} color={T.inkLight}/></button>}
        </div>
        {!isSearching&&(<>
          <div className="mb-2">
            <div className="eyebrow mb-2">By cuisine</div>
            <div className="flex gap-1.5 overflow-x-auto scrollbar-hide pb-1 -mx-4 px-4">
              {CUISINES.filter(c=>allRecipes.some(r=>r.cuisine===c.id)).map(c=>{
                const active=cuisine===c.id;
                return(
                  <button key={c.id} onClick={()=>setCuisine(active?null:c.id)} aria-pressed={active} className="press flex-shrink-0 flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold" style={{background:active?T.paprika:T.cardBg,color:active?T.cream:T.inkLight,border:`1px solid ${active?T.paprika:T.border}`,boxShadow:active?'0 2px 8px rgba(196,66,42,.25)':'none'}}>
                    <span>{c.emoji}</span>{c.label}
                  </button>
                );
              })}
            </div>
          </div>
          <div>
            <div className="eyebrow mb-2">By type</div>
            <div className="flex gap-1.5 overflow-x-auto scrollbar-hide pb-1 -mx-4 px-4">
              {TYPES.filter(t=>allRecipes.some(r=>r.type===t.id)).map(t=>{
                const active=type===t.id;
                return(
                  <button key={t.id} onClick={()=>setType(active?null:t.id)} aria-pressed={active} className="press flex-shrink-0 flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold" style={{background:active?T.ink:T.cardBg,color:active?T.cream:T.inkLight,border:`1px solid ${active?T.ink:T.border}`,boxShadow:active?'0 2px 8px rgba(28,23,18,.18)':'none'}}>
                    <span>{t.emoji}</span>{t.label}
                  </button>
                );
              })}
            </div>
          </div>
        </>)}
      </div>
      {(cuisine||type)&&!isSearching&&(
        <div className="px-4 py-2.5 flex items-center gap-2 flex-wrap" style={{borderBottom:`1px solid ${T.border}`,background:T.cream}}>
          <span className="text-xs font-semibold" style={{color:T.inkFaint}}>Showing:</span>
          {activeCuisineObj&&<span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:T.paprika+'22',color:T.paprika}}>{activeCuisineObj.emoji} {activeCuisineObj.label}</span>}
          {activeTypeObj&&<span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:T.ink+'11',color:T.ink}}>{activeTypeObj.emoji} {activeTypeObj.label}</span>}
          <span className="text-xs ml-auto" style={{color:T.inkFaint}}>{filtered.length} recipe{filtered.length!==1?'s':''}</span>
        </div>
      )}
      <div className="flex-1 p-4">
        {filtered.length===0?(
          <div className="text-center py-20 fade-in">
            <div className="text-5xl mb-4">{showFavs?'💛':'🔍'}</div>
            <div className="serif font-bold text-xl mb-1.5">{showFavs?'Nothing saved yet':'No results'}</div>
            <div className="serif-it text-sm mb-4" style={{color:T.inkFaint}}>{showFavs?'Tap the heart on a recipe to save it here':'Try different filters or search terms'}</div>
            {hasFilter&&<button onClick={clearAll} className="press px-4 py-2 rounded-full text-sm font-bold" style={{background:T.paprika,color:T.cream}}>Clear all filters</button>}
          </div>
        ):(
          <div className="grid grid-cols-1 gap-4">
            {filtered.map(r=>(
              <RecipeCard key={r.id} recipe={r} query={q} onTap={onOpen} onPlan={onPlan} planned={!!planned.find(p=>p.id===r.id)} favorite={!!favorites[r.id]} onFav={onFav}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PLAN & SHOP ──────────────────────────────────────────────────────────────
function PlanAndShop({allRecipes,planned,onRemove,onOpen}){
  const[tab,setTab]=useState('list');
  const[checked,setChecked]=useState({});
  const[servingsMap,setServingsMap]=useState(()=>Object.fromEntries(planned.map(p=>[p.id,p.baseServings])));
  const[leftoversMap,setLeftoversMap]=useState(()=>Object.fromEntries(planned.map(p=>[p.id,'tonight'])));
  useEffect(()=>{
    setServingsMap(prev=>{
      const next={...prev};
      for(const p of planned) if(!(p.id in next)) next[p.id]=p.baseServings;
      return next;
    });
    setLeftoversMap(prev=>{
      const next={...prev};
      for(const p of planned) if(!(p.id in next)) next[p.id]='tonight';
      return next;
    });
  },[planned]);
  const mealsForList=planned.map(r=>({recipe:r,servings:servingsMap[r.id]||r.baseServings,leftoversKey:leftoversMap[r.id]||'tonight'}));
  const shoppingList=consolidateIngredients(mealsForList);
  const toggleCheck=key=>setChecked(p=>({...p,[key]:!p[key]}));
  const clearChecked=()=>setChecked({});
  const checkedCount=Object.values(checked).filter(Boolean).length;
  if(planned.length===0) return(
    <div className="flex flex-col items-center justify-center min-h-screen px-8 text-center fade-in" style={{background:T.parchment}}>
      <div className="text-6xl mb-5">🛒</div>
      <div className="serif font-black text-2xl mb-2 tracking-[-0.02em]">No meals planned yet</div>
      <div className="serif-it text-[14px] max-w-xs leading-relaxed" style={{color:T.inkFaint}}>Browse recipes and tap Plan to build your week — your shopping list writes itself.</div>
    </div>
  );
  return(
    <div className="flex flex-col min-h-screen" style={{background:T.parchment}}>
      <div className="sticky top-0 z-10 px-4 pt-6 pb-0" style={{background:'rgba(247,242,234,0.92)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`}}>
        <div className="flex items-end justify-between mb-4">
          <div>
            <div className="serif font-black text-[30px] leading-none tracking-[-0.025em]">Plan <span className="serif-it font-normal" style={{color:T.inkLight}}>&</span> Shop</div>
            <div className="serif-it text-[13px] mt-1.5" style={{color:T.inkLight}}>{planned.length} meal{planned.length!==1?'s':''} on the go</div>
          </div>
          <div className="flex items-center gap-2">
            {tab==='list'&&shoppingList.length>0&&<button onClick={()=>{
              const text=AISLES.map(a=>{
                const items=shoppingList.filter(i=>i.aisle===a.id);
                if(!items.length) return null;
                const lines=items.map(i=>`• ${i.name} — ${formatAmount(i.amount)}${i.unit?' '+i.unit:''}`).join('\n');
                return `${a.emoji} ${a.label}\n${lines}`;
              }).filter(Boolean).join('\n\n');
              const full=`🛒 Simmer Fresh Shopping List\n\n${text}`;
              if(navigator.share){navigator.share({title:'Shopping List',text:full}).catch(()=>{});}
              else{navigator.clipboard.writeText(full).then(()=>alert('List copied to clipboard!'));}
            }} aria-label="Share shopping list" className="press flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-full" style={{background:T.paprika,color:T.cream}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>}
            {tab==='list'&&checkedCount>0&&<button onClick={clearChecked} aria-label="Clear ticked items" className="press text-xs font-bold px-3 py-2 rounded-full flex items-center gap-1.5" style={{background:T.border}}><Icon name="x" size={11}/>Clear ({checkedCount})</button>}
          </div>
        </div>
        <div className="relative flex gap-1">
          {[['list','Shopping list'],['meals','Meals']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} aria-pressed={tab===id} className="press flex-1 py-3 text-sm font-bold relative" style={{color:tab===id?T.ink:T.inkFaint,letterSpacing:'-0.005em'}}>{label}</button>
          ))}
          <div className="absolute bottom-0 h-[2.5px] rounded-full transition-all duration-300 ease-out" style={{background:T.paprika,width:'calc(50% - 4px)',left:tab==='list'?'0':'calc(50% + 4px)'}}/>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto">
        {tab==='list'&&(
          <div className="p-4 fade-in">
            {shoppingList.length===0?<div className="text-center py-14 serif-it text-sm" style={{color:T.inkFaint}}>Nothing to shop for yet</div>:(
              <div className="space-y-5">

                  const aisleItems=shoppingList.filter(i=>i.aisle===aisle.id);
                  if(!aisleItems.length) return null;
                  const allDone=aisleItems.every(i=>checked[`${i.name}__${i.unit}`]);
                  return(
                    <div key={aisle.id}>
                      <div className="flex items-center gap-2 mb-2 px-1">
                        <span className="text-base leading-none">{aisle.emoji}</span>
                        <span className="serif font-black text-[13px] uppercase tracking-[0.06em]" style={{color:allDone?T.sage:T.inkFaint}}>{aisle.label}</span>
                        <div className="flex-1 h-px" style={{background:T.border}}/>
                        <span className="text-[11px] font-bold num-tnum" style={{color:T.inkFaint}}>{aisleItems.filter(i=>checked[`${i.name}__${i.unit}`]).length}/{aisleItems.length}</span>
                      </div>
                      <div className="space-y-1.5">
                        {aisleItems.map((item,i)=>{
                          const key=`${item.name}__${item.unit}`;

                            <div key={i}>
                              <button onClick={()=>toggleCheck(key)} aria-pressed={done} aria-label={done?`Untick ${item.name}`:`Tick ${item.name}`} className="press w-full flex items-center gap-3 p-3.5 rounded-xl text-left transition-all duration-200" style={{background:done?T.sage+'18':T.cardBg,border:`1px solid ${done?T.sage+'44':T.border}`,opacity:done?0.55:1}}>
                                <div className="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0" style={{background:done?T.sage:'transparent',border:`1.5px solid ${done?T.sage:T.borderDark}`}}>
                                  {done&&<span className="check-bounce"><Icon name="check" size={13} color={T.cream}/></span>}
                                </div>
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-baseline gap-2 flex-wrap">
                                    <span className="serif font-bold text-[15px] leading-tight" style={{textDecoration:done?'line-through':'none'}}>{item.name}</span>
                                    <span className="text-[13px] font-bold num-tnum" style={{color:T.paprika}}>{formatAmount(item.amount)}{item.unit?' '+item.unit:''}</span>
