                                  <span className="flex-shrink-0 mt-px">📍</span>
                                  <span>{item.auFlag}</span>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
        {tab==='meals'&&(
          <div className="p-4 space-y-3 fade-in">
            {planned.map(r=>{
              const sv=servingsMap[r.id]||r.baseServings;
              const lk=leftoversMap[r.id]||'tonight';
              return(
                <div key={r.id} className="rounded-2xl overflow-hidden" style={{background:T.cardBg,border:`1px solid ${T.border}`,boxShadow:'0 2px 12px rgba(28,23,18,.05)'}}>
                  <button onClick={()=>onOpen(r)} aria-label={`Open ${r.title}`} className="press w-full flex items-center gap-3 p-3">
                    <div className="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center text-3xl" style={{background:`linear-gradient(135deg,${r.heroColor}66,${r.heroColor}33)`}}>
                      {r.heroImg?<img src={r.heroImg} className="w-full h-full object-cover" alt=""/>:r.heroEmoji}
                    </div>
                    <div className="flex-1 text-left min-w-0">
                      <div className="serif font-bold text-[16px] leading-tight lc1 tracking-[-0.01em]">{r.title}</div>
                      <div className="serif-it text-[12.5px] mt-1 lc1" style={{color:T.inkLight}}>{r.inspiration} · {fmtTime(r.time)}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();onRemove(r.id)}} aria-label={`Remove ${r.title} from plan`} className="press w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{background:T.border}}>
                      <Icon name="x" size={14} color={T.inkFaint}/>
                    </button>
                  </button>
                  <div className="px-3 pb-3 border-t" style={{borderColor:T.border}}>
                    <div className="flex items-center justify-between mt-3 mb-2">
                      <span className="eyebrow">People</span>
                      <div className="flex items-center gap-2">
                        <button onClick={()=>setServingsMap(p=>({...p,[r.id]:Math.max(1,(p[r.id]||r.baseServings)-1)}))} aria-label="Fewer people" className="press w-8 h-8 rounded-full font-bold text-base flex items-center justify-center" style={{background:T.border}}>−</button>
                        <span className="serif font-black text-lg w-6 text-center num-tnum">{sv}</span>
                        <button onClick={()=>setServingsMap(p=>({...p,[r.id]:Math.min(20,(p[r.id]||r.baseServings)+1)}))} aria-label="More people" className="press w-8 h-8 rounded-full font-bold text-base flex items-center justify-center" style={{background:T.ink,color:T.cream}}>+</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-1.5">
                      {LEFTOVER_OPTIONS.map(o=>(
                        <button key={o.id} onClick={()=>setLeftoversMap(p=>({...p,[r.id]:o.id}))} aria-pressed={lk===o.id} className="press p-2 rounded-lg text-left text-xs" style={{background:lk===o.id?T.paprika:T.parchment,color:lk===o.id?T.cream:T.ink,border:`1px solid ${lk===o.id?T.paprika:T.border}`}}>
                          <div className="font-bold leading-tight">{o.label}</div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADD RECIPE ───────────────────────────────────────────────────────────────
function AddRecipe({onSave}){
  const[title,setTitle]=useState('');
  const[tagline,setTagline]=useState('');
  const[inspiration,setInspiration]=useState('');
  const[sourceUrl,setSourceUrl]=useState('');
  const[servings,setServings]=useState(4);
  const[time,setTime]=useState(30);
  const[diff,setDiff]=useState('easy');
  const[cat,setCat]=useState('beef');
  const[ings,setIngs]=useState([{id:'u1',name:'',amount:0,unit:'',scales:'linear',notes:''}]);
  const[steps,setSteps]=useState([{id:'u1',title:'',content:'',timer:null,why:''}]);
  const[saved,setSaved]=useState(false);
  function addIng(){setIngs(i=>[...i,{id:'u'+Date.now(),name:'',amount:0,unit:'',scales:'linear',notes:''}]);}
  function removeIng(id){setIngs(i=>i.filter(x=>x.id!==id));}
  function updateIng(id,field,val){setIngs(i=>i.map(x=>x.id===id?{...x,[field]:val}:x));}
  function addStep(){setSteps(s=>[...s,{id:'u'+Date.now(),title:'',content:'',timer:null,why:''}]);}
  function removeStep(id){setSteps(s=>s.filter(x=>x.id!==id));}
  function updateStep(id,field,val){setSteps(s=>s.map(x=>x.id===id?{...x,[field]:val}:x));}
  function save(){
    if(!title.trim()) return;
    const cats=['beef','chicken','fish','pasta','noodles','eggs','vegetarian','soup','other'];
    onSave({
      id:'user-'+Date.now(),title:title.trim(),tagline:tagline.trim()||'My recipe',
      category:cat,time,difficulty:diff,baseServings:servings,
      inspiration:inspiration||'My own recipe',sourceUrl:sourceUrl||'',
      heroEmoji:'🍽️',heroColor:'#8B7355',heroImg:null,
      ingredients:ings.filter(i=>i.name.trim()),
      steps:steps.filter(s=>s.content.trim()),tags:['personal'],
    });
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
    setTitle('');setTagline('');setIngs([{id:'u1',name:'',amount:0,unit:'',scales:'linear',notes:''}]);setSteps([{id:'u1',title:'',content:'',timer:null,why:''}]);
  }
  const inp="w-full px-3 py-2.5 rounded-xl text-sm outline-none";
  const sty={background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink};
  return(
    <div className="flex flex-col min-h-screen" style={{background:T.parchment}}>
      <div className="sticky top-0 z-10 px-4 pt-6 pb-4" style={{background:'rgba(247,242,234,0.92)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`}}>
        <div className="serif font-black text-[30px] leading-none tracking-[-0.025em]">Add your recipe</div>
        <div className="serif-it text-[13px] mt-1.5" style={{color:T.inkLight}}>same format as every other recipe — no second-class citizens</div>
      </div>
      <div className="flex-1 p-4 space-y-5 pb-32 overflow-y-auto fade-in">
        {/* Basic */}
        <div className="space-y-2">
          <div className="eyebrow">The basics</div>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Recipe title *" className={inp} style={sty}/>
          <input value={tagline} onChange={e=>setTagline(e.target.value)} placeholder="One-line description" className={inp} style={sty}/>
          <input value={inspiration} onChange={e=>setInspiration(e.target.value)} placeholder="Where did this come from? (chef, person, book…)" className={inp} style={sty}/>
          <input value={sourceUrl} onChange={e=>setSourceUrl(e.target.value)} placeholder="Video or source URL (optional)" className={inp} style={sty}/>
        </div>
        {/* Meta */}
        <div className="grid grid-cols-2 gap-2">
          <div className="space-y-1.5"><div className="eyebrow">Serves</div>
            <div className="flex items-center gap-2">
              <button onClick={()=>setServings(s=>Math.max(1,s-1))} aria-label="Fewer servings" className="press w-10 h-10 rounded-full font-bold" style={{background:T.border}}>−</button>
              <span className="serif font-black text-xl text-center w-8 num-tnum">{servings}</span>
              <button onClick={()=>setServings(s=>s+1)} aria-label="More servings" className="press w-10 h-10 rounded-full font-bold" style={{background:T.ink,color:T.cream}}>+</button>
            </div>
          </div>
          <div className="space-y-1.5"><div className="eyebrow">Time (mins)</div>
            <input type="number" value={time} onChange={e=>setTime(+e.target.value)} aria-label="Time in minutes" className={inp} style={sty}/>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="eyebrow mb-1.5">Difficulty</div>
            <select value={diff} onChange={e=>setDiff(e.target.value)} aria-label="Difficulty" className={inp} style={sty}>
              {['easy','medium','hard'].map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div>
            <div className="eyebrow mb-1.5">Category</div>
            <select value={cat} onChange={e=>setCat(e.target.value)} aria-label="Category" className={inp} style={sty}>
              {['beef','chicken','fish','pasta','noodles','eggs','vegetarian','levantine','bread','soup','other'].map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        {/* Ingredients */}
        <div>
          <div className="eyebrow mb-2">Ingredients</div>
          <div className="space-y-2">
            {ings.map((ing,i)=>(
              <div key={ing.id} className="p-3 rounded-xl space-y-2" style={{background:T.cardBg,border:`1px solid ${T.border}`}}>
                <div className="flex items-center justify-between">
                  <span className="serif-it text-[13px]" style={{color:T.inkFaint}}>Ingredient {i+1}</span>
                  {ings.length>1&&<button onClick={()=>removeIng(ing.id)} aria-label={`Remove ingredient ${i+1}`} className="press w-7 h-7 rounded-full flex items-center justify-center" style={{background:T.border}}><Icon name="x" size={12}/></button>}
                </div>
                <input value={ing.name} onChange={e=>updateIng(ing.id,'name',e.target.value)} placeholder="Name *" className={inp} style={sty}/>
                <div className="flex gap-2">
                  <input type="number" value={ing.amount||''} onChange={e=>updateIng(ing.id,'amount',+e.target.value)} placeholder="Amount" className={inp+" flex-1"} style={sty}/>
                  <input value={ing.unit} onChange={e=>updateIng(ing.id,'unit',e.target.value)} placeholder="Unit (g, ml…)" className={inp+" flex-1"} style={sty}/>
                </div>
                <select value={ing.scales} onChange={e=>updateIng(ing.id,'scales',e.target.value)} className={inp} style={sty}>
                  <option value="linear">Scales with portions</option>
                  <option value="fixed">Fixed quantity</option>
                  <option value="custom">Custom curve</option>
                </select>
                <input value={ing.notes} onChange={e=>updateIng(ing.id,'notes',e.target.value)} placeholder="Notes / substitution hint (optional)" className={inp} style={sty}/>
              </div>
            ))}
          </div>
          <button onClick={addIng} aria-label="Add ingredient" className="press mt-2 w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2" style={{background:T.cardBg,border:`1px dashed ${T.borderDark}`,color:T.inkLight}}>
            <Icon name="plus" size={14}/>Add ingredient
          </button>
        </div>
        {/* Steps */}
        <div>
          <div className="eyebrow mb-2">Steps</div>
          <div className="space-y-2">
            {steps.map((step,i)=>(
              <div key={step.id} className="p-3 rounded-xl space-y-2" style={{background:T.cardBg,border:`1px solid ${T.border}`}}>
                <div className="flex items-center justify-between">
                  <span className="serif-it text-[13px]" style={{color:T.inkFaint}}>Step {i+1}</span>
                  {steps.length>1&&<button onClick={()=>removeStep(step.id)} aria-label={`Remove step ${i+1}`} className="press w-7 h-7 rounded-full flex items-center justify-center" style={{background:T.border}}><Icon name="x" size={12}/></button>}
                </div>
                <input value={step.title} onChange={e=>updateStep(step.id,'title',e.target.value)} placeholder="Step title" className={inp} style={sty}/>
                <textarea value={step.content} onChange={e=>updateStep(step.id,'content',e.target.value)} placeholder="What to do *" rows={3} className={inp+" resize-none"} style={sty}/>
                <input type="number" value={step.timer||''} onChange={e=>updateStep(step.id,'timer',e.target.value?+e.target.value:null)} placeholder="Timer (seconds, optional)" className={inp} style={sty}/>
                <textarea value={step.why} onChange={e=>updateStep(step.id,'why',e.target.value)} placeholder="Why? The underlying reason (optional but valuable)" rows={2} className={inp+" resize-none"} style={sty}/>
              </div>
            ))}
          </div>
          <button onClick={addStep} aria-label="Add step" className="press mt-2 w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2" style={{background:T.cardBg,border:`1px dashed ${T.borderDark}`,color:T.inkLight}}>
            <Icon name="plus" size={14}/>Add step
          </button>
        </div>
        {/* Save */}
        <button onClick={save} disabled={!title.trim()} aria-label="Save recipe" className="press w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2" style={{background:saved?T.sage:title.trim()?T.paprika:T.border,color:title.trim()||saved?T.cream:T.inkFaint,cursor:title.trim()?'pointer':'default',boxShadow:title.trim()?`0 4px 18px ${saved?'rgba(90,122,90,.28)':'rgba(196,66,42,.28)'}`:'none'}}>
          {saved?<><Icon name="check" size={18} color={T.cream}/>Recipe saved!</>:<><Icon name="plus" size={18} color={title.trim()?T.cream:T.inkFaint}/>Save recipe</>}
        </button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function buzz(ms=10){try{navigator.vibrate&&navigator.vibrate(ms)}catch{}}

function App(){
  const[view,setView]=useState('home');
  const[activeRecipe,setActiveRecipe]=useState(null);
  const[userRecipes,setUserRecipes]=useStorage('sf_user_recipes',[]);
  const[planned,setPlanned]=useStorage('sf_planned',[]);
  const[favorites,setFavorites]=useStorage('sf_favorites',{});
  const[adjustments,setAdjustments]=useStorage('sf_adjustments',{});
  const allRecipes=[...RECIPES,...userRecipes];
  function openRecipe(r){buzz(8);setActiveRecipe(r);setView('detail');}
  function plan(r){
    buzz(10);
    setPlanned(p=>p.find(x=>x.id===r.id)?p.filter(x=>x.id!==r.id):[...p,r]);
  }
  function removePlan(id){setPlanned(p=>p.filter(x=>x.id!==id));}
  function toggleFav(id){buzz(6);setFavorites(f=>({...f,[id]:!f[id]}));}
  function saveUserRecipe(r){setUserRecipes(u=>[...u,r]);}
  function switchView(v){buzz(6);setView(v);}
  const planCount=planned.length;
  if(view==='detail'&&activeRecipe) return(
    <RecipeDetail
      recipe={activeRecipe}
      onBack={()=>{buzz(6);setView('home');}}
      favorite={!!favorites[activeRecipe.id]}
      onFav={toggleFav}
      onPlan={plan}
      planned={!!planned.find(p=>p.id===activeRecipe.id)}
      adjustments={adjustments}
      setAdjustments={setAdjustments}
    />
  );
  const tabs=[['home','Kitchen','home'],['shop','Plan & Shop','cart'],['add','Add','plus']];
  const tabIdx=tabs.findIndex(t=>t[0]===view);
  return(
    <div className="max-w-lg mx-auto">
      <div className="relative" style={{minHeight:'100vh'}}>
        <div className="pb-nav">
          {view==='home'&&<Home allRecipes={allRecipes} planned={planned} favorites={favorites} onPlan={plan} onFav={toggleFav} onOpen={openRecipe}/>}
          {view==='shop'&&<PlanAndShop allRecipes={allRecipes} planned={planned} onRemove={removePlan} onOpen={openRecipe}/>}
          {view==='add'&&<AddRecipe onSave={r=>{saveUserRecipe(r);setView('home');}}/>}
        </div>
        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 pt-3 z-30" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom,0px))',background:'linear-gradient(to top,rgba(247,242,234,1) 55%,rgba(247,242,234,0))'}}>
          <div className="relative flex p-1.5 rounded-2xl" style={{background:T.ink,boxShadow:'0 10px 36px rgba(0,0,0,0.28)'}}>
            {/* Animated active pill */}
            {tabIdx>=0&&<div className="absolute top-1.5 bottom-1.5 rounded-xl transition-all duration-300 ease-out" style={{background:T.paprika,left:`calc(6px + ${tabIdx} * (100% - 12px) / ${tabs.length})`,width:`calc((100% - 12px) / ${tabs.length})`,boxShadow:'0 2px 10px rgba(196,66,42,.32)'}}/>}
            {tabs.map(([id,label,icon])=>(
              <button key={id} onClick={()=>switchView(id)} aria-label={label} aria-pressed={view===id} className="press flex-1 py-3 rounded-xl flex items-center justify-center gap-1.5 relative z-10" style={{color:T.cream}}>
                <Icon name={icon} size={16} color={T.cream}/>
                <span className="text-xs font-bold tracking-tight">{label}</span>
                {id==='shop'&&planCount>0&&<span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] rounded-full text-[10px] font-black flex items-center justify-center px-1 num-tnum" style={{background:T.ochre,color:T.ink,boxShadow:'0 2px 6px rgba(0,0,0,.3)'}}>{planCount}</span>}
              </button>
            ))}
          </div>
        </nav>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
