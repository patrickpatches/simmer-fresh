          <button onClick={()=>onFav(recipe.id)} aria-label={favorite?'Remove from saved':'Save recipe'} aria-pressed={favorite} className="press w-10 h-10 rounded-full flex items-center justify-center" style={{background:cooking?'rgba(255,255,255,0.1)':T.cardBg,border:`1px solid ${cooking?'rgba(255,255,255,0.12)':T.border}`}}>
            <Icon name={favorite?'heartFill':'heart'} size={17} color={favorite?T.paprika:cooking?T.cream:T.ink}/>
          </button>
          <button onClick={()=>setCooking(c=>!c)} aria-pressed={cooking} className="press h-10 px-4 rounded-full font-bold text-sm" style={{background:cooking?T.paprika:T.ink,color:T.cream,boxShadow:'0 4px 14px rgba(28,23,18,0.22)'}}>
            {cooking?'Exit cook mode':'Start cooking'}
          </button>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto pb-32">
        {/* Hero */}
        <div className={"relative overflow-hidden "+(hasHero&&!heroLoaded?'img-skeleton':'')} style={{height:260}}>
          {hasHero
            ?<img src={recipe.heroImg} alt="" className={"w-full h-full object-cover img-fade "+(heroLoaded?'loaded':'')} onLoad={()=>setHeroLoaded(true)}/>
            :<div className="w-full h-full flex items-center justify-center text-7xl" style={{background:`linear-gradient(135deg,${recipe.heroColor}88,${recipe.heroColor}33)`}}>{recipe.heroEmoji}</div>}
          <div className="absolute inset-0 pointer-events-none" style={{background:'linear-gradient(to bottom,transparent 28%,rgba(0,0,0,0.78) 98%)'}}/>
          <div className="absolute bottom-4 left-4 right-4">
            <div className="serif font-black text-[32px] leading-[1.04] tracking-[-0.025em] text-white" style={{textShadow:'0 2px 18px rgba(0,0,0,.35)'}}>{recipe.title}</div>
            <div className="serif-it text-[15px] mt-2" style={{color:'rgba(255,255,255,0.88)',textShadow:'0 1px 10px rgba(0,0,0,.45)'}}>{recipe.tagline}</div>
          </div>
        </div>
        {/* Source */}
        <div className="mx-4 mt-4 p-3.5 rounded-2xl flex items-center justify-between" style={{background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink}}>
          <div className="min-w-0 flex-1 pr-3">
            <div className="eyebrow">Inspired by</div>
            <div className="serif font-bold text-[15px] mt-1 leading-tight lc1">{recipe.inspiration}</div>
          </div>
          <a href={recipe.sourceUrl} target="_blank" rel="noopener noreferrer" aria-label={`Watch ${recipe.inspiration} — opens in new tab`} onClick={e=>e.stopPropagation()} className="press flex items-center gap-1.5 text-xs font-bold px-3.5 py-2 rounded-lg flex-shrink-0" style={{background:T.paprika,color:T.cream,boxShadow:'0 2px 10px rgba(196,66,42,.25)'}}>
            Watch <Icon name="external" size={12} color={T.cream}/>
          </a>
        </div>
        {/* Meta */}
        <div className="mx-4 mt-3 flex items-stretch rounded-2xl overflow-hidden" style={{background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink}}>
          {[{icon:'clock',label:fmtTime(recipe.time),sub:'time'},{icon:'fire',label:recipe.difficulty,sub:'skill'},{icon:'star',label:`${recipe.baseServings}`,sub:`serves ${recipe.baseServings}`}].map((m,i)=>(
            <div key={m.sub} className="flex-1 flex flex-col items-center justify-center gap-0.5 py-3" style={{borderLeft:i>0?`1px solid ${T.border}`:'none'}}>
              <Icon name={m.icon} size={15} color={T.paprika}/>
              <span className="font-bold text-sm capitalize num-tnum mt-1">{m.label}</span>
              <span className="text-[10px] uppercase tracking-wider font-semibold" style={{color:T.inkFaint}}>{m.sub}</span>
            </div>
          ))}
        </div>
        {/* Cook mode progress */}
        {cooking&&doneCount>0&&(
          <div className="mx-4 mt-4 p-3 rounded-xl" style={{background:'rgba(255,255,255,0.06)'}}>
            <div className="flex items-center justify-between text-sm mb-2" style={{color:T.cookText}}>
              <span className="font-semibold">Progress</span>
              <span style={{color:T.ochre}}>{doneCount}/{totalSteps} steps</span>
            </div>
            <div className="h-2 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.1)'}}>
              <div className="h-full rounded-full transition-all duration-500" style={{width:`${(doneCount/totalSteps)*100}%`,background:T.ochre}}/>
            </div>
          </div>
        )}
        {/* Scaling */}
        <div className="mx-4 mt-4 p-4 rounded-2xl" style={{background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink}}>
          <div className="eyebrow mb-3">How many?</div>
          <div className="flex items-center justify-between mb-4">
            <div className="serif-it text-[15px]" style={{color:T.inkLight}}>People tonight</div>
            <div className="flex items-center gap-3">
              <button onClick={()=>setPeople(p=>Math.max(1,p-1))} aria-label="Fewer people" className="press w-10 h-10 rounded-full font-bold text-xl flex items-center justify-center" style={{background:T.border,color:T.ink}}>−</button>
              <span className="serif font-black text-2xl w-8 text-center num-tnum">{people}</span>
              <button onClick={()=>setPeople(p=>Math.min(20,p+1))} aria-label="More people" className="press w-10 h-10 rounded-full font-bold text-xl flex items-center justify-center" style={{background:T.ink,color:T.cream}}>+</button>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {LEFTOVER_OPTIONS.map(o=>(
              <button key={o.id} onClick={()=>setLeftover(o.id)} aria-pressed={leftover===o.id} className="press p-3 rounded-xl text-left" style={{background:leftover===o.id?T.paprika:T.parchment,color:leftover===o.id?T.cream:T.ink,border:`1px solid ${leftover===o.id?T.paprika:T.border}`,boxShadow:leftover===o.id?'0 2px 10px rgba(196,66,42,.22)':'none'}}>
                <div className="font-bold text-[12.5px] leading-tight">{o.label}</div>
                <div className="text-[11px] mt-1 opacity-80 leading-snug">{o.desc}</div>
              </button>
            ))}
          </div>
          {opt.extra!=null&&opt.extra>0&&(
            <div className="mt-3 text-xs p-2.5 rounded-lg flex items-center gap-2 fade-in" style={{background:T.ochre+'18',color:T.ochre}}>
              <Icon name="info" size={13} color={T.ochre}/>
              Making for {people} + {opt.extra} extra portion{opt.extra>1?'s':''} = <span className="font-bold num-tnum">{totalPortions} total</span>
            </div>
          )}
          {opt.multiplier&&(
            <div className="mt-3 text-xs p-2.5 rounded-lg flex items-center gap-2 fade-in" style={{background:T.ochre+'18',color:T.ochre}}>
              <Icon name="info" size={13} color={T.ochre}/>
              {opt.multiplier}× batch = <span className="font-bold num-tnum">{totalPortions} portions</span>
            </div>
          )}
        </div>
        {/* Ingredients */}
        <div className="mx-4 mt-6">
          <div className="serif font-black text-[22px] mb-3 tracking-[-0.015em]" style={{color:cooking?T.cookText:T.ink}}>Ingredients</div>
          <div className="space-y-1.5">
            {recipe.ingredients.map(ing=>{
              const d=getIng(ing);
              const checked=cooking&&checkedIngs[ing.id];
              return(
                <div key={ing.id} className="flex items-start gap-3 p-3 rounded-xl transition-all duration-200" style={{background:checked?(T.sage+'2A'):(cooking?'rgba(255,255,255,0.08)':T.cardBg),border:`1px solid ${checked?T.sage+'66':(cooking?'rgba(255,255,255,0.12)':T.border)}`,opacity:d.skipped?0.45:1}}>
                  {cooking&&<button onClick={()=>setCheckedIngs(p=>({...p,[ing.id]:!p[ing.id]}))} aria-label={checked?`Untick ${d.name}`:`Tick ${d.name}`} aria-pressed={checked} className="press w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 mt-0.5" style={{background:checked?T.sage:'rgba(255,255,255,0.12)',border:`1.5px solid ${checked?T.sage:'rgba(255,255,255,0.28)'}`}}>
                    {checked&&<span className="check-bounce"><Icon name="check" size={12} color={T.cream}/></span>}
                  </button>}
                  <div className="flex-1 text-sm leading-snug" style={{color:cooking?T.cookText:T.ink}}>
                    <span className="font-bold num-tnum">{formatAmount(d.amount)}{d.unit?' '+d.unit:''}</span>
                    <span className="ml-2">{d.name}</span>
                    {d.skipped&&<span className="ml-2 text-[10.5px] uppercase tracking-wider font-bold px-1.5 py-0.5 rounded" style={{background:'rgba(255,255,255,0.1)',color:'rgba(247,242,234,0.55)'}}>skipped</span>}
                    {d.subNote&&<div className="text-[12.5px] mt-1 flex items-center gap-1" style={{color:T.sage}}><Icon name="swap" size={11} color={T.sage}/> {d.subNote}</div>}
                    {d.notes&&!d.subNote&&<div className="serif-it text-[12.5px] mt-1" style={{color:cooking?'rgba(247,242,234,0.55)':T.inkFaint}}>{d.notes}</div>}
                    {ing.scales==='fixed'&&factor>1.5&&<div className="text-[11px] mt-1 font-semibold uppercase tracking-wider" style={{color:T.ochre}}>Fixed — doesn't scale</div>}
                  </div>
                  <button onClick={()=>setShowSub(ing)} aria-label={`Substitute ${d.name}`} className="press w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{background:cooking?'rgba(255,255,255,0.09)':T.border}}>
                    <Icon name="swap" size={14} color={cooking?'rgba(247,242,234,0.65)':T.inkFaint}/>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
        {/* Steps */}
        <div className="mx-4 mt-6 mb-4">
          <div className="flex items-baseline justify-between mb-3">
            <div className="serif font-black text-[22px] tracking-[-0.015em]" style={{color:cooking?T.cookText:T.ink}}>Method</div>
            {cooking&&<div className="text-[11px] uppercase tracking-wider font-bold num-tnum" style={{color:T.ochre}}>{doneCount}/{totalSteps}</div>}
          </div>
          <div className="space-y-3">
            {recipe.steps.map((step,idx)=>{
              const done=checkedSteps[step.id];
              const expanded=expandedWhy[step.id];
              return(
                <div key={step.id} className="rounded-2xl overflow-hidden transition-all duration-300" style={{background:cooking?(done?'rgba(90,122,90,0.14)':'rgba(255,255,255,0.035)'):(done?T.sage+'14':T.cardBg),border:`1px solid ${done?T.sage+'44':cooking?'rgba(255,255,255,0.08)':T.border}`}}>
                  <div className="p-4">
                    <div className="flex items-start gap-3">
                      <button onClick={()=>setCooking(true)||setCheckedSteps(p=>({...p,[step.id]:!p[step.id]}))} aria-label={done?`Untick step ${idx+1}`:`Complete step ${idx+1}`} aria-pressed={done} className="press w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm serif num-tnum" style={{background:done?T.sage:cooking?'rgba(255,255,255,0.12)':T.parchment,color:done?T.cream:cooking?T.cream:T.ink,border:`1.5px solid ${done?T.sage:cooking?'rgba(255,255,255,0.2)':T.borderDark}`}}>
                        {done?<span className="check-bounce"><Icon name="check" size={13} color={T.cream}/></span>:idx+1}
                      </button>
                      <div className="flex-1 min-w-0">
                        <div className="serif font-bold text-[16px] leading-tight tracking-[-0.01em] mb-1.5" style={{color:cooking?T.cookText:T.ink,textDecoration:done?'line-through':'none',opacity:done?.65:1}}>{step.title}</div>
                        <div className="text-[14px] leading-relaxed" style={{color:cooking?'rgba(247,242,234,0.85)':T.inkLight}}>{step.content}</div>
                        {step.timer&&<StepTimer seconds={step.timer}/>}
                        {step.why&&(
                          <button onClick={()=>setExpandedWhy(p=>({...p,[step.id]:!p[step.id]}))} aria-expanded={expanded} className="press flex items-center gap-1.5 mt-3 text-[11.5px] font-bold uppercase tracking-wider" style={{color:cooking?'rgba(247,242,234,0.55)':T.inkFaint}}>
                            <Icon name="info" size={12}/>
                            Why?
                            <span className="transition-transform duration-300" style={{transform:expanded?'rotate(180deg)':'rotate(0)'}}><Icon name="chevDown" size={12}/></span>
                          </button>
                        )}
                        {step.why&&expanded&&(
                          <div className="mt-2 p-3 rounded-xl text-[13px] leading-relaxed fade-in" style={{background:T.ochre+'14',color:cooking?T.ochre:T.inkLight,borderLeft:`2px solid ${T.ochre}`}}>
                            <span className="serif-it" style={{color:T.ochre}}>Because — </span>{step.why}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* Plan button */}
        <div className="mx-4 mb-8">
          <button onClick={()=>onPlan(recipe)} aria-pressed={planned} className="press w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2" style={{background:planned?T.sage:T.paprika,color:T.cream,boxShadow:`0 4px 18px ${planned?'rgba(90,122,90,.28)':'rgba(196,66,42,.28)'}`}}>
            {planned?<><Icon name="check" size={18} color={T.cream}/>In your plan</>:<><Icon name="plus" size={18} color={T.cream}/>Add to plan</>}
          </button>
        </div>
      </div>
      {showSub&&<SubstitutionSheet recipe={recipe} ingredient={showSub} onClose={()=>setShowSub(null)} onApply={applyAdj}/>}
    </div>
  );
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function Home({allRecipes,planned,favorites,onPlan,onFav,onOpen}){
  const[q,setQ]=useState('');
  const[cat,setCat]=useState('all');
  const[showFavs,setShowFavs]=useState(false);
  const cats=['all','beef','chicken','fish','pasta','noodles','eggs','vegetarian','levantine','bread','soup'];
  const filtered=allRecipes.filter(r=>{
    if(showFavs&&!favorites[r.id]) return false;
    if(cat!=='all'&&r.category!==cat) return false;
    if(q){
      const s=q.toLowerCase();
      return r.title.toLowerCase().includes(s)||r.tagline.toLowerCase().includes(s)||r.inspiration.toLowerCase().includes(s)||(r.tags||[]).some(t=>t.includes(s));
    }
    return true;
  });
  return(
    <div className="flex flex-col min-h-screen" style={{background:T.parchment}}>
      <div className="sticky top-0 z-10 px-4 pt-6 pb-3" style={{background:'rgba(247,242,234,0.92)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`}}>
        <div className="flex items-end justify-between mb-4">
          <div>
            <div className="serif font-black text-[34px] leading-none tracking-[-0.025em]" style={{color:T.ink}}>Mise</div>
            <div className="serif-it text-[13px] mt-1.5" style={{color:T.inkLight}}>your kitchen companion</div>
          </div>
          <button onClick={()=>setShowFavs(f=>!f)} aria-label={showFavs?'Show all recipes':'Show saved only'} aria-pressed={showFavs} className="press flex items-center gap-1.5 px-3.5 py-2 rounded-full text-xs font-bold" style={{background:showFavs?T.paprika:T.cardBg,color:showFavs?T.cream:T.ink,border:`1px solid ${showFavs?T.paprika:T.border}`}}>
            <Icon name={showFavs?'heartFill':'heart'} size={13} color={showFavs?T.cream:T.ink}/>
            Saved
          </button>
        </div>
        <div className="relative mb-3">
          <div className="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"><Icon name="search" size={16} color={T.inkFaint}/></div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search recipes, chefs, ingredients…" aria-label="Search recipes" className="press w-full pl-10 pr-10 py-3 rounded-xl text-sm outline-none" style={{background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink}}/>
          {q&&<button onClick={()=>setQ('')} aria-label="Clear search" className="press absolute right-2.5 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full flex items-center justify-center" style={{background:T.border}}><Icon name="x" size={12} color={T.inkLight}/></button>}
        </div>
        <div className="flex gap-1.5 overflow-x-auto scrollbar-hide pb-1 -mx-4 px-4">
          {cats.map(c=>(
            <button key={c} onClick={()=>setCat(c)} aria-pressed={cat===c} className="press flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs font-bold capitalize" style={{background:cat===c?T.ink:T.cardBg,color:cat===c?T.cream:T.inkLight,border:`1px solid ${cat===c?T.ink:T.border}`,boxShadow:cat===c?'0 2px 8px rgba(28,23,18,.18)':'none'}}>{c}</button>
          ))}
        </div>
      </div>
      <div className="flex-1 p-4">
        {filtered.length===0?(
          <div className="text-center py-20 fade-in">
            <div className="text-5xl mb-4">{showFavs?'💛':'🔍'}</div>
            <div className="serif font-bold text-xl mb-1.5">{showFavs?'Nothing saved yet':'No results'}</div>
            <div className="serif-it text-sm" style={{color:T.inkFaint}}>{showFavs?'Tap the heart on a recipe to save it here':'Try a different word, or browse a category'}</div>
          </div>
        ):(
          <div className="grid grid-cols-1 gap-4">
            {filtered.map(r=>(
              <RecipeCard key={r.id} recipe={r} query={q} onTap={onOpen} onPlan={onPlan} planned={!!planned.find(p=>p.id===r.id)} favorite={!!favorites[r.id]} onFav={onFav}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PLAN & SHOP ──────────────────────────────────────────────────────────────
function PlanAndShop({allRecipes,planned,onRemove,onOpen}){
  const[tab,setTab]=useState('list');
  const[checked,setChecked]=useState({});
  const[servingsMap,setServingsMap]=useState(()=>Object.fromEntries(planned.map(p=>[p.id,p.baseServings])));
  const[leftoversMap,setLeftoversMap]=useState(()=>Object.fromEntries(planned.map(p=>[p.id,'tonight'])));
  useEffect(()=>{
    setServingsMap(prev=>{
      const next={...prev};
      for(const p of planned) if(!(p.id in next)) next[p.id]=p.baseServings;
      return next;
    });
    setLeftoversMap(prev=>{
      const next={...prev};
      for(const p of planned) if(!(p.id in next)) next[p.id]='tonight';
      return next;
    });
  },[planned]);
  const mealsForList=planned.map(r=>({recipe:r,servings:servingsMap[r.id]||r.baseServings,leftoversKey:leftoversMap[r.id]||'tonight'}));
  const shoppingList=consolidateIngredients(mealsForList);
  const toggleCheck=key=>setChecked(p=>({...p,[key]:!p[key]}));
  const clearChecked=()=>setChecked({});
  const checkedCount=Object.values(checked).filter(Boolean).length;
  if(planned.length===0) return(
    <div className="flex flex-col items-center justify-center min-h-screen px-8 text-center fade-in" style={{background:T.parchment}}>
      <div className="text-6xl mb-5">🛒</div>
      <div className="serif font-black text-2xl mb-2 tracking-[-0.02em]">No meals planned yet</div>
      <div className="serif-it text-[14px] max-w-xs leading-relaxed" style={{color:T.inkFaint}}>Browse recipes and tap Plan to build your week — your shopping list writes itself.</div>
    </div>
  );
  return(
    <div className="flex flex-col min-h-screen" style={{background:T.parchment}}>
      <div className="sticky top-0 z-10 px-4 pt-6 pb-0" style={{background:'rgba(247,242,234,0.92)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`}}>
        <div className="flex items-end justify-between mb-4">
          <div>
            <div className="serif font-black text-[30px] leading-none tracking-[-0.025em]">Plan <span className="serif-it font-normal" style={{color:T.inkLight}}>&</span> Shop</div>
            <div className="serif-it text-[13px] mt-1.5" style={{color:T.inkLight}}>{planned.length} meal{planned.length!==1?'s':''} on the go</div>
          </div>
          {tab==='list'&&checkedCount>0&&<button onClick={clearChecked} aria-label="Clear ticked items" className="press text-xs font-bold px-3 py-2 rounded-full flex items-center gap-1.5" style={{background:T.border}}><Icon name="x" size={11}/>Clear ({checkedCount})</button>}
        </div>
        <div className="relative flex gap-1">
          {[['list','Shopping list'],['meals','Meals']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} aria-pressed={tab===id} className="press flex-1 py-3 text-sm font-bold relative" style={{color:tab===id?T.ink:T.inkFaint,letterSpacing:'-0.005em'}}>{label}</button>
          ))}
          <div className="absolute bottom-0 h-[2.5px] rounded-full transition-all duration-300 ease-out" style={{background:T.paprika,width:'calc(50% - 4px)',left:tab==='list'?'0':'calc(50% + 4px)'}}/>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto">
        {tab==='list'&&(
          <div className="p-4 fade-in">
            {shoppingList.length===0?<div className="text-center py-14 serif-it text-sm" style={{color:T.inkFaint}}>Nothing to shop for yet</div>:(
              <div className="space-y-1.5">
                {shoppingList.map((item,i)=>{
                  const key=`${item.name}__${item.unit}`;
                  const done=checked[key];
                  return(
                    <button key={i} onClick={()=>toggleCheck(key)} aria-pressed={done} aria-label={done?`Untick ${item.name}`:`Tick ${item.name}`} className="press w-full flex items-center gap-3 p-3.5 rounded-xl text-left transition-all duration-200" style={{background:done?T.sage+'18':T.cardBg,border:`1px solid ${done?T.sage+'44':T.border}`,opacity:done?0.55:1}}>
                      <div className="w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0" style={{background:done?T.sage:'transparent',border:`1.5px solid ${done?T.sage:T.borderDark}`}}>
                        {done&&<span className="check-bounce"><Icon name="check" size={13} color={T.cream}/></span>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-baseline gap-2 flex-wrap">
                          <span className="serif font-bold text-[15px] leading-tight" style={{textDecoration:done?'line-through':'none'}}>{item.name}</span>
                          <span className="text-[13px] font-bold num-tnum" style={{color:T.paprika}}>{formatAmount(item.amount)}{item.unit?' '+item.unit:''}</span>
                        </div>
                        <div className="serif-it text-[11.5px] mt-0.5 lc1" style={{color:T.inkFaint}}>for {item.recipes.join(', ')}</div>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        )}
        {tab==='meals'&&(
          <div className="p-4 space-y-3 fade-in">
            {planned.map(r=>{
              const sv=servingsMap[r.id]||r.baseServings;
              const lk=leftoversMap[r.id]||'tonight';
              return(
                <div key={r.id} className="rounded-2xl overflow-hidden" style={{background:T.cardBg,border:`1px solid ${T.border}`,boxShadow:'0 2px 12px rgba(28,23,18,.05)'}}>
                  <button onClick={()=>onOpen(r)} aria-label={`Open ${r.title}`} className="press w-full flex items-center gap-3 p-3">
                    <div className="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 flex items-center justify-center text-3xl" style={{background:`linear-gradient(135deg,${r.heroColor}66,${r.heroColor}33)`}}>
                      {r.heroImg?<img src={r.heroImg} className="w-full h-full object-cover" alt=""/>:r.heroEmoji}
                    </div>
                    <div className="flex-1 text-left min-w-0">
                      <div className="serif font-bold text-[16px] leading-tight lc1 tracking-[-0.01em]">{r.title}</div>
                      <div className="serif-it text-[12.5px] mt-1 lc1" style={{color:T.inkLight}}>{r.inspiration} · {fmtTime(r.time)}</div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();onRemove(r.id)}} aria-label={`Remove ${r.title} from plan`} className="press w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{background:T.border}}>
                      <Icon name="x" size={14} color={T.inkFaint}/>
                    </button>
                  </button>
                  <div className="px-3 pb-3 border-t" style={{borderColor:T.border}}>
                    <div className="flex items-center justify-between mt-3 mb-2">
                      <span className="eyebrow">People</span>
                      <div className="flex items-center gap-2">
                        <button onClick={()=>setServingsMap(p=>({...p,[r.id]:Math.max(1,(p[r.id]||r.baseServings)-1)}))} aria-label="Fewer people" className="press w-8 h-8 rounded-full font-bold text-base flex items-center justify-center" style={{background:T.border}}>−</button>
                        <span className="serif font-black text-lg w-6 text-center num-tnum">{sv}</span>
                        <button onClick={()=>setServingsMap(p=>({...p,[r.id]:Math.min(20,(p[r.id]||r.baseServings)+1)}))} aria-label="More people" className="press w-8 h-8 rounded-full font-bold text-base flex items-center justify-center" style={{background:T.ink,color:T.cream}}>+</button>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-1.5">
                      {LEFTOVER_OPTIONS.map(o=>(
                        <button key={o.id} onClick={()=>setLeftoversMap(p=>({...p,[r.id]:o.id}))} aria-pressed={lk===o.id} className="press p-2 rounded-lg text-left text-xs" style={{background:lk===o.id?T.paprika:T.parchment,color:lk===o.id?T.cream:T.ink,border:`1px solid ${lk===o.id?T.paprika:T.border}`}}>
                          <div className="font-bold leading-tight">{o.label}</div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADD RECIPE ───────────────────────────────────────────────────────────────
function AddRecipe({onSave}){
  const[title,setTitle]=useState('');
  const[tagline,setTagline]=useState('');
  const[inspiration,setInspiration]=useState('');
  const[sourceUrl,setSourceUrl]=useState('');
  const[servings,setServings]=useState(4);
  const[time,setTime]=useState(30);
  const[diff,setDiff]=useState('easy');
  const[cat,setCat]=useState('beef');
  const[ings,setIngs]=useState([{id:'u1',name:'',amount:0,unit:'',scales:'linear',notes:''}]);
  const[steps,setSteps]=useState([{id:'u1',title:'',content:'',timer:null,why:''}]);
  const[saved,setSaved]=useState(false);
  function addIng(){setIngs(i=>[...i,{id:'u'+Date.now(),name:'',amount:0,unit:'',scales:'linear',notes:''}]);}
  function removeIng(id){setIngs(i=>i.filter(x=>x.id!==id));}
  function updateIng(id,field,val){setIngs(i=>i.map(x=>x.id===id?{...x,[field]:val}:x));}
  function addStep(){setSteps(s=>[...s,{id:'u'+Date.now(),title:'',content:'',timer:null,why:''}]);}
  function removeStep(id){setSteps(s=>s.filter(x=>x.id!==id));}
  function updateStep(id,field,val){setSteps(s=>s.map(x=>x.id===id?{...x,[field]:val}:x));}
  function save(){
    if(!title.trim()) return;
    const cats=['beef','chicken','fish','pasta','noodles','eggs','vegetarian','soup','other'];
    onSave({
      id:'user-'+Date.now(),title:title.trim(),tagline:tagline.trim()||'My recipe',
      category:cat,time,difficulty:diff,baseServings:servings,
      inspiration:inspiration||'My own recipe',sourceUrl:sourceUrl||'',
      heroEmoji:'🍽️',heroColor:'#8B7355',heroImg:null,
      ingredients:ings.filter(i=>i.name.trim()),
      steps:steps.filter(s=>s.content.trim()),tags:['personal'],
    });
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
    setTitle('');setTagline('');setIngs([{id:'u1',name:'',amount:0,unit:'',scales:'linear',notes:''}]);setSteps([{id:'u1',title:'',content:'',timer:null,why:''}]);
  }
  const inp="w-full px-3 py-2.5 rounded-xl text-sm outline-none";
  const sty={background:T.cardBg,border:`1px solid ${T.border}`,color:T.ink};
  return(
    <div className="flex flex-col min-h-screen" style={{background:T.parchment}}>
      <div className="sticky top-0 z-10 px-4 pt-6 pb-4" style={{background:'rgba(247,242,234,0.92)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',borderBottom:`1px solid ${T.border}`}}>
        <div className="serif font-black text-[30px] leading-none tracking-[-0.025em]">Add your recipe</div>
        <div className="serif-it text-[13px] mt-1.5" style={{color:T.inkLight}}>same format as every other recipe — no second-class citizens</div>
      </div>
      <div className="flex-1 p-4 space-y-5 pb-32 overflow-y-auto fade-in">
        {/* Basic */}
        <div className="space-y-2">
          <div className="eyebrow">The basics</div>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Recipe title *" className={inp} style={sty}/>
          <input value={tagline} onChange={e=>setTagline(e.target.value)} placeholder="One-line description" className={inp} style={sty}/>
          <input value={inspiration} onChange={e=>setInspiration(e.target.value)} placeholder="Where did this come from? (chef, person, book…)" className={inp} style={sty}/>
          <input value={sourceUrl} onChange={e=>setSourceUrl(e.target.value)} placeholder="Video or source URL (optional)" className={inp} style={sty}/>
        </div>
        {/* Meta */}
        <div className="grid grid-cols-2 gap-2">
          <div className="space-y-1.5"><div className="eyebrow">Serves</div>
            <div className="flex items-center gap-2">
              <button onClick={()=>setServings(s=>Math.max(1,s-1))} aria-label="Fewer servings" className="press w-10 h-10 rounded-full font-bold" style={{background:T.border}}>−</button>
              <span className="serif font-black text-xl text-center w-8 num-tnum">{servings}</span>
              <button onClick={()=>setServings(s=>s+1)} aria-label="More servings" className="press w-10 h-10 rounded-full font-bold" style={{background:T.ink,color:T.cream}}>+</button>
            </div>
          </div>
          <div className="space-y-1.5"><div className="eyebrow">Time (mins)</div>
            <input type="number" value={time} onChange={e=>setTime(+e.target.value)} aria-label="Time in minutes" className={inp} style={sty}/>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="eyebrow mb-1.5">Difficulty</div>
            <select value={diff} onChange={e=>setDiff(e.target.value)} aria-label="Difficulty" className={inp} style={sty}>
              {['easy','medium','hard'].map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div>
            <div className="eyebrow mb-1.5">Category</div>
            <select value={cat} onChange={e=>setCat(e.target.value)} aria-label="Category" className={inp} style={sty}>
              {['beef','chicken','fish','pasta','noodles','eggs','vegetarian','levantine','bread','soup','other'].map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        {/* Ingredients */}
        <div>
          <div className="eyebrow mb-2">Ingredients</div>
          <div className="space-y-2">
            {ings.map((ing,i)=>(
              <div key={ing.id} className="p-3 rounded-xl space-y-2" style={{background:T.cardBg,border:`1px solid ${T.border}`}}>
                <div className="flex items-center justify-between">
                  <span className="serif-it text-[13px]" style={{color:T.inkFaint}}>Ingredient {i+1}</span>
                  {ings.length>1&&<button onClick={()=>removeIng(ing.id)} aria-label={`Remove ingredient ${i+1}`} className="press w-7 h-7 rounded-full flex items-center justify-center" style={{background:T.border}}><Icon name="x" size={12}/></button>}
                </div>
                <input value={ing.name} onChange={e=>updateIng(ing.id,'name',e.target.value)} placeholder="Name *" className={inp} style={sty}/>
                <div className="flex gap-2">
                  <input type="number" value={ing.amount||''} onChange={e=>updateIng(ing.id,'amount',+e.target.value)} placeholder="Amount" className={inp+" flex-1"} style={sty}/>
                  <input value={ing.unit} onChange={e=>updateIng(ing.id,'unit',e.target.value)} placeholder="Unit (g, ml…)" className={inp+" flex-1"} style={sty}/>
                </div>
                <select value={ing.scales} onChange={e=>updateIng(ing.id,'scales',e.target.value)} className={inp} style={sty}>
                  <option value="linear">Scales with portions</option>
                  <option value="fixed">Fixed quantity</option>
                  <option value="custom">Custom curve</option>
                </select>
                <input value={ing.notes} onChange={e=>updateIng(ing.id,'notes',e.target.value)} placeholder="Notes / substitution hint (optional)" className={inp} style={sty}/>
              </div>
            ))}
          </div>
          <button onClick={addIng} aria-label="Add ingredient" className="press mt-2 w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2" style={{background:T.cardBg,border:`1px dashed ${T.borderDark}`,color:T.inkLight}}>
            <Icon name="plus" size={14}/>Add ingredient
          </button>
        </div>
        {/* Steps */}
        <div>
          <div className="eyebrow mb-2">Steps</div>
          <div className="space-y-2">
            {steps.map((step,i)=>(
              <div key={step.id} className="p-3 rounded-xl space-y-2" style={{background:T.cardBg,border:`1px solid ${T.border}`}}>
                <div className="flex items-center justify-between">
                  <span className="serif-it text-[13px]" style={{color:T.inkFaint}}>Step {i+1}</span>
                  {steps.length>1&&<button onClick={()=>removeStep(step.id)} aria-label={`Remove step ${i+1}`} className="press w-7 h-7 rounded-full flex items-center justify-center" style={{background:T.border}}><Icon name="x" size={12}/></button>}
                </div>
                <input value={step.title} onChange={e=>updateStep(step.id,'title',e.target.value)} placeholder="Step title" className={inp} style={sty}/>
                <textarea value={step.content} onChange={e=>updateStep(step.id,'content',e.target.value)} placeholder="What to do *" rows={3} className={inp+" resize-none"} style={sty}/>
                <input type="number" value={step.timer||''} onChange={e=>updateStep(step.id,'timer',e.target.value?+e.target.value:null)} placeholder="Timer (seconds, optional)" className={inp} style={sty}/>
                <textarea value={step.why} onChange={e=>updateStep(step.id,'why',e.target.value)} placeholder="Why? The underlying reason (optional but valuable)" rows={2} className={inp+" resize-none"} style={sty}/>
              </div>
            ))}
          </div>
          <button onClick={addStep} aria-label="Add step" className="press mt-2 w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2" style={{background:T.cardBg,border:`1px dashed ${T.borderDark}`,color:T.inkLight}}>
            <Icon name="plus" size={14}/>Add step
          </button>
        </div>
        {/* Save */}
        <button onClick={save} disabled={!title.trim()} aria-label="Save recipe" className="press w-full py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2" style={{background:saved?T.sage:title.trim()?T.paprika:T.border,color:title.trim()||saved?T.cream:T.inkFaint,cursor:title.trim()?'pointer':'default',boxShadow:title.trim()?`0 4px 18px ${saved?'rgba(90,122,90,.28)':'rgba(196,66,42,.28)'}`:'none'}}>
          {saved?<><Icon name="check" size={18} color={T.cream}/>Recipe saved!</>:<><Icon name="plus" size={18} color={title.trim()?T.cream:T.inkFaint}/>Save recipe</>}
        </button>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function buzz(ms=10){try{navigator.vibrate&&navigator.vibrate(ms)}catch{}}

function App(){
  const[view,setView]=useState('home');
  const[activeRecipe,setActiveRecipe]=useState(null);
  const[userRecipes,setUserRecipes]=useStorage('mise_user_recipes',[]);
  const[planned,setPlanned]=useStorage('mise_planned',[]);
  const[favorites,setFavorites]=useStorage('mise_favorites',{});
  const[adjustments,setAdjustments]=useStorage('mise_adjustments',{});
  const allRecipes=[...RECIPES,...userRecipes];
  function openRecipe(r){buzz(8);setActiveRecipe(r);setView('detail');}
  function plan(r){
    buzz(10);
    setPlanned(p=>p.find(x=>x.id===r.id)?p.filter(x=>x.id!==r.id):[...p,r]);
  }
  function removePlan(id){setPlanned(p=>p.filter(x=>x.id!==id));}
  function toggleFav(id){buzz(6);setFavorites(f=>({...f,[id]:!f[id]}));}
  function saveUserRecipe(r){setUserRecipes(u=>[...u,r]);}
  function switchView(v){buzz(6);setView(v);}
  const planCount=planned.length;
  if(view==='detail'&&activeRecipe) return(
    <RecipeDetail
      recipe={activeRecipe}
      onBack={()=>{buzz(6);setView('home');}}
      favorite={!!favorites[activeRecipe.id]}
      onFav={toggleFav}
      onPlan={plan}
      planned={!!planned.find(p=>p.id===activeRecipe.id)}
      adjustments={adjustments}
      setAdjustments={setAdjustments}
    />
  );
  const tabs=[['home','Kitchen','home'],['shop','Plan & Shop','cart'],['add','Add','plus']];
  const tabIdx=tabs.findIndex(t=>t[0]===view);
  return(
    <div className="max-w-lg mx-auto">
      <div className="relative" style={{minHeight:'100vh'}}>
        <div className="pb-nav">
          {view==='home'&&<Home allRecipes={allRecipes} planned={planned} favorites={favorites} onPlan={plan} onFav={toggleFav} onOpen={openRecipe}/>}
          {view==='shop'&&<PlanAndShop allRecipes={allRecipes} planned={planned} onRemove={removePlan} onOpen={openRecipe}/>}
          {view==='add'&&<AddRecipe onSave={r=>{saveUserRecipe(r);setView('home');}}/>}
        </div>
        <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 pt-3 z-30" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom,0px))',background:'linear-gradient(to top,rgba(247,242,234,1) 55%,rgba(247,242,234,0))'}}>
          <div className="relative flex p-1.5 rounded-2xl" style={{background:T.ink,boxShadow:'0 10px 36px rgba(0,0,0,0.28)'}}>
            {/* Animated active pill */}
            {tabIdx>=0&&<div className="absolute top-1.5 bottom-1.5 rounded-xl transition-all duration-300 ease-out" style={{background:T.paprika,left:`calc(6px + ${tabIdx} * (100% - 12px) / ${tabs.length})`,width:`calc((100% - 12px) / ${tabs.length})`,boxShadow:'0 2px 10px rgba(196,66,42,.32)'}}/>}
            {tabs.map(([id,label,icon])=>(
              <button key={id} onClick={()=>switchView(id)} aria-label={label} aria-pressed={view===id} className="press flex-1 py-3 rounded-xl flex items-center justify-center gap-1.5 relative z-10" style={{color:T.cream}}>
                <Icon name={icon} size={16} color={T.cream}/>
                <span className="text-xs font-bold tracking-tight">{label}</span>
                {id==='shop'&&planCount>0&&<span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] rounded-full text-[10px] font-black flex items-center justify-center px-1 num-tnum" style={{background:T.ochre,color:T.ink,boxShadow:'0 2px 6px rgba(0,0,0,.3)'}}>{planCount}</span>}
              </button>
            ))}
          </div>
        </nav>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
